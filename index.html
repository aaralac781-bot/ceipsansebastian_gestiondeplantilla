function fmt(mn){
  mn=parseInt(mn)||0;
  var h=Math.floor(mn/60),m=mn%60;
  return(h<10?'0':'')+h+':'+(m<10?'0':'')+m;
}
function hhmm(){var d=new Date();return(d.getHours()<10?'0':'')+d.getHours()+':'+(d.getMinutes()<10?'0':'')+d.getMinutes();}
function hCoordTotal(m){
  var total=0;
  (m.coords||[]).forEach(function(cid){
    var co=(DB.coordinaciones||[]).find(function(x){return x.id===cid;});
    if(co)total+=co.h||0;
  });
  return total;
}
function hd(m){
  return Math.max(0,J-(m.rC||0)-(m.rE||0)-(m.rJ||0)-hCoordTotal(m));
}
function hA(m){
  if(!DB||!DB.hCarga||!DB.hGrupos||!DB.hMat)return 0;
  var total=0;
  var mid=String(m.id); // comparar como string siempre
  DB.hGrupos.forEach(function(g){
    var carga=DB.hCarga[g.id]||{};
    DB.hMat.forEach(function(mat){
      var cv=carga[mat.id];
      if(cv&&String(cv.m)===mid){
        var hBoja=getBojaH(g.id,mat.id);
        total+=hBoja>0?hBoja:(hBoja===-1?(cv.h||0):0);
      }
    });
  });
  return total;
}
function hL(m){return Math.max(0,hd(m)-hA(m));}
function hdC(h){return h>=18?'#15803d':h>=12?'#92400e':'#b91c1c';}
function tg(){var s=0;Object.keys(DB.grupos).forEach(function(k){s+=DB.grupos[k]||0;});return s;}
function todosG(){var l=[],lt=['A','B','C','D','E','F'];CURSOS.forEach(function(c){var n=DB.grupos['_'+c]||0;for(var j=0;j<n;j++)l.push(c+lt[j]);});return l;}
function getMat(id){return DB.materias.find(function(m){return m.id===id;})||{id:id,n:id,c:'#f3f4f6',t:'#374151'};}
function pill(e){var x=EC[e]||{bg:'#f1f5f9',c:'#475569'};return '<span class="pill" style="background:'+x.bg+';color:'+x.c+'">'+(EL[e]||e)+'</span>';}
function bdg(t,cl){return '<span class="badge '+cl+'">'+t+'</span>';}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function barra(m){var d=hd(m),a=hA(m),exc=a>d,pct=d>0?Math.min(100,a/d*100):0;var col=exc?'#b91c1c':pct>90?'#d97706':'#15803d';return '<div class="hbar"><div class="ht"><div class="hf" style="width:'+pct.toFixed(0)+'%;background:'+col+'"></div></div><span style="font-size:11px;font-weight:700;color:'+col+'">'+a.toFixed(1)+'h/'+d.toFixed(1)+'h</span>'+(exc?bdg('EXCESO','rd'):Math.abs(d-a)<.3?bdg('OK','gn'):bdg(hL(m).toFixed(1)+'h libres','gy'))+'</div>';}
function mt(l,v,cls,s){return '<div class="mtr '+(cls||'')+'"><span class="ml">'+l+'</span><div class="mv">'+v+'</div>'+(s?'<div style="font-size:10px;color:#94a3b8">'+s+'</div>':'')+'</div>';}

function calcD(){var a={EF:0,Ingles:0,Frances:0,Musica:0,Primaria:0};DB.maestros.forEach(function(m){a[m.e]=(a[m.e]||0)+hd(m);});return a;}
function getCiclo(n){if(!n)return null;n=n.replace(/[A-Fa-f]/g,'').trim();if(n.indexOf('anos')>=0)return'Infantil';if(n==='1o'||n==='2o')return'Primero';if(n==='3o'||n==='4o')return'Segundo';if(n==='5o'||n==='6o')return'Tercero';return null;}

function setSync(t,txt){
  var d=document.getElementById('sdot'),l=document.getElementById('stxt');
  d.className='sdot'+(t==='ok'?' ok':t==='err'?' err':t==='spin'?' spin':'');
  l.textContent=txt||'Local';
}

function doSync(){
  var ok=save();
  if(!ok)return;
  var url=DB.scriptUrl;
  if(!url){setSync('ok','Guardado '+hhmm());return;}
  setSync('spin','Subiendo...');
  // Usar fetch POST para evitar limite de URL en GET
  // Sustituciones: recoger de localStorage
  var sust={};
  ['Lunes','Martes','Miercoles','Jueves','Viernes'].forEach(function(d){
    var k='sust_'+d;
    try{var v=localStorage.getItem(k);if(v)sust[d]=JSON.parse(v);}catch(e){}
  });
  var datos={
    maestros:DB.maestros,
    grupos:DB.grupos,
    coordinaciones:DB.coordinaciones||[],
    hCarga:DB.hCarga||{},
    hGrupos:DB.hGrupos||[],
    hMat:DB.hMat||[],
    hHor:DB.hHor||{},
    tramos:DB.tramos||[],
    bojaHoras:DB.bojaHoras||{},
    sust:sust
  };
  var body='accion=guardar&datos='+encodeURIComponent(JSON.stringify(datos));
  fetch(url,{
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:body
  })
  .then(function(r){return r.text();})
  .then(function(txt){
    try{
      var r=JSON.parse(txt);
      setSync(r.ok?'ok':'err', r.ok?'Sheets '+hhmm():'Error Sheets');
    }catch(e){
      setSync('ok','Sheets '+hhmm());
    }
  })
  .catch(function(e){
    // Si POST falla por CORS, intentar con JSONP GET dividido
    setSync('spin','Reintentando...');
    var id='_jp'+Date.now();
    window[id]=function(r){
      delete window[id];
      var el=document.getElementById('jp_'+id);
      if(el&&el.parentNode)el.parentNode.removeChild(el);
      setSync(r&&r.ok?'ok':'ok','Sheets '+hhmm());
    };
    var datos2={maestros:DB.maestros,grupos:DB.grupos,coordinaciones:DB.coordinaciones||[]};
    var s=document.createElement('script');
    s.id='jp_'+id;
    s.src=url+'?accion=guardar&callback='+id+'&datos='+encodeURIComponent(JSON.stringify(datos2));
    s.onerror=function(){delete window[id];setSync('ok','Local '+hhmm());};
    document.head.appendChild(s);
    setTimeout(function(){if(window[id]){delete window[id];setSync('ok','Local '+hhmm());}},8000);
  });
}

function _aplicarDatos(data){
  // Procesar maestros
  if(data.maestros&&data.maestros.length>1){
    var cab=data.maestros[0];
    function ci(n){for(var i=0;i<cab.length;i++)if(String(cab[i]).toLowerCase().replace(/[_\s]/g,'')==n.toLowerCase().replace(/[_\s]/g,''))return i;return -1;}
    var iId=ci('id'),iN=ci('nombre'),iE=ci('especialidad'),iCa=ci('cargo');
    var iRC=ci('redcargo'),iRE=ci('rededad'),iRJ=ci('redjornada');
    var iT=ci('estudor'),iG=ci('grupotutor'),iRef=ci('esrefuerzo');
    var iRT=ci('tiporefuerzo'),iPl=ci('coordplan'),iHC=ci('horascoord');
    var iAs=ci('asig'),iGR=ci('gruporef'),iCo=ci('coords');
    var mae=[];
    for(var i=1;i<data.maestros.length;i++){
      var row=data.maestros[i];
      if(!row[iN])continue;
      var asig=[];try{if(row[iAs])asig=JSON.parse(row[iAs]);}catch(e){}
      var coords=[];try{if(row[iCo])coords=JSON.parse(row[iCo]);}catch(e){}
      // Buscar datos locales existentes para este maestro
      var localM=DB.maestros?DB.maestros.find(function(m){return m.id===(parseInt(row[iId])||i);}):null;
      mae.push({
        id:parseInt(row[iId])||i,
        n:String(row[iN]),
        e:String(row[iE]||'Primaria'),
        cargo:String(row[iCa]||''),
        rC:parseFloat(row[iRC])||0,
        rE:parseFloat(row[iRE])||0,
        rJ:parseFloat(row[iRJ])||0,
        coord:0,
        hC:parseFloat(row[iHC])||0,
        // Para tutoria: usar local si existe, si no usar Sheets
        t:localM?localM.t:(String(row[iT]).toUpperCase()==='SI'),
        g:localM?localM.g:String(row[iG]||''),
        gRef:localM?localM.gRef:String(row[iGR]||''),
        ref:localM?localM.ref:(String(row[iRef]).toUpperCase()==='SI'),
        rT:localM?localM.rT:String(row[iRT]||''),
        plan:String(row[iPl]||''),
        // Asig y coords: usar local si tiene datos, si no usar Sheets
        asig:(localM&&localM.asig&&localM.asig.length>0)?localM.asig:asig,
        coords:(localM&&localM.coords&&localM.coords.length>0)?localM.coords:coords
      });
    }
    if(mae.length>0)DB.maestros=mae;
  }
  // Procesar hCarga
  if(data.carga&&data.carga.length>1){
    DB.hCarga={};
    for(var i=1;i<data.carga.length;i++){
      var row=data.carga[i];
      var gid=String(row[0]),mid=String(row[1]),datos=row[2];
      if(!gid||!mid)continue;
      if(!DB.hCarga[gid])DB.hCarga[gid]={};
      try{DB.hCarga[gid][mid]=JSON.parse(datos);}catch(e){}
    }
  }
  // Procesar coordinaciones
  if(data.coords&&data.coords.length>1){
    DB.coordinaciones=[];
    for(var i=1;i<data.coords.length;i++){
      var row=data.coords[i];
      if(!row[0]||!row[1])continue;
      DB.coordinaciones.push({
        id:String(row[0]),n:String(row[1]),
        h:parseFloat(row[2])||0,
        activo:String(row[3]).toUpperCase()==='SI'
      });
    }
  }
  // Procesar extras (hGrupos, hMat, tramos, bojaHoras, hHor, sust)
  if(data.hGrupos&&data.hGrupos.length>0)DB.hGrupos=data.hGrupos;
  if(data.hMat&&data.hMat.length>0)DB.hMat=data.hMat;
  if(data.tramos&&data.tramos.length>0)DB.tramos=data.tramos;
  if(data.bojaHoras&&Object.keys(data.bojaHoras).length>0)DB.bojaHoras=data.bojaHoras;
  if(data.hHor&&Object.keys(data.hHor).length>0)DB.hHor=data.hHor;
  if(data.sust&&Object.keys(data.sust).length>0){
    Object.keys(data.sust).forEach(function(d){
      try{localStorage.setItem('sust_'+d,JSON.stringify(data.sust[d]));}catch(e){}
    });
  }
  save();
}

  if(!confirm('Cargar datos de Sheets?\nSe sobreescribiran los datos locales con los del servidor.'))return;
  setSync('spin','Descargando...');
  var cb='_rcb'+Date.now();

  window[cb]=function(r){
    delete window[cb];

function parseCSV(csv){
  var lin=csv.split('\n').filter(function(l){return l.trim();});
  if(lin.length<2)return null;
  var cab=parseLine(lin[0]).map(function(h){return h.toLowerCase().replace(/[_\s]/g,'');});
  
  var IX={id:ci('id')||0,n:ci('nombre')||1,e:ci('especialidad')||2,cargo:ci('cargo')||3,
    rC:ci('redcargo')||4,rE:ci('rededad')||5,rJ:ci('redjornada')||6,
    coord:ci('coordinacion')||7,hC:ci('horascoord')||13,t:ci('estudor')||8,g:ci('grupotutor')||9,
    ref:ci('esrefuerzo')||10,rT:ci('tiporefuerzo')||11,plan:ci('coordplan')||12,
    asig:ci('asig'),gRef:ci('gruporef')};
  var res=[];
  for(var i=1;i<lin.length;i++){
    var r=parseLine(lin[i]);
    var n=trimq(r[IX.n]);if(!n)continue;
    var asig=[];
    if(IX.asig>=0){try{var raw=trimq(r[IX.asig]);if(raw&&raw.length>2)asig=JSON.parse(raw);}catch(e){}}
    var gRef=IX.gRef>=0?trimq(r[IX.gRef]):'';
    if(!gRef)gRef=trimq(r[IX.g])||'';
    res.push({id:parseInt(r[IX.id])||i,n:n,e:trimq(r[IX.e])||'Primaria',
      cargo:trimq(r[IX.cargo]),rC:parseFloat(r[IX.rC])||0,rE:parseFloat(r[IX.rE])||0,
      rJ:parseFloat(r[IX.rJ])||0,coord:parseFloat(r[IX.coord])||0,
      hC:parseFloat(r[IX.hC])||0,t:(trimq(r[IX.t])||'').toUpperCase()==='SI',
      g:trimq(r[IX.g]),ref:(trimq(r[IX.ref])||'').toUpperCase()==='SI',
      rT:trimq(r[IX.rT]),plan:trimq(r[IX.plan]),gRef:gRef,asig:asig});
  }
  return res.length?res:null;
}
function parseLine(l){var r=[],c='',q=false;for(var i=0;i<l.length;i++){var ch=l[i];if(ch==='"'){if(q&&l[i+1]==='"'){c+='"';i++;}else q=!q;}else if(ch===','&&!q){r.push(c);c='';}else c+=ch;}r.push(c);return r;}
function trimq(s){return(s||'').replace(/^"|"$/g,'').replace(/""/g,'"').trim();}

function autoRecibir(){
  var url=DB.scriptUrl;
  if(!url)return;
  var id='_auto'+Date.now();
  window[id]=function(r){
    delete window[id];
    var el=document.getElementById('jp_auto');

    if(!r||!r.ok){setSync('','Local');return;}

    // Aplicar datos si los hay

    localStorage.setItem('ceip_last_sync',String(Date.now()));

function calcNecesidades(){
  // Horas totales necesarias por area segun BOJA y numero de grupos
  var CURSOS2=['1o','2o','3o','4o','5o','6o'];
  var areas=['len','mat','cono','ing','ef','art','fra','rel','val','aut'];
  var nec={};
  areas.forEach(function(a){nec[a]=0;});
  CURSOS2.forEach(function(cv,ci){
    var ng=DB.grupos['_'+cv]||0;
    areas.forEach(function(a){
      var bh=(DB.bojaHoras&&DB.bojaHoras[a])?DB.bojaHoras[a][ci]:0;
      nec[a]+=(bh||0)*ng;
    });
  });
  return nec;
}

function updCoord(id,cid,add){
  for(var i=0;i<DB.maestros.length;i++){
    if(DB.maestros[i].id===id){
      if(!DB.maestros[i].coords)DB.maestros[i].coords=[];
      var idx=DB.maestros[i].coords.indexOf(cid);
      if(add&&idx<0)DB.maestros[i].coords.push(cid);
      if(!add&&idx>=0)DB.maestros[i].coords.splice(idx,1);
      // Recalcular hC (horas de coordinacion)
      var totalH=0;
      DB.maestros[i].coords.forEach(function(ci){
        var co=(DB.coordinaciones||[]).find(function(x){return x.id===ci;});
        if(co)totalH+=co.h||0;
      });
      DB.maestros[i].hC=totalH;
      break;
    }
  }
  try{localStorage.setItem(KDAT,JSON.stringify(DB));setSync('ok','Guardado '+hhmm());}catch(e){}
  rClaustro();
}

var ALUMNOS_FILTRO={curso:'',letra:''};
var ORDEN_CURSOS=['3anos','4anos','5anos','1o','2o','3o','4o','5o','6o'];

function cursoLabel(cv){
  var map={'3anos':'3 Anos','4anos':'4 Anos','5anos':'5 Anos',
    '1o':'1o Primaria','2o':'2o Primaria','3o':'3o Primaria',
    '4o':'4o Primaria','5o':'5o Primaria','6o':'6o Primaria'};
  return map[cv]||cv;
}

function getCursoSiguiente(curso,letra){
  var map={'3anos':'4anos','4anos':'5anos','5anos':'1o',
    '1o':'2o','2o':'3o','3o':'4o','4o':'5o','5o':'6o','6o':'INSTITUTO'};
  var sig=map[curso]||'';
  if(sig==='INSTITUTO')return null;
  if(curso==='2o'||curso==='4o')return{curso:sig,letra:'',pendiente:true};
  return{curso:sig,letra:letra,pendiente:false};
}

function getGrupoAlumnos(curso,letra){
  return DB.alumnos.filter(function(a){
    return a.curso===curso&&(letra?a.letra===letra:true);
  }).sort(function(a,b){return a.apellidos.localeCompare(b.apellidos);});
}

function getCursosActivos(){
  var cl={};
  DB.alumnos.forEach(function(a){
    var k=a.curso+'_'+a.letra;
    if(!cl[k])cl[k]={curso:a.curso,letra:a.letra,n:0};
    cl[k].n++;
  });
  return Object.values(cl).sort(function(a,b){
    var oa=ORDEN_CURSOS.indexOf(a.curso),ob=ORDEN_CURSOS.indexOf(b.curso);
    if(oa!==ob)return oa-ob;
    return a.letra.localeCompare(b.letra);
  });
}

function importarExcel(input){
  var file=input.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=new Uint8Array(e.target.result);
      var wb=XLSX.read(data,{type:'array'});
      var nuevos=[];
      wb.SheetNames.forEach(function(sheetName){
        var detected=detectarCurso(sheetName);
        if(!detected)return;
        var sheet=wb.Sheets[sheetName];
        var rows=XLSX.utils.sheet_to_json(sheet,{header:1,defval:''});
        rows.forEach(function(row){
          var nombreCompleto='';
          row.forEach(function(cell){
            var val=String(cell).trim();
            if(val.indexOf(',')>0&&val.length>3&&isNaN(val))nombreCompleto=val;
          });
          if(!nombreCompleto)return;
          var partes=nombreCompleto.split(',',2);
          var apellidos=partes[0].trim();
          var nombre=partes[1]?partes[1].trim():'';
          if(!apellidos||apellidos.length<2)return;
          nuevos.push({nombre:nombre,apellidos:apellidos,curso:detected.curso,letra:detected.letra,fnac:'',atencion:false,repetidor:false});
        });
      });
      if(nuevos.length===0){alert('No se encontraron alumnos.');return;}
      var reemplazar=confirm('Se encontraron '+nuevos.length+' alumnos.\n\nAceptar = Reemplazar todo\nCancelar = Anadir a los existentes');
      if(reemplazar)DB.alumnos=nuevos;
      else DB.alumnos=DB.alumnos.concat(nuevos);
      save();ALUMNOS_FILTRO={curso:'',letra:''};renderAlumnos();
      alert('Importacion completada: '+nuevos.length+' alumnos.');
    }catch(ex){alert('Error al leer el archivo: '+ex.message);}
  };
  reader.readAsArrayBuffer(file);
  input.value='';
}

function detectarCurso(nombreHoja){
  var n=nombreHoja.toLowerCase().replace(/infantil/g,'').replace(/primaria/g,'').replace(/anos/g,'anos').replace(/o/g,'o').trim();
  var m=n.match(/(\d+)\s*([ab]?)/i);
  if(!m)return null;
  var num=m[1];
  var let2=(m[2]||'').toUpperCase();
  var esInf=nombreHoja.toLowerCase().indexOf('infantil')>=0||nombreHoja.toLowerCase().indexOf('anos')>=0;
  if(esInf){var ci={'3':'3anos','4':'4anos','5':'5anos'};return{curso:ci[num]||num+'anos',letra:let2};}
  var cp={'1':'1o','2':'2o','3':'3o','4':'4o','5':'5o','6':'6o'};
  return{curso:cp[num]||num+'o',letra:let2};
}

function priSust(m,gid,cicloD){
  if((m.asig||[]).some(function(a){return a.gid===gid;}))return 0;
  var cM=getCiclo((m.gRef||m.g||'').replace(/[A-Fa-f]/g,''));
  if(cM===cicloD)return 1;
  var adj={Primero:['Segundo','Infantil'],Segundo:['Primero','Tercero'],Tercero:['Segundo'],Infantil:['Primero']};
  if(cM&&cicloD&&(adj[cicloD]||[]).indexOf(cM)>=0)return 2;
  return 3;
}



function getFechaDeSust(){
  var hoy=new Date();
  if(window.SUST_FECHA==='hoy')return hoy.toISOString().split('T')[0];
  if(window.SUST_FECHA==='pasado'){var d=new Date(hoy);d.setDate(d.getDate()+2);while(d.getDay()===0||d.getDay()===6)d.setDate(d.getDate()+1);return d.toISOString().split('T')[0];}
  if(window.SUST_FECHA_CUSTOM)return window.SUST_FECHA_CUSTOM;
  var d=new Date(hoy);d.setDate(d.getDate()+1);while(d.getDay()===0||d.getDay()===6)d.setDate(d.getDate()+1);
  return d.toISOString().split('T')[0];
}

function publicarSustSSN(){
  var url=DB.scriptUrl;
  if(!url){alert('Configura la URL del script en Config.');return;}
  var tbl=loadSust(SUST_DIA);
  if(!tbl||Object.keys(tbl).length===0){alert('Genera primero la tabla.');return;}
  var filas=[['Maestro/a ausente','Hora','Grupo','Sustituye','Observaciones']];
  SUST_FALTAN.forEach(function(mFId){
    var mF=DB.maestros.find(function(m){return m.id===mFId;});
    if(!mF)return;
    (DB.tramos||[]).forEach(function(t,ti){
      if(t.r)return;
      var key=String(mFId)+'_'+ti;
      var cel=tbl[key];
      if(!cel)return;
      filas.push([mF.n,fmt(t.ini||0),cel.grupo||'',cel.sust||cel.txt||'Sin cubrir','']);
    });
  });
  if(filas.length<=1){alert('No hay sustituciones asignadas.');return;}
  var cb='_ssn'+Date.now();
  window[cb]=function(r){delete window[cb];if(r&&r.ok)alert('Publicado en SSN.');else alert('Error: '+(r?r.error:''));};
  var datos=JSON.stringify({sustDia:SUST_DIA,fecha:getFechaDeSust(),filas:filas,limpiarAnterior:true});
  var s=document.createElement('script');
  s.src=url+'?accion=publicarSust&callback='+cb+'&datos='+encodeURIComponent(datos);
  s.onerror=function(){delete window[cb];alert('Error de conexion.');};
  document.head.appendChild(s);
  setTimeout(function(){if(window[cb]){delete window[cb];alert('Timeout.');}},10000);
}

function getBojaH(gid,mid){
  var g=DB.hGrupos.find(function(x){return x.id===gid;});
  if(!g)return -1;
  var CURSOS2=['1o','2o','3o','4o','5o','6o'];
  var ci=CURSOS2.indexOf(g.niv);
  // Si el nivel no es de Primaria (Infantil u otro) -> horas editables
  if(ci<0)return -1;
  var mat=DB.hMat.find(function(m){return m.id===mid;});
  if(!mat)return -1;
  var keyMap={
    'E.F.':'ef','Ingles':'ing','Frances':'fra','Musica':'mus',
    'Plastica':'plas','Artistica':'plas','Lengua':'len','Matematicas':'mat',
    'Cono.Medio':'cono','Religion':'rel','Religion/AE':'rel',
    'Aten.Educativa':'aten','AtencionEducativa':'aten','Atencion':'aten',
    'Libre Disp.':'aut'
  };
  var key=null;
  Object.keys(keyMap).forEach(function(k){
    if(mat.n.toLowerCase().indexOf(k.toLowerCase())>=0)key=keyMap[k];
  });
  if(!key)return -1; // materia sin clave BOJA -> editable
  var h=(DB.bojaHoras&&DB.bojaHoras[key])?DB.bojaHoras[key][ci]||0:0;
  return h; // puede ser 0 (materia no impartida en ese curso) o >0
}

function getHorasAsignadas(mId){
  var total=0;
  DB.hGrupos.forEach(function(g){
    var carga=DB.hCarga[g.id]||{};
    DB.hMat.forEach(function(mat){
      var cv=carga[mat.id];
      if(cv&&cv.m===mId){
        var hBoja=getBojaH(g.id,mat.id);
        // Si BOJA tiene horas definidas, usar esas; si es editable usar las guardadas
        total+=hBoja>0?hBoja:(hBoja===-1?(cv.h||0):0);
      }
    });
  });
  return total;
}

function setMaestroEl(el){
  var gid=el.getAttribute('data-gid');
  var mid=el.getAttribute('data-mid');
  var mId=el.value;
  if(!DB.hCarga[gid])DB.hCarga[gid]={};
  if(!DB.hCarga[gid][mid])DB.hCarga[gid][mid]={h:0,m:''};
  // Guardar primero para calcular correctamente
  var prevM=DB.hCarga[gid][mid].m;
  DB.hCarga[gid][mid].m=mId;
  // Comprobar si el maestro tiene exceso tras la asignacion
  if(mId){
    var m=DB.maestros.find(function(x){return String(x.id)===String(mId);});
    if(m){
      var hAsig=hA(m);
      var hDisp=hd(m);
      if(hAsig>hDisp){
        // Mostrar alerta pero no revertir - el usuario decide
        el.style.background='#fee2e2';
        el.style.borderColor='#b91c1c';
        el.title='EXCESO: '+hAsig.toFixed(1)+'h asignadas / '+hDisp.toFixed(1)+'h disponibles';
      } else {
        el.style.background='';
        el.style.borderColor='';
        el.title='';
      }
    }
  }
  var hBoja=getBojaH(gid,mid);
  var horas=hBoja>0?hBoja:(DB.hCarga[gid][mid].h||0);
  // Quitar del maestro anterior
  DB.maestros.forEach(function(m){
    if(String(m.id)!==String(mId)&&m.asig){
      m.asig=m.asig.filter(function(a){return!(a.gid===gid&&a.mid===mid);});
    }
  });
  // Asignar al nuevo
  if(mId){
    var m=DB.maestros.find(function(x){return String(x.id)===String(mId);});
    if(m){
      if(!m.asig)m.asig=[];
      var ex=m.asig.find(function(a){return a.gid===gid&&a.mid===mid;});
      if(ex)ex.h=horas;
      else m.asig.push({gid:gid,mid:mid,h:horas});
    }
  }
  save();
  rHCarga();
}

function setActivaEl(el){
  var gid=el.getAttribute('data-gid');

  var v=el.checked;
  if(!DB.hCarga[gid])DB.hCarga[gid]={};
  if(!DB.hCarga[gid]._activas)DB.hCarga[gid]._activas={};
  DB.hCarga[gid]._activas[mid]=v;

    if(DB.hCarga[gid][mid])DB.hCarga[gid][mid].m='';
    DB.maestros.forEach(function(m){
      if(m.asig)m.asig=m.asig.filter(function(a){return!(a.gid===gid&&a.mid===mid);});
    });
  }
  save();rHCarga();
}

  despacho:{bg:'#fef3c7',c:'#92400e',label:'Despacho'},
  coord:{bg:'#ede9fe',c:'#6d28d9',label:'Coordinacion'},
  reduccion:{bg:'#fee2e2',c:'#b91c1c',label:'Reduccion'},
  libre:{bg:'#f1f5f9',c:'#64748b',label:'Libre/Refuerzo'}
};

function getHorGrupo(gid){
  if(!DB.hHor)DB.hHor={};
  if(!DB.hHor[gid]){
    DB.hHor[gid]={};
    ['Lunes','Martes','Miercoles','Jueves','Viernes'].forEach(function(d){
      DB.hHor[gid][d]=DB.tramos.map(function(t){
        return{mId:null,pId:null,fij:false,r:t.r,tipo:'clase',txt:''};
      });
    });
  }
  return DB.hHor[gid];
}

function getMaestroHor(mid){
  // Horario del maestro: combina grupos + slots propios (despacho, coord, reduccion)
  var DIAS2=['Lunes','Martes','Miercoles','Jueves','Viernes'];
  var horMae={};
  DIAS2.forEach(function(d){
    horMae[d]=DB.tramos.map(function(t,ti){
      if(t.r)return{r:true};
      // Buscar en grupos
      var enGrupo=null;
      DB.hGrupos.forEach(function(g){
        var hG=DB.hHor&&DB.hHor[g.id];
        if(!hG||!hG[d]||!hG[d][ti])return;
        var slot=hG[d][ti];
        if(slot&&String(slot.pId)===String(mid)){
          var mat=slot.mId?DB.hMat.find(function(m){return m.id===slot.mId;}):null;
          enGrupo={mId:slot.mId,pId:slot.pId,grupo:g.n,matNombre:mat?mat.n:'',tipo:'clase'};
        }
      });
      if(enGrupo)return enGrupo;
      // Slot propio del maestro (despacho, coord, reduccion)
      var kMae='mae_'+mid;
      if(!DB.hHor[kMae])return{mId:null,pId:null,tipo:'libre',txt:''};
      var hM=DB.hHor[kMae];
      if(hM[d]&&hM[d][ti])return hM[d][ti];
      return{mId:null,pId:null,tipo:'libre',txt:''};
    });
  });
  return horMae;
}

function getHorMaePropio(mid){
  var kMae='mae_'+mid;
  if(!DB.hHor)DB.hHor={};
  if(!DB.hHor[kMae]){
    DB.hHor[kMae]={};
    ['Lunes','Martes','Miercoles','Jueves','Viernes'].forEach(function(d){
      DB.hHor[kMae][d]=DB.tramos.map(function(t){
        return{mId:null,pId:null,fij:false,r:t.r,tipo:'libre',txt:''};
      });
    });
  }
  return DB.hHor[kMae];
}

function getMaestroSlot(mid,dia,ti){
  // Buscar slot del maestro: primero en grupos, luego en su horario propio
  var enGrupo=null;
  DB.hGrupos.forEach(function(g){
    var hG=DB.hHor&&DB.hHor[g.id];
    if(!hG||!hG[dia]||!hG[dia][ti])return;
    var s=hG[dia][ti];
    if(s&&String(s.pId)===String(mid)){
      var mat=s.mId?DB.hMat.find(function(m){return m.id===s.mId;}):null;
      enGrupo={mId:s.mId,pId:s.pId,grupo:g.n,matNombre:mat?mat.n:'',tipo:'clase',fij:s.fij};
    }
  });
  if(enGrupo)return enGrupo;
  var hP=getHorMaePropio(mid);
  if(hP[dia]&&hP[dia][ti])return hP[dia][ti];
  return{tipo:'libre',txt:''};
}

function renderCelda(slot,t,eid,dia,ti,esGrupo){
  var isActive=SLOT_ACTIVO&&String(SLOT_ACTIVO.eid)===String(eid)&&SLOT_ACTIVO.dia===dia&&SLOT_ACTIVO.ti===ti;
  var bg='#fff',tc='#cbd5e1',txt='',sub='';
  if(t.r||(slot&&slot.r)){
    return '<td style="background:#fef3c7;text-align:center;font-size:9px;color:#92400e;padding:3px;border:1px solid #e2e8f0">Rec</td>';
  }
  if(slot){
    var tipo=slot.tipo||'clase';
    if(tipo!=='clase'&&SLOT_TIPOS[tipo]){
      bg=SLOT_TIPOS[tipo].bg;tc=SLOT_TIPOS[tipo].c;
      txt=slot.txt||SLOT_TIPOS[tipo].label;
    } else if(slot.mId||slot.matNombre){
      var mat=slot.mId?DB.hMat.find(function(m){return m.id===slot.mId;}):null;
      bg=mat?mat.c:'#f0fdf4';tc=mat?mat.t:'#15803d';
      txt=slot.matNombre||(mat?mat.n:'');
      sub=slot.grupo||(slot.pId?((DB.maestros.find(function(m){return m.id===slot.pId;})||{}).n||''):'');
    }
  }
  var border=isActive?'2px solid #1d4ed8':'1px solid #e2e8f0';
  var out='<td style="background:'+bg+';color:'+tc+';padding:2px 3px;border:'+border+';cursor:pointer;min-width:28px;min-height:20px;vertical-align:top"';
  out+=' data-eid="'+eid+'" data-dia="'+dia+'" data-ti="'+ti+'" data-esgrupo="'+(esGrupo?'1':'0')+'"';
  out+=' onclick="celdaClick(this)">';
  if(txt)out+='<div style="font-size:8px;font-weight:700;line-height:1.2;overflow:hidden;white-space:nowrap">'+txt+'</div>';
  if(sub)out+='<div style="font-size:8px;opacity:.65;overflow:hidden;white-space:nowrap">'+sub+'</div>';
  if(!txt&&!sub)out+='<div style="color:#e2e8f0;text-align:center;line-height:22px;font-size:11px">+</div>';
  out+='</td>';
  return out;
}

function renderTabla(eid,nombre,esGrupo,colorHdr){
  var DIAS2=['Lunes','Martes','Miercoles','Jueves','Viernes'];
  var h='<div style="min-width:130px">';
  h+='<div style="font-weight:800;font-size:10px;padding:3px 5px;background:'+colorHdr+';color:#fff;border-radius:5px 5px 0 0;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+nombre+'</div>';
  h+='<table style="width:100%;border-collapse:collapse;font-size:9px">';
  h+='<tr style="background:#374151;color:#fff">';
  h+='<th style="padding:2px 3px;width:26px;font-size:8px">h</th>';
  DIAS2.forEach(function(d){h+='<th style="padding:2px;font-size:8px">'+d.charAt(0)+'</th>';});
  h+='</tr>';
  DB.tramos.forEach(function(t,ti){
    h+='<tr>';
    h+='<td style="background:#f8fafc;font-size:7px;color:#94a3b8;padding:1px 2px;border:1px solid #e2e8f0;white-space:nowrap;text-align:right">'+fmt(t.ini).replace(':00','h')+'</td>';
    DIAS2.forEach(function(d){
      var slot=esGrupo
        ?(getHorGrupo(eid)[d]&&getHorGrupo(eid)[d][ti]?getHorGrupo(eid)[d][ti]:null)
        :getMaestroSlot(eid,d,ti);
      h+=renderCelda(slot,t,eid,d,ti,esGrupo);
    });
    h+='</tr>';
  });
  h+='</table></div>';
  return h;
}

function celdaClick(el){
  var eid=el.getAttribute('data-eid');
  var dia=el.getAttribute('data-dia');
  var ti=parseInt(el.getAttribute('data-ti'));
  var esGrupo=el.getAttribute('data-esgrupo')==='1';
  // Convertir eid al tipo correcto
  var g=DB.hGrupos.find(function(g){return g.id===eid;});
  if(!g&&!esGrupo){
    var m=DB.maestros.find(function(m){return String(m.id)===eid;});
    if(m)eid=m.id;
  }
  SLOT_ACTIVO={eid:eid,dia:dia,ti:ti,esGrupo:esGrupo};
  rHHorario();
}

function setSlotTipo(btn){
  if(!SLOT_ACTIVO)return;
  var tipo=btn.getAttribute('data-tipo');
  var sa=SLOT_ACTIVO;
  var hor=sa.esGrupo?getHorGrupo(sa.eid):getHorMaePropio(sa.eid);
  if(!hor[sa.dia]||!hor[sa.dia][sa.ti])return;
  hor[sa.dia][sa.ti].tipo=tipo;
  if(tipo!=='clase'){hor[sa.dia][sa.ti].mId=null;hor[sa.dia][sa.ti].pId=null;}
  save();rHHorario();
}

function guardarSlot(){
  if(!SLOT_ACTIVO)return;
  var sa=SLOT_ACTIVO;
  var hor=sa.esGrupo?getHorGrupo(sa.eid):getHorMaePropio(sa.eid);
  if(!hor[sa.dia]||!hor[sa.dia][sa.ti])return;
  var slot=hor[sa.dia][sa.ti];
  var matEl=document.getElementById('slot-mat');
  var profEl=document.getElementById('slot-prof');
  var txtEl=document.getElementById('slot-txt');
  var fijEl=document.getElementById('slot-fij');
  if(matEl)slot.mId=matEl.value||null;
  if(profEl)slot.pId=profEl.value?parseInt(profEl.value):null;
  if(txtEl)slot.txt=txtEl.value||'';
  if(fijEl)slot.fij=fijEl.checked;
  save();rHHorario();
}

function vaciarSlot(){
  if(!SLOT_ACTIVO)return;
  var sa=SLOT_ACTIVO;
  var hor=sa.esGrupo?getHorGrupo(sa.eid):getHorMaePropio(sa.eid);
  if(hor[sa.dia]&&hor[sa.dia][sa.ti]){
    hor[sa.dia][sa.ti]={mId:null,pId:null,fij:false,tipo:'clase',txt:''};
  }
  SLOT_ACTIVO=null;
  save();rHHorario();
}

function genHorario(){
  if(!confirm('Generar horario automatico?\nSe respetan las celdas fijadas manualmente.'))return;
  // Verificar que hay asignaciones
  var totalAsig=0;
  DB.hGrupos.forEach(function(g){
    var carga=DB.hCarga[g.id]||{};
    DB.hMat.forEach(function(mat){
      var cv=carga[mat.id];
      if(cv&&cv.m)totalAsig++;
    });
  });
  if(totalAsig===0){
    alert('No hay materias asignadas.\n\nVe a Horarios -> Asignacion y asigna un maestro/a a cada materia de cada grupo primero.');
    return;
  }
  var DIAS2=['Lunes','Martes','Miercoles','Jueves','Viernes'];
  var durMod=(DB.tramos.filter(function(t){return !t.r;})[0]||{dur:45}).dur;
  DB.hGrupos.forEach(function(g){
    var hor=getHorGrupo(g.id);
    var carga=DB.hCarga[g.id]||{};
    // Lista de tareas (modulos a asignar)
    var tareas=[];
    DB.hMat.forEach(function(mat){
      var cv=carga[mat.id];
      if(!cv||!cv.m)return;
      var activas=DB.hCarga[g.id]&&DB.hCarga[g.id]._activas;
      if(activas&&activas[mat.id]===false)return;
      var hBoja=getBojaH(g.id,mat.id);
      var horas=hBoja>0?hBoja:(cv&&cv.h?cv.h:0);
      var mods=Math.round(horas*60/durMod);
      for(var i=0;i<mods;i++)tareas.push({mId:mat.id,pId:parseInt(cv.m)});
    });
    // Huecos disponibles (no fijados, no recreo, no otro tipo)
    var huecos=[];
    DIAS2.forEach(function(d){
      DB.tramos.forEach(function(t,ti){
        if(t.r)return;
        var slot=hor[d]&&hor[d][ti]?hor[d][ti]:{};
        if(!slot.fij&&!slot.mId&&!(slot.tipo&&slot.tipo!=='clase')){
          huecos.push({d:d,ti:ti});
        }
      });
    });
    // Funcion para comprobar si un maestro ya esta ocupado en otro grupo
    function maestroOcupado(pId,dia,ti){
      if(!pId)return false;
      for(var gi=0;gi<DB.hGrupos.length;gi++){
        var og=DB.hGrupos[gi];
        if(og.id===g.id)continue; // no contar el mismo grupo
        var horO=DB.hHor&&DB.hHor[og.id];
        if(!horO||!horO[dia]||!horO[dia][ti])continue;
        var sO=horO[dia][ti];
        if(sO&&String(sO.pId)===String(pId))return true;
      }
      return false;
    }
    // Distribuir equitativamente por dias
    huecos.sort(function(a,b){return a.ti-b.ti||DIAS2.indexOf(a.d)-DIAS2.indexOf(b.d);});
    var hi=0;
    tareas.forEach(function(tarea){
      if(hi>=huecos.length)return;
      // Buscar hueco donde el maestro no este ya ocupado
      var h2=null;
      var intentos=0;
      while(hi<huecos.length&&intentos<huecos.length){
        var candidato=huecos[hi];
        if(!maestroOcupado(tarea.pId,candidato.d,candidato.ti)){
          h2=candidato;
          hi++;
          break;
        }
        // Maestro ocupado en este tramo - mover al final y probar otro
        huecos.push(huecos.splice(hi,1)[0]);
        intentos++;
      }
      if(!h2)return; // No hay hueco disponible para este maestro
      if(!hor[h2.d])hor[h2.d]=[];
      if(!hor[h2.d][h2.ti])hor[h2.d][h2.ti]={};
      hor[h2.d][h2.ti].mId=tarea.mId;
      hor[h2.d][h2.ti].pId=tarea.pId;
      hor[h2.d][h2.ti].tipo='clase';
      hor[h2.d][h2.ti].txt='';
      // Si es Religion, marcar el mismo tramo como paralelo con AtenEduc
      var matAsig=DB.hMat.find(function(m){return m.id===tarea.mId;});
      if(matAsig&&matAsig.n==='Religion'){

function exportarSheets(){
  var url=DB.scriptUrl;
  if(!url){alert('Configura primero la URL del script en Config.');return;}
  var DIAS2=['Lunes','Martes','Miercoles','Jueves','Viernes'];
  // Construir datos para Sheets: una hoja por grupo
  var hojas=[];
  DB.hGrupos.forEach(function(g){
    var hor=getHorGrupo(g.id);
    var filas=[['',].concat(DIAS2)];
    DB.tramos.forEach(function(t,ti){
      var fila=[fmt(t.ini)];
      DIAS2.forEach(function(d){
        var slot=hor[d]&&hor[d][ti]?hor[d][ti]:{r:t.r};
        if(t.r||slot.r){fila.push('RECREO');return;}
        var txt='';
        var tipo=slot.tipo||'clase';
        if(tipo!=='clase'&&SLOT_TIPOS[tipo]){txt=slot.txt||SLOT_TIPOS[tipo].label;}
        else if(slot.mId){
          var mat=DB.hMat.find(function(m){return m.id===slot.mId;});
          var prof=slot.pId?DB.maestros.find(function(m){return m.id===slot.pId;}):null;
          txt=(mat?mat.n:'')+(prof?' - '+prof.n:'');
        }
        fila.push(txt);
      });
      filas.push(fila);
    });
    hojas.push({nombre:g.n,filas:filas});
  });
  // Subir via script
  var cb='_exp'+Date.now();
  window[cb]=function(r){
    delete window[cb];
    if(r&&r.ok)alert('Horarios exportados a Google Sheets correctamente.');
    else alert('Error al exportar: '+(r?r.error:'sin respuesta'));
  };
  var datos=JSON.stringify({hojas:hojas});
  var s=document.createElement('script');
  s.src=url+'?accion=exportarHorarios&callback='+cb+'&datos='+encodeURIComponent(datos);
  s.onerror=function(){delete window[cb];alert('Error de conexion.');};
  document.head.appendChild(s);
  setTimeout(function(){if(window[cb]){delete window[cb];alert('Timeout.');}},10000);
}

function getMesLabel2(m){
  var p = m.split('-');
  var meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
               'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  return meses[parseInt(p[1])-1]+' '+p[0];
}

function getDiasLaborables(mesStr){
  var p = mesStr.split('-');
  var anio = parseInt(p[0]), mes = parseInt(p[1])-1;
  var dias = [], d = new Date(anio,mes,1);
  var diasNom = ['Domingo','Lunes','Martes','Miercoles','Jueves','Viernes','Sabado'];
  while(d.getMonth()===mes){
    var dow = d.getDay();
    if(dow>=1&&dow<=5){
      dias.push({
        fecha: d.getFullYear()+'-'+(d.getMonth()<9?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate(),
        diaSem: diasNom[dow],
        num: d.getDate(),
        sem: Math.ceil(d.getDate()/7)
      });
    }
    d.setDate(d.getDate()+1);
  }
  return dias;
}

function getMaestrosRecreables(){
  var exentos = DB.recreo.exentos||[];
  return DB.maestros.filter(function(m){
    return m.cargo!=='Director' &&
           ['PT','AL'].indexOf(m.e)<0 &&
           exentos.indexOf(m.id)<0;
  });
}

function genTurnosMes(mesStr){
  initRecreo();
  var dias = getDiasLaborables(mesStr);
  var todos = getMaestrosRecreables();
  var numInf = DB.recreo.numInfantil||4;
  var maxDias = DB.recreo.maxDias||2;
  var zonas = DB.recreo.zonasPrimaria||[];

  // Listas de disponibilidad
  var dispInf = DB.recreo.dispInfantil||[];
  var dispPrim = DB.recreo.dispPrimaria||[];

  // Si no hay listas, usar por defecto
  var maestrosInf = dispInf.length>0
    ? todos.filter(function(m){return dispInf.indexOf(m.id)>=0;})
    : todos.filter(function(m){return m.e==='Infantil';});
  var tutoresInf = maestrosInf.filter(function(m){return m.t;});

  var maestrosPrim = dispPrim.length>0
    ? todos.filter(function(m){return dispPrim.indexOf(m.id)>=0;})
    : todos.filter(function(m){return m.e!=='Infantil';});

  // Ampliar si hay pocos
  if(maestrosInf.length<numInf){
    todos.forEach(function(m){if(maestrosInf.indexOf(m)<0)maestrosInf.push(m);});
  }
  if(maestrosPrim.length<zonas.filter(function(z){return !z.fija;}).length+1){
    todos.forEach(function(m){if(maestrosPrim.indexOf(m)<0)maestrosPrim.push(m);});
  }

  // Contadores semanales {sem: {mId: dias}}
  var contSem = {};
  function getDias(mId,sem){return(contSem[sem]&&contSem[sem][mId])||0;}
  function addDia(mId,sem){
    if(!contSem[sem])contSem[sem]={};
    contSem[sem][mId]=(contSem[sem][mId]||0)+1;
  }

  var turnos = {};

  dias.forEach(function(d){
    var sem = d.sem;
    var t = {fecha:d.fecha, diaSem:d.diaSem, infantil:[], primaria:{}};

    // === INFANTIL ===
    // Ordenar por menos dias esta semana
    var candInf = maestrosInf.slice().sort(function(a,b){
      var da=getDias(a.id,sem), db=getDias(b.id,sem);
      if(da!==db)return da-db;
      return Math.random()-0.5;
    });
    var selInf = [];

    // Min 1 tutora de infantil
    var tutDisp = tutoresInf.filter(function(m){return getDias(m.id,sem)<maxDias;});
    if(tutDisp.length>0){selInf.push(tutDisp[0].id);}

    // Min 2 de infantil total
    candInf.filter(function(m){return m.e==='Infantil'&&getDias(m.id,sem)<maxDias&&selInf.indexOf(m.id)<0;}).forEach(function(m){
      if(selInf.length<2)selInf.push(m.id);
    });

    // Completar hasta numInf
    candInf.filter(function(m){return getDias(m.id,sem)<maxDias&&selInf.indexOf(m.id)<0;}).forEach(function(m){
      if(selInf.length<numInf)selInf.push(m.id);
    });
    // Si aun faltan, sin limite de dias
    candInf.filter(function(m){return selInf.indexOf(m.id)<0;}).forEach(function(m){
      if(selInf.length<numInf)selInf.push(m.id);
    });

    selInf.forEach(function(id){addDia(id,sem);});
    t.infantil = selInf;

    // === PRIMARIA ===
    var yaAsig = selInf.slice();

    // Fijos primero
    zonas.forEach(function(z){
      if(z.fija&&z.maestroId){
        t.primaria[z.id]={zona:z.n,maestroId:z.maestroId,maestroN:'',fija:true,sust:false};
        var m=DB.maestros.find(function(x){return x.id===z.maestroId;});
        if(m)t.primaria[z.id].maestroN=m.n;
      }
    });

    var candPrim = maestrosPrim.slice().sort(function(a,b){
      var da=getDias(a.id,sem), db=getDias(b.id,sem);
      if(da!==db)return da-db;
      return Math.random()-0.5;
    });

    // Asignar zonas no fijas
    var zonasLibres = zonas.filter(function(z){return !z.fija;});
    zonasLibres.forEach(function(z){
      var disp = candPrim.filter(function(m){return yaAsig.indexOf(m.id)<0&&getDias(m.id,sem)<maxDias;});
      if(disp.length===0) disp = candPrim.filter(function(m){return yaAsig.indexOf(m.id)<0;});
      if(disp.length>0){
        var m = disp[0];
        t.primaria[z.id]={zona:z.n,maestroId:m.id,maestroN:m.n,fija:false,sust:false,esAcomp:z.esAcomp||false};
        yaAsig.push(m.id);
        addDia(m.id,sem);
      } else {
        t.primaria[z.id]={zona:z.n,maestroId:null,maestroN:'',fija:false,sust:false,esAcomp:z.esAcomp||false};
      }
    });

    turnos[d.fecha] = t;
  });

  DB.recreo.turnosMes[mesStr] = turnos;
  save();
  return turnos;
}

function updInfantilEl(el){
  var fecha = el.getAttribute('data-fecha');
  var idx = parseInt(el.getAttribute('data-idx'));
  var mId = el.value?parseInt(el.value):null;
  if(!DB.recreo.turnosMes[RECREO_MES_ACTUAL]||!DB.recreo.turnosMes[RECREO_MES_ACTUAL][fecha])return;
  if(!DB.recreo.turnosMes[RECREO_MES_ACTUAL][fecha].infantil)
    DB.recreo.turnosMes[RECREO_MES_ACTUAL][fecha].infantil=[];
  DB.recreo.turnosMes[RECREO_MES_ACTUAL][fecha].infantil[idx] = mId;
  save();
}

function updZonaRecreoEl(el){
  var fecha = el.getAttribute('data-fecha');
  var zid = el.getAttribute('data-zid');
  var mId = el.value?parseInt(el.value):null;
  if(!DB.recreo.turnosMes[RECREO_MES_ACTUAL]||!DB.recreo.turnosMes[RECREO_MES_ACTUAL][fecha])return;
  var m = mId?DB.maestros.find(function(x){return x.id===mId;}):null;
  if(!DB.recreo.turnosMes[RECREO_MES_ACTUAL][fecha].primaria)
    DB.recreo.turnosMes[RECREO_MES_ACTUAL][fecha].primaria={};
  var slot = DB.recreo.turnosMes[RECREO_MES_ACTUAL][fecha].primaria[zid]||{};
  slot.maestroId = mId;
  slot.maestroN = m?m.n:'';
  DB.recreo.turnosMes[RECREO_MES_ACTUAL][fecha].primaria[zid] = slot;
  save();
}

function toggleDispRecreo(el){
  initRecreo();
  var mid = parseInt(el.getAttribute('data-mid'));
  var zona = el.getAttribute('data-z');

function toggleExentoRecreo(el){
  initRecreo();
  var mid = parseInt(el.getAttribute('data-mid'));
  var m = DB.maestros.find(function(x){return x.id===mid;});
  if(m&&m.cargo==='Director'){el.checked=true;return;} // Director siempre exento
  if(!DB.recreo.exentos)DB.recreo.exentos=[];
  var idx = DB.recreo.exentos.indexOf(mid);
  if(el.checked&&idx<0)DB.recreo.exentos.push(mid);

function getSemanaMes(fechaStr){
  // Devuelve S1,S2,S3... del mes
  var d = new Date(fechaStr+'T12:00:00');
  return 'S'+Math.ceil(d.getDate()/7);
}

function getTurnoAlumnosDia(fechaStr){
  // Obtener turno de alumnos para una fecha concreta
  if(!DB.recreo||!DB.recreo.turnosAlumnos)return {};
  var p = fechaStr.split('-');
  var mes = p[0]+'-'+p[1];
  var rot = DB.recreo.rotacion||'semanal';
  var dias = getDiasLaborables(mes);
  var diaObj = dias.find(function(d){return d.fecha===fechaStr;});
  if(!diaObj)return {};
  var key;
  if(rot==='quincenal') key='Q'+(diaObj.sem<=2?1:2);
  else if(rot==='libre') key='Periodo 1';
  else key='S'+diaObj.sem;
  return (DB.recreo.turnosAlumnos[key])||{};
}

function publicarRecreoBttn(){
  var url = DB.scriptUrl;
  if(!url){alert('Configura la URL del script en Config.');return;}
  var turnosMes = DB.recreo.turnosMes[RECREO_MES_ACTUAL]||{};
  if(Object.keys(turnosMes).length===0){alert('Sin turnos para este mes.');return;}
  var zonas = DB.recreo.zonasPrimaria||[];
  var cursos = DB.recreo.cursosAlumnos||[];
  // Cabecera: Fecha, Dia, Infantil (maestros), zonas maestros, ALUMNOS: zonas alumnos
  var cabMaestros = ['Fecha','Dia','Infantil'].concat(zonas.map(function(z){return z.n;}));
  var cabAlumnos = zonas.map(function(z){return 'Alumnos: '+z.n;});
  var cabecera = cabMaestros.concat(cabAlumnos);
  var filas = [cabecera];
  Object.keys(turnosMes).sort().forEach(function(fecha){
    var t = turnosMes[fecha];
    var infStr = (t.infantil||[]).map(function(id){
      var m = DB.maestros.find(function(x){return String(x.id)===String(id);});
      return m?m.n:'?';
    }).join(', ');
    var fila = [fecha,t.diaSem,infStr];
    // Maestros por zona
    zonas.forEach(function(z){
      var slot = t.primaria&&t.primaria[z.id];
      fila.push(slot&&slot.maestroN?slot.maestroN:'');
    });
    // Alumnos por zona ese dia
    var tAlumnos = getTurnoAlumnosDia(fecha);
    zonas.forEach(function(z){
      var slotA = tAlumnos[z.id]||[];
      var nombresA = slotA.map(function(cid){
        var cu = cursos.find(function(x){return x.id===cid;});
        return cu?cu.n:'';
      }).filter(Boolean).join(', ');
      fila.push(nombresA);
    });
    filas.push(fila);
  });
  var cb = '_rec'+Date.now();
  window[cb] = function(r){
    delete window[cb];
    if(r&&r.ok){
      // Tambien aoadir eventos semanales a Agenda - Calendario RECREO
      agregarEventosRecreoAgenda();
      alert('Turnos publicados en San Sebastian Net y en Agenda correctamente.');
    } else {
      alert('Error al publicar: '+(r?r.error:'sin respuesta'));
    }
  };
  var datos = JSON.stringify({mes:RECREO_MES_ACTUAL,mesLabel:getMesLabel2(RECREO_MES_ACTUAL),filas:filas});
  var s = document.createElement('script');
  s.src = url+'?accion=publicarRecreo&callback='+cb+'&datos='+encodeURIComponent(datos);
  s.onerror = function(){delete window[cb];alert('Error de conexion.');};
  document.head.appendChild(s);
  setTimeout(function(){if(window[cb]){delete window[cb];alert('Timeout.');}},12000);
}

function agregarEventosRecreoAgenda(){
  if(!DB.agenda)DB.agenda=[];
  var turnosMes = DB.recreo.turnosMes[RECREO_MES_ACTUAL]||{};
  var zonas = DB.recreo.zonasPrimaria||[];
  var cursos = DB.recreo.cursosAlumnos||[];
  var p = RECREO_MES_ACTUAL.split('-');
  var mesKey = p[0]+'-'+p[1];

  // Eliminar eventos de recreo del mes actual en agenda
  DB.agenda = DB.agenda.filter(function(e){
    return !(e.calendario==='RECREO' && e.fecha && e.fecha.startsWith(mesKey));
  });

  // Agrupar dias por semana para crear 1 evento por semana
  var semanas = {};
  Object.keys(turnosMes).sort().forEach(function(fecha){
    var d = new Date(fecha+'T12:00:00');
    var sem = Math.ceil(d.getDate()/7);
    if(!semanas[sem])semanas[sem]=[];
    semanas[sem].push(fecha);
  });

  Object.keys(semanas).forEach(function(sem){
    var diasSem = semanas[sem].sort();
    var fechaIni = diasSem[0];
    var fechaFin = diasSem[diasSem.length-1];
    var d = new Date(fechaIni+'T12:00:00');
    var meses = ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    var titulo = 'Recreo Semana '+sem+' - '+parseInt(fechaIni.split('-')[2])+' al '+parseInt(fechaFin.split('-')[2])+' '+meses[d.getMonth()+1];

    // Construir descripcion con turno maestros + alumnos
    var desc = 'MAESTROS: ';
    // Usar el turno del primer dia de la semana como referencia
    var t = turnosMes[fechaIni]||{};
    var infNombres = (t.infantil||[]).map(function(id){
      var m = DB.maestros.find(function(x){return String(x.id)===String(id);});
      return m?m.n:'?';
    }).join(', ');
    desc += 'Infantil: '+infNombres+' + ';
    zonas.forEach(function(z){
      var slot = t.primaria&&t.primaria[z.id];
      if(slot&&slot.maestroN)desc += z.n+': '+slot.maestroN+' | ';
    });

    // Alumnos
    var tA = getTurnoAlumnosDia(fechaIni);
    if(Object.keys(tA).length>0){
      desc += ' ALUMNOS: ';
      zonas.forEach(function(z){
        var slotA = tA[z.id]||[];
        var nombresA = slotA.map(function(cid){
          var cu = cursos.find(function(x){return x.id===cid;});
          return cu?cu.n:'';
        }).filter(Boolean).join(', ');
        if(nombresA)desc += z.n+': '+nombresA+' | ';
      });
    }

    DB.agenda.push({
      titulo: titulo,
      fecha: fechaIni,
      horaIni: '11:00',
      horaFin: '11:30',
      calendario: 'RECREO',
      proyecto: '',
      descripcion: desc
    });
  });

  save();
}

function reasignarRecreoAuto(fecha, faltanIds){
  var t = getRecreoDelDia(fecha);
  if(!t)return;
  var p = fecha.split('-');
  var mes = p[0]+'-'+p[1];
  var zonas = DB.recreo.zonasPrimaria||[];
  var faltanSet = faltanIds.map(function(id){return String(id);});
  var yaEnRecreo = [];
  (t.infantil||[]).forEach(function(id){if(!faltanSet.includes(String(id)))yaEnRecreo.push(String(id));});
  zonas.forEach(function(z){
    var slot = t.primaria&&t.primaria[z.id];
    if(slot&&slot.maestroId&&!faltanSet.includes(String(slot.maestroId)))yaEnRecreo.push(String(slot.maestroId));
  });
  var disponibles = DB.maestros.filter(function(m){
    return!faltanSet.includes(String(m.id))&&!yaEnRecreo.includes(String(m.id))&&['PT','AL'].indexOf(m.e)<0;
  });
  // Reasignar infantil
  t.infantil = (t.infantil||[]).map(function(id){
    if(!faltanSet.includes(String(id)))return id;
    var s = disponibles.shift();
    return s?s.id:null;
  }).filter(function(id){return id!==null;});
  // Reasignar primaria
  zonas.forEach(function(z){
    var slot = t.primaria&&t.primaria[z.id];
    if(slot&&slot.maestroId&&faltanSet.includes(String(slot.maestroId))){
      var s = disponibles.shift();
      slot.maestroId = s?s.id:null;
      slot.maestroN = s?s.n:'';
      slot.sust = true;
    }
  });
  if(DB.recreo.turnosMes[mes])DB.recreo.turnosMes[mes][fecha]=t;
  save();
}

function genTurnosAlumnos(){
  initRecreo();
  var cursos = DB.recreo.cursosAlumnos||[];
  var zonas = DB.recreo.zonasPrimaria||[];
  var aforo = DB.recreo.zonaAforo||{};
  var rotacion = DB.recreo.rotacion||'semanal';
  var dias = getDiasLaborables(RECREO_MES_ACTUAL);
  if(cursos.length===0||zonas.length===0){
    alert('Anade cursos y zonas primero.');return;
  }

  // Calcular periodos segun rotacion
  var periodos = {};
  dias.forEach(function(d){
    var key;
    if(rotacion==='quincenal'){
      key = 'Q'+(d.sem<=2?1:2);
    } else if(rotacion==='libre'){
      key = 'Periodo 1';
    } else {
      key = 'S'+d.sem;
    }
    if(!periodos[key])periodos[key]=[];
    if(periodos[key].indexOf(d.fecha)<0)periodos[key].push(d.fecha);
  });

  var periodosKeys = Object.keys(periodos).sort();
  var turnos = {};

  // Para cada periodo, rotar los cursos por zonas
  // Calcular slots totales (suma de aforos)
  var totalSlots = zonas.reduce(function(acc,z){return acc+(aforo[z.id]||1);},0);

  periodosKeys.forEach(function(p,pi){
    turnos[p] = {};
    var offset = pi; // rotacion: cada periodo desplaza 1
    var cursoIdx = 0;
    var cursosRotados = cursos.slice(offset%cursos.length).concat(cursos.slice(0,offset%cursos.length));

    zonas.forEach(function(z){
      var slots = aforo[z.id]||1;
      turnos[p][z.id] = [];
      for(var s=0;s<slots;s++){
        if(cursoIdx<cursosRotados.length){
          turnos[p][z.id].push(cursosRotados[cursoIdx].id);
          cursoIdx++;
        }
      }
    });
  });

  DB.recreo.turnosAlumnos = turnos;
  save();
  renderRecreo();
}

    h+='</div>';
    h+='<div class="fg2">';
    h+='<div class="fr"><span class="fl">Hora inicio</span><input class="fi" type="time" id="ev-ini" value="'+(ev.horaIni||'09:00')+'"></div>';
    h+='<div class="fr"><span class="fl">Hora fin</span><input class="fi" type="time" id="ev-fin" value="'+(ev.horaFin||'10:00')+'"></div>';

      h+='<div class="fr"><span class="fl">Proyecto</span><input class="fi" type="text" id="ev-proyecto" value="'+(ev.proyecto||'')+'" placeholder="Nombre del proyecto..."></div>';
    }

    h+='<button class="btn bvd" style="flex:1" onclick="guardarEvento()">Guardar</button>';

}

function renderEventoCard(e,idx,cal,pasado){
  var h='<div style="background:#fff;border:1px solid #e2e8f0;border-left:4px solid '+cal.color+';border-radius:10px;padding:12px;margin-bottom:8px;'+(pasado?'opacity:.6':'')+'cursor:pointer" onclick="showEventoPanel('+idx+')">';
  h+='<div style="display:flex;justify-content:space-between;align-items:flex-start">';
  h+='<div style="flex:1">';
  h+='<div style="font-size:13px;font-weight:700">'+e.titulo+'</div>';
  h+='<div style="font-size:11px;color:#94a3b8;margin-top:2px">'+formatFecha(e.fecha)+(e.horaIni?' &bull; '+e.horaIni+'-'+e.horaFin:'')+'</div>';
  if(e.descripcion)h+='<div style="font-size:11px;color:#64748b;margin-top:3px">'+e.descripcion.substring(0,60)+(e.descripcion.length>60?'...':'')+'</div>';
  if(e.proyecto)h+='<div style="font-size:11px;color:#7c3aed;margin-top:2px;font-weight:600">Proyecto: '+e.proyecto+'</div>';
  h+='</div>';
  h+='<span style="font-size:18px;color:#94a3b8">&#8250;</span>';
  h+='</div></div>';
  return h;
}

function showEventoPanel(idx){
  AGENDA_PANEL=true;
  AGENDA_EDIT_IDX=idx;
  renderAgenda();
}

function guardarEvento(){
  var titulo=(document.getElementById('ev-titulo')||{}).value||'';
  if(!titulo){alert('El titulo es obligatorio');return;}
  var ev={
    titulo:titulo,
    fecha:(document.getElementById('ev-fecha')||{}).value||'',
    horaIni:(document.getElementById('ev-ini')||{}).value||'',
    horaFin:(document.getElementById('ev-fin')||{}).value||'',
    calendario:(document.getElementById('ev-cal')||{}).value||AGENDA_CAL,
    proyecto:(document.getElementById('ev-proyecto')||{}).value||'',
    descripcion:(document.getElementById('ev-desc')||{}).value||''
  };
  if(!DB.agenda)DB.agenda=[];
  if(AGENDA_EDIT_IDX>=0){
    DB.agenda[AGENDA_EDIT_IDX]=ev;
  } else {
    DB.agenda.push(ev);
  }
  AGENDA_CAL=ev.calendario;
  AGENDA_PANEL=false;
  save();
  renderAgenda();
}

function eliminarEvento(idx){
  if(!confirm('Eliminar este evento?'))return;
  DB.agenda.splice(idx,1);
  AGENDA_PANEL=false;
  save();
  renderAgenda();
}

function publicarCalendarioSSN(calId){
  var url=DB.scriptUrl;
  if(!url){alert('Configura la URL del script en Config.');return;}
  var eventos=getEventosCal(calId);
  if(eventos.length===0){alert('No hay eventos en este calendario.');return;}
  var cb='_cal'+Date.now();
  window[cb]=function(r){
    delete window[cb];
    if(r&&r.ok)alert('Calendario publicado en San Sebastian Net correctamente.');
    else alert('Error: '+(r?r.error:'sin respuesta'));
  };
  var datos=JSON.stringify({calId:calId,eventos:eventos});
  var s=document.createElement('script');
  s.src=url+'?accion=publicarCalendario&callback='+cb+'&datos='+encodeURIComponent(datos);
  s.onerror=function(){delete window[cb];alert('Error de conexion.');};
  document.head.appendChild(s);
  setTimeout(function(){if(window[cb]){delete window[cb];alert('Timeout.');}},10000);
}

function updBoja(el){

  DB.bojaHoras[area][ci]=parseFloat(el.value)||0;
  save();
}

function addCoord(){
  var n=(document.getElementById('new-co-n')||{}).value||'';
  var h=+(document.getElementById('new-co-h')||{}).value||0;
  if(!n){alert('Escribe el nombre de la coordinacion');return;}
  if(!DB.coordinaciones)DB.coordinaciones=[];
  DB.coordinaciones.push({id:'c'+Date.now(),n:n,h:h,activo:true});
  save();renderConfig();
}
function delCoord(i){
  var cid=DB.coordinaciones[i].id;
  DB.coordinaciones.splice(i,1);
  // Quitar de todos los maestros
  DB.maestros.forEach(function(m){
    if(m.coords){var ix=m.coords.indexOf(cid);if(ix>=0)m.coords.splice(ix,1);}
  });
  save();renderConfig();
}

function diagSync(){
  var url=DB.scriptUrl;
  if(!url){alert('Sin URL de script en Config.');return;}
  var cb='_diag'+Date.now();
  var src=url+'?accion=leer&callback='+cb+'&_='+Date.now();
  window[cb]=function(r){
    delete window[cb];
    var el=document.getElementById('jsonp_diag');
    if(el&&el.parentNode)el.parentNode.removeChild(el);
    if(!r){alert('El script no respondio. Comprueba que esta publicado con acceso: Cualquier persona.');return;}
    if(!r.ok){alert('Error del script: '+r.error);return;}
    var data=r.data||{};
    var msg='Respuesta del script:\n\n';
    msg+='maestros: '+(data.maestros?data.maestros.length+' filas':'NO hay')+'\n';
    msg+='carga: '+(data.carga?data.carga.length+' filas':'NO hay')+'\n';
    msg+='coords: '+(data.coords?data.coords.length+' filas':'NO hay')+'\n\n';
    if(data.maestros&&data.maestros.length>0){
      msg+='Cabecera maestros: '+JSON.stringify(data.maestros[0])+'\n';
      if(data.maestros.length>1)msg+='Fila 1: '+JSON.stringify(data.maestros[1])+'\n';
    }
    alert(msg);
  };
  var s=document.createElement('script');
  s.id='jsonp_diag';
  s.src=src;
  s.onerror=function(){
    delete window[cb];
    alert('ERROR de conexion. El script no acepta la peticion.\n\nComprueba:\n1. Acceso: Cualquier persona\n2. Nueva version al reimplementar');
  };
  document.head.appendChild(s);
  setTimeout(function(){
    if(window[cb]){
      delete window[cb];
      alert('TIMEOUT - el script no responde en 10 segundos.');
    }
  },10000);
}

function diagHoras(){
  var out='=== DIAGNOSTICO HORAS ===\n\n';
  out+='hGrupos: '+DB.hGrupos.length+'\n';
  out+='hMat: '+DB.hMat.length+'\n\n';
  out+='=== hCarga ===\n';
  var tieneAsig=false;
  DB.hGrupos.forEach(function(g){
    var carga=DB.hCarga[g.id]||{};
    DB.hMat.forEach(function(mat){
      var cv=carga[mat.id];
      if(cv&&cv.m){
        tieneAsig=true;
        var hBoja=getBojaH(g.id,mat.id);
        out+=g.n+' / '+mat.n+' -> maestro id='+cv.m+' tipo='+typeof cv.m+' hBoja='+hBoja+'\n';
      }
    });
  });
  if(!tieneAsig)out+='(vacio - no hay asignaciones guardadas)\n';
  out+='\n=== hA() por maestro ===\n';
  DB.maestros.forEach(function(m){
    var ha=hA(m);
    if(ha>0||m.cargo)out+=m.n+' (id='+m.id+' tipo='+typeof m.id+'): hA='+ha+'h hd='+hd(m).toFixed(1)+'h\n';
  });
  alert(out);
}

function testLS(){
  var res=document.getElementById('ls-res');
  try{
    localStorage.setItem('_test','ok');
    if(localStorage.getItem('_test')!=='ok')throw new Error('No persiste');
    localStorage.removeItem('_test');
    save();
    var chk=localStorage.getItem(KDAT);
    if(chk&&chk.length>100){
      var d=JSON.parse(chk);
      res.innerHTML='<span style="color:#15803d;font-weight:700">OK localStorage funciona. '+Math.round(chk.length/1024)+'KB. Primer maestro: '+d.maestros[0].n+'</span>';
    }else{
      res.innerHTML='<span style="color:#b91c1c;font-weight:700">ERROR - localStorage no guarda. Comprueba modo privado.</span>';
    }
  }catch(e){
    res.innerHTML='<span style="color:#b91c1c;font-weight:700">ERROR: '+e.message+'</span>';
  }
}

function testConex(){
  var url=(document.getElementById('inp-script')||{}).value||DB.scriptUrl;
  if(!url){alert('Introduce la URL del script.');return;}
  var cb='_test'+Date.now();

  s.onerror=function(){delete window[cb];alert('Error de conexion con el script.');};
  document.head.appendChild(s);
  setTimeout(function(){if(window[cb]){delete window[cb];alert('Timeout - Script no responde.');}},5000);
}

function saveConex(){
  DB.scriptUrl=(document.getElementById('inp-script')||{}).value||'';

}

function savePwd(){
  var v=((document.getElementById('inp-pwd')||{}).value||'').trim();
  if(!v||v.length<4){alert('Minimo 4 caracteres');return;}
  localStorage.setItem('ceip_pwd_v7',v);

function resetData(){
  if(!confirm('RESETEAR TODOS LOS DATOS? Esta accion no se puede deshacer.'))return;
  localStorage.removeItem(KDAT);
  DB=DEF();
  save();
  renderPlantillaHome();
  alert('Datos reseteados.');
}


function doLogin(){
  var v=(document.getElementById('login-pwd')||{}).value||'';
  var pwd=localStorage.getItem('ceip_pwd_v7')||'ceip2025';
  if(v===pwd||v==='ceip2025'){
    localStorage.setItem('ceip_ok','1');
    document.getElementById('login').style.display='none';
    document.getElementById('app').classList.add('visible');
    startApp();
  } else {
    document.getElementById('login-err').style.display='block';
    document.getElementById('login-pwd').value='';
    document.getElementById('login-pwd').focus();
    if(navigator.vibrate)navigator.vibrate([100,50,100]);
  }
}

function resetPwd(){
  if(confirm('Resetear contrasena a ceip2025?')){
    localStorage.removeItem('ceip_pwd_v7');
    alert('Contrasena reseteada. Usa: ceip2025');
  }
}

function checkLogin(){
  if(localStorage.getItem('ceip_ok')==='1'){
    document.getElementById('login').style.display='none';
    document.getElementById('app').classList.add('visible');
    startApp();
    return;
  }
  document.getElementById('login').style.display='flex';
  document.getElementById('app').classList.remove('visible');
  setTimeout(function(){
    var el=document.getElementById('login-pwd');
    if(el){el.focus();el.value='';}
  },100);
}

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',checkLogin);
} else {
  checkLogin();
}
