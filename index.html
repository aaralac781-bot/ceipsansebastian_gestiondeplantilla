function load(){
  var raw=null;
  try{raw=localStorage.getItem(KDAT);}catch(e){}
  if(raw&&raw.length>100){
    try{
      DB=JSON.parse(raw);
      if(!DB.maestros||DB.maestros.length===0)DB=DEF();
      if(!DB.tramos||DB.tramos.length===0)DB.tramos=DEF().tramos;
      if(!DB.materias)DB.materias=DEF().materias;
      if(!DB.hGrupos)DB.hGrupos=DEF().hGrupos;
      if(!DB.hMat)DB.hMat=DEF().hMat;
      if(!DB.hCarga)DB.hCarga={};
      if(!DB.hHor)DB.hHor={};
      if(!DB.hJornada)DB.hJornada=DEF().hJornada;
      if(!DB.bojaHoras)DB.bojaHoras=DEF().bojaHoras;
      // Sincronizar grupos al cargar
      if(DB.hGrupos&&DB.hGrupos.length>0){
        var CURSOS2=['1o','2o','3o','4o','5o','6o'];
        CURSOS2.forEach(function(cv){DB.grupos['_'+cv]=0;});
        DB.hGrupos.forEach(function(g){
          var k='_'+g.niv;
          if(DB.grupos[k]!==undefined)DB.grupos[k]++;
        });
      }
      if(!DB.coordinaciones)DB.coordinaciones=DEF().coordinaciones;
      DB.maestros.forEach(function(m){
        if(!m.coords)m.coords=[];
      });
      if(!DB.scriptUrl)DB.scriptUrl='';
      DB.maestros.forEach(function(m){if(!m.asig)m.asig=[];if(!m.gRef)m.gRef='';});
      return true;
    }catch(e){DB=null;}
  }
  DB=DEF();
  return false;
}

function fmt(mn){var h=Math.floor(mn/60),m=mn%60;return(h<10?'0':'')+h+':'+(m<10?'0':'')+m;}
function hhmm(){var d=new Date();return(d.getHours()<10?'0':'')+d.getHours()+':'+(d.getMinutes()<10?'0':'')+d.getMinutes();}
function hCoordTotal(m){
  var total=0;
  (m.coords||[]).forEach(function(cid){
    var co=(DB.coordinaciones||[]).find(function(x){return x.id===cid;});
    if(co)total+=co.h||0;
  });
  return total;
}
function hd(m){
  return Math.max(0,J-(m.rC||0)-(m.rE||0)-(m.rJ||0)-hCoordTotal(m));
}
function hA(m){
  if(!DB||!DB.hCarga||!DB.hGrupos||!DB.hMat)return 0;
  var total=0;
  var mid=String(m.id); // comparar como string siempre
  DB.hGrupos.forEach(function(g){
    var carga=DB.hCarga[g.id]||{};
    DB.hMat.forEach(function(mat){
      var cv=carga[mat.id];
      if(cv&&String(cv.m)===mid){
        var hBoja=getBojaH(g.id,mat.id);
        total+=hBoja>0?hBoja:(hBoja===-1?(cv.h||0):0);
      }
    });
  });
  return total;
}
function hL(m){return Math.max(0,hd(m)-hA(m));}

function barra(m){var d=hd(m),a=hA(m),exc=a>d,pct=d>0?Math.min(100,a/d*100):0;var col=exc?'#b91c1c':pct>90?'#d97706':'#15803d';return '<div class="hbar"><div class="ht"><div class="hf" style="width:'+pct.toFixed(0)+'%;background:'+col+'"></div></div><span style="font-size:11px;font-weight:700;color:'+col+'">'+a.toFixed(1)+'h/'+d.toFixed(1)+'h</span>'+(exc?bdg('EXCESO','rd'):Math.abs(d-a)<.3?bdg('OK','gn'):bdg(hL(m).toFixed(1)+'h libres','gy'))+'</div>';}

function getCiclo(n){if(!n)return null;n=n.replace(/[A-Fa-f]/g,'').trim();if(n.indexOf('anos')>=0)return'Infantil';if(n==='1o'||n==='2o')return'Primero';if(n==='3o'||n==='4o')return'Segundo';if(n==='5o'||n==='6o')return'Tercero';return null;}

function setSync(t,txt){

  d.className='sdot'+(t==='ok'?' ok':t==='err'?' err':t==='spin'?' spin':'');

function doSync(){
  var ok=save();
  if(!ok)return;
  var url=DB.scriptUrl;
  if(!url){setSync('ok','Guardado '+hhmm());return;}
  setSync('spin','Subiendo...');
  // Usar fetch POST para evitar limite de URL en GET
  // Sustituciones: recoger de localStorage
  var sust={};
  ['Lunes','Martes','Miercoles','Jueves','Viernes'].forEach(function(d){
    var k='sust_'+d;
    try{var v=localStorage.getItem(k);if(v)sust[d]=JSON.parse(v);}catch(e){}
  });
  var datos={
    maestros:DB.maestros,
    grupos:DB.grupos,
    coordinaciones:DB.coordinaciones||[],
    hCarga:DB.hCarga||{},
    hGrupos:DB.hGrupos||[],
    hMat:DB.hMat||[],
    hHor:DB.hHor||{},
    tramos:DB.tramos||[],
    bojaHoras:DB.bojaHoras||{},
    sust:sust
  };
  var body='accion=guardar&datos='+encodeURIComponent(JSON.stringify(datos));
  fetch(url,{
    method:'POST',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:body
  })
  .then(function(r){return r.text();})
  .then(function(txt){
    try{
      var r=JSON.parse(txt);
      setSync(r.ok?'ok':'err', r.ok?'Sheets '+hhmm():'Error Sheets');
    }catch(e){
      setSync('ok','Sheets '+hhmm());
    }
  })
  .catch(function(e){
    // Si POST falla por CORS, intentar con JSONP GET dividido
    setSync('spin','Reintentando...');
    var id='_jp'+Date.now();
    window[id]=function(r){
      delete window[id];
      var el=document.getElementById('jp_'+id);
      if(el&&el.parentNode)el.parentNode.removeChild(el);
      setSync(r&&r.ok?'ok':'ok','Sheets '+hhmm());
    };
    var datos2={maestros:DB.maestros,grupos:DB.grupos,coordinaciones:DB.coordinaciones||[]};
    var s=document.createElement('script');
    s.id='jp_'+id;
    s.src=url+'?accion=guardar&callback='+id+'&datos='+encodeURIComponent(JSON.stringify(datos2));
    s.onerror=function(){delete window[id];setSync('ok','Local '+hhmm());};
    document.head.appendChild(s);
    setTimeout(function(){if(window[id]){delete window[id];setSync('ok','Local '+hhmm());}},8000);
  });
}

function _aplicarDatos(data){
  // Procesar maestros
  if(data.maestros&&data.maestros.length>1){
    var cab=data.maestros[0];
    function ci(n){for(var i=0;i<cab.length;i++)if(String(cab[i]).toLowerCase().replace(/[_\s]/g,'')==n.toLowerCase().replace(/[_\s]/g,''))return i;return -1;}
    var iId=ci('id'),iN=ci('nombre'),iE=ci('especialidad'),iCa=ci('cargo');
    var iRC=ci('redcargo'),iRE=ci('rededad'),iRJ=ci('redjornada');
    var iT=ci('estudor'),iG=ci('grupotutor'),iRef=ci('esrefuerzo');
    var iRT=ci('tiporefuerzo'),iPl=ci('coordplan'),iHC=ci('horascoord');
    var iAs=ci('asig'),iGR=ci('gruporef'),iCo=ci('coords');
    var mae=[];
    for(var i=1;i<data.maestros.length;i++){
      var row=data.maestros[i];
      if(!row[iN])continue;
      var asig=[];try{if(row[iAs])asig=JSON.parse(row[iAs]);}catch(e){}
      var coords=[];try{if(row[iCo])coords=JSON.parse(row[iCo]);}catch(e){}
      mae.push({
        id:parseInt(row[iId])||i,
        n:String(row[iN]),e:String(row[iE]||'Primaria'),
        cargo:String(row[iCa]||''),
        rC:parseFloat(row[iRC])||0,rE:parseFloat(row[iRE])||0,rJ:parseFloat(row[iRJ])||0,
        coord:0,hC:parseFloat(row[iHC])||0,
        t:String(row[iT]).toUpperCase()==='SI',g:String(row[iG]||''),
        ref:String(row[iRef]).toUpperCase()==='SI',rT:String(row[iRT]||''),
        plan:String(row[iPl]||''),gRef:String(row[iGR]||''),
        asig:asig,coords:coords
      });
    }
    if(mae.length>0)DB.maestros=mae;
  }
  // Procesar hCarga
  if(data.carga&&data.carga.length>1){
    DB.hCarga={};
    for(var i=1;i<data.carga.length;i++){
      var row=data.carga[i];
      var gid=String(row[0]),mid=String(row[1]),datos=row[2];
      if(!gid||!mid)continue;
      if(!DB.hCarga[gid])DB.hCarga[gid]={};
      try{DB.hCarga[gid][mid]=JSON.parse(datos);}catch(e){}
    }
  }
  // Procesar coordinaciones
  if(data.coords&&data.coords.length>1){
    DB.coordinaciones=[];
    for(var i=1;i<data.coords.length;i++){
      var row=data.coords[i];
      if(!row[0]||!row[1])continue;
      DB.coordinaciones.push({
        id:String(row[0]),n:String(row[1]),
        h:parseFloat(row[2])||0,
        activo:String(row[3]).toUpperCase()==='SI'
      });
    }
  }
  // Procesar extras (hGrupos, hMat, tramos, bojaHoras, hHor, sust)
  if(data.hGrupos&&data.hGrupos.length>0)DB.hGrupos=data.hGrupos;
  if(data.hMat&&data.hMat.length>0)DB.hMat=data.hMat;
  if(data.tramos&&data.tramos.length>0)DB.tramos=data.tramos;
  if(data.bojaHoras&&Object.keys(data.bojaHoras).length>0)DB.bojaHoras=data.bojaHoras;
  if(data.hHor&&Object.keys(data.hHor).length>0)DB.hHor=data.hHor;
  if(data.sust&&Object.keys(data.sust).length>0){
    Object.keys(data.sust).forEach(function(d){
      try{localStorage.setItem('sust_'+d,JSON.stringify(data.sust[d]));}catch(e){}
    });
  }
  save();
}

function recibirCambios(){
  var url=DB.scriptUrl;
  if(!url){alert('Configura primero la URL del script en Config.');return;}
  if(!confirm('Cargar datos de Sheets?\nSe sobreescribiran los datos locales con los del servidor.'))return;
  setSync('spin','Descargando...');
  var cb='_rcb'+Date.now();
  var src=url+'?accion=leer&callback='+cb+'&_='+Date.now();
  window[cb]=function(r){
    delete window[cb];
    var el=document.getElementById('jsonp_rcb');
    if(el&&el.parentNode)el.parentNode.removeChild(el);
    if(!r||!r.ok){setSync('err','Error al leer');alert('Error al leer de Sheets');return;}

    setSync('ok','Sheets '+hhmm());
    var msg='Recibido correctamente:\n';
    msg+='- '+DB.maestros.length+' maestros\n';
    var nCarga=Object.keys(DB.hCarga||{}).length;
    msg+='- '+nCarga+' grupos con asignaciones\n';
    msg+='- '+(DB.coordinaciones||[]).length+' coordinaciones\n\nLa app se recarga ahora.';
    alert(msg);
    location.reload(true);
  };
  var s=document.createElement('script');
  s.id='jsonp_rcb';
  s.src=src;
  s.onerror=function(){delete window[cb];setSync('err','Error de conexion');alert('No se pudo conectar con el script.');};
  document.head.appendChild(s);
  setTimeout(function(){if(window[cb]){delete window[cb];setSync('err','Timeout');alert('Timeout - el script no responde.');}},10000);
}

function parseCSV(csv){
  var lin=csv.split('\n').filter(function(l){return l.trim();});
  if(lin.length<2)return null;
  var cab=parseLine(lin[0]).map(function(h){return h.toLowerCase().replace(/[_\s]/g,'');});
  function ci(n){var i=cab.indexOf(n.toLowerCase().replace(/[_\s]/g,''));return i>=0?i:-1;}
  var IX={id:ci('id')||0,n:ci('nombre')||1,e:ci('especialidad')||2,cargo:ci('cargo')||3,
    rC:ci('redcargo')||4,rE:ci('rededad')||5,rJ:ci('redjornada')||6,
    coord:ci('coordinacion')||7,hC:ci('horascoord')||13,t:ci('estudor')||8,g:ci('grupotutor')||9,
    ref:ci('esrefuerzo')||10,rT:ci('tiporefuerzo')||11,plan:ci('coordplan')||12,
    asig:ci('asig'),gRef:ci('gruporef')};
  var res=[];
  for(var i=1;i<lin.length;i++){
    var r=parseLine(lin[i]);
    var n=trimq(r[IX.n]);if(!n)continue;
    var asig=[];
    if(IX.asig>=0){try{var raw=trimq(r[IX.asig]);if(raw&&raw.length>2)asig=JSON.parse(raw);}catch(e){}}
    var gRef=IX.gRef>=0?trimq(r[IX.gRef]):'';
    if(!gRef)gRef=trimq(r[IX.g])||'';
    res.push({id:parseInt(r[IX.id])||i,n:n,e:trimq(r[IX.e])||'Primaria',
      cargo:trimq(r[IX.cargo]),rC:parseFloat(r[IX.rC])||0,rE:parseFloat(r[IX.rE])||0,
      rJ:parseFloat(r[IX.rJ])||0,coord:parseFloat(r[IX.coord])||0,
      hC:parseFloat(r[IX.hC])||0,t:(trimq(r[IX.t])||'').toUpperCase()==='SI',
      g:trimq(r[IX.g]),ref:(trimq(r[IX.ref])||'').toUpperCase()==='SI',
      rT:trimq(r[IX.rT]),plan:trimq(r[IX.plan]),gRef:gRef,asig:asig});
  }
  return res.length?res:null;
}
function parseLine(l){var r=[],c='',q=false;for(var i=0;i<l.length;i++){var ch=l[i];if(ch==='"'){if(q&&l[i+1]==='"'){c+='"';i++;}else q=!q;}else if(ch===','&&!q){r.push(c);c='';}else c+=ch;}r.push(c);return r;}
function trimq(s){return(s||'').replace(/^"|"$/g,'').replace(/""/g,'"').trim();}

function autoRecibir(){
  var url=DB.scriptUrl;
  if(!url)return;
  var id='_auto'+Date.now();
  window[id]=function(r){
    delete window[id];
    var el=document.getElementById('jp_auto');
    if(el&&el.parentNode)el.parentNode.removeChild(el);
    if(!r||!r.ok){setSync('','Local');return;}
    var data=r.data||{};
    var huboMaestros=false;
    // Aplicar datos si los hay
    if(data.maestros&&data.maestros.length>1){
      huboMaestros=true;
      // Reusar logica de recibirCambios
      _aplicarDatos(data);
    }
    localStorage.setItem('ceip_last_sync',String(Date.now()));
    setSync('ok','Auto '+hhmm());
    if(huboMaestros){
      renderPlantillaHome();
      renderHorariosHome();
      var secAbierta=document.querySelector('.sec.on');
      if(secAbierta)renderSec(secAbierta.id.replace('s-',''));
    }
  };
  var s=document.createElement('script');
  s.id='jp_auto';
  s.src=url+'?accion=leer&callback='+id+'&_='+Date.now();
  s.onerror=function(){delete window[id];setSync('','Local');};
  document.head.appendChild(s);
  setTimeout(function(){if(window[id]){delete window[id];setSync('','Local');}},8000);
}

function calcNecesidades(){
  // Horas totales necesarias por area segun BOJA y numero de grupos
  var CURSOS2=['1o','2o','3o','4o','5o','6o'];
  var areas=['len','mat','cono','ing','ef','art','fra','rel','val','aut'];
  var nec={};
  areas.forEach(function(a){nec[a]=0;});
  CURSOS2.forEach(function(cv,ci){
    var ng=DB.grupos['_'+cv]||0;
    areas.forEach(function(a){
      var bh=(DB.bojaHoras&&DB.bojaHoras[a])?DB.bojaHoras[a][ci]:0;
      nec[a]+=(bh||0)*ng;
    });
  });
  return nec;
}

function calcDisponibles(){
  // Horas disponibles por especialidad
  var disp={EF:0,Ingles:0,Frances:0,Musica:0,Primaria:0,Infantil:0,PT:0,AL:0};
  DB.maestros.forEach(function(m){
    disp[m.e]=(disp[m.e]||0)+hd(m);
  });
  return disp;
}

function updCargo(id,cargo){
  for(var i=0;i<DB.maestros.length;i++){
    if(DB.maestros[i].id===id){
      DB.maestros[i].cargo=cargo;
      // NO tocar rC - el usuario lo introduce manualmente
      break;
    }
  }
  try{localStorage.setItem(KDAT,JSON.stringify(DB));setSync('ok','Guardado '+hhmm());}catch(e){}
  rClaustro();
}

function updCoordEl(el){
  var id=parseInt(el.getAttribute('data-mid'));
  var cid=el.getAttribute('data-cid');
  updCoord(id,cid,el.checked);
}
function updCoord(id,cid,add){
  for(var i=0;i<DB.maestros.length;i++){
    if(DB.maestros[i].id===id){
      if(!DB.maestros[i].coords)DB.maestros[i].coords=[];
      var idx=DB.maestros[i].coords.indexOf(cid);
      if(add&&idx<0)DB.maestros[i].coords.push(cid);
      if(!add&&idx>=0)DB.maestros[i].coords.splice(idx,1);
      // Recalcular hC (horas de coordinacion)
      var totalH=0;
      DB.maestros[i].coords.forEach(function(ci){
        var co=(DB.coordinaciones||[]).find(function(x){return x.id===ci;});
        if(co)totalH+=co.h||0;
      });
      DB.maestros[i].hC=totalH;
      break;
    }
  }
  try{localStorage.setItem(KDAT,JSON.stringify(DB));setSync('ok','Guardado '+hhmm());}catch(e){}
  rClaustro();
}

function togMc(id){EXP=(EXP===id?null:id);rClaustro();}

function updF(id,k,v){

function getBojaH(gid,mid){
  var g=DB.hGrupos.find(function(x){return x.id===gid;});
  if(!g)return -1;
  var CURSOS2=['1o','2o','3o','4o','5o','6o'];
  var ci=CURSOS2.indexOf(g.niv);
  // Si el nivel no es de Primaria (Infantil u otro) -> horas editables
  if(ci<0)return -1;
  var mat=DB.hMat.find(function(m){return m.id===mid;});
  if(!mat)return -1;
  var keyMap={
    'E.F.':'ef','Ingles':'ing','Frances':'fra','Musica':'mus',
    'Plastica':'plas','Artistica':'plas','Lengua':'len','Matematicas':'mat',
    'Cono.Medio':'cono','Religion/AE':'rel','Ed.Valores':'val',
    'Autonomia':'aut','Libre Disp.':'aut'
  };
  var key=null;
  Object.keys(keyMap).forEach(function(k){
    if(mat.n.toLowerCase().indexOf(k.toLowerCase())>=0)key=keyMap[k];
  });
  if(!key)return -1; // materia sin clave BOJA -> editable
  var h=(DB.bojaHoras&&DB.bojaHoras[key])?DB.bojaHoras[key][ci]||0:0;
  return h; // puede ser 0 (materia no impartida en ese curso) o >0
}

function getHorasAsignadas(mId){
  var total=0;
  DB.hGrupos.forEach(function(g){
    var carga=DB.hCarga[g.id]||{};
    DB.hMat.forEach(function(mat){
      var cv=carga[mat.id];
      if(cv&&cv.m===mId){
        var hBoja=getBojaH(g.id,mat.id);
        // Si BOJA tiene horas definidas, usar esas; si es editable usar las guardadas
        total+=hBoja>0?hBoja:(hBoja===-1?(cv.h||0):0);
      }
    });
  });
  return total;
}

function setMaestroEl(el){
  var gid=el.getAttribute('data-gid');
  var mid=el.getAttribute('data-mid');
  var mId=el.value;
  if(!DB.hCarga[gid])DB.hCarga[gid]={};
  if(!DB.hCarga[gid][mid])DB.hCarga[gid][mid]={h:0,m:''};
  DB.hCarga[gid][mid].m=mId;
  var hBoja=getBojaH(gid,mid);
  var horas=hBoja>0?hBoja:(DB.hCarga[gid][mid].h||0);
  // Quitar del maestro anterior
  DB.maestros.forEach(function(m){
    if(String(m.id)!==String(mId)&&m.asig){
      m.asig=m.asig.filter(function(a){return!(a.gid===gid&&a.mid===mid);});
    }
  });
  // Asignar al nuevo
  if(mId){
    var m=DB.maestros.find(function(x){return String(x.id)===String(mId);});
    if(m){
      if(!m.asig)m.asig=[];
      var ex=m.asig.find(function(a){return a.gid===gid&&a.mid===mid;});
      if(ex)ex.h=horas;
      else m.asig.push({gid:gid,mid:mid,h:horas});
    }
  }
  save();
  rHCarga();
}

var SLOT_TIPOS={
  clase:{bg:'',c:'',label:'Clase'},
  despacho:{bg:'#fef3c7',c:'#92400e',label:'Despacho'},
  coord:{bg:'#ede9fe',c:'#6d28d9',label:'Coordinacion'},

  libre:{bg:'#f1f5f9',c:'#64748b',label:'Libre/Refuerzo'}
};

function getHorGrupo(gid){
  if(!DB.hHor)DB.hHor={};
  if(!DB.hHor[gid]){
    DB.hHor[gid]={};
    ['Lunes','Martes','Miercoles','Jueves','Viernes'].forEach(function(d){
      DB.hHor[gid][d]=DB.tramos.map(function(t){
        return{mId:null,pId:null,fij:false,r:t.r,tipo:'clase',txt:''};
      });
    });
  }
  return DB.hHor[gid];
}

function getMaestroHor(mid){
  // Horario del maestro: combina grupos + slots propios (despacho, coord, reduccion)
  var DIAS2=['Lunes','Martes','Miercoles','Jueves','Viernes'];
  var horMae={};
  DIAS2.forEach(function(d){
    horMae[d]=DB.tramos.map(function(t,ti){
      if(t.r)return{r:true};
      // Buscar en grupos
      var enGrupo=null;
      DB.hGrupos.forEach(function(g){
        var hG=DB.hHor&&DB.hHor[g.id];
        if(!hG||!hG[d]||!hG[d][ti])return;
        var slot=hG[d][ti];
        if(slot&&String(slot.pId)===String(mid)){
          var mat=slot.mId?DB.hMat.find(function(m){return m.id===slot.mId;}):null;
          enGrupo={mId:slot.mId,pId:slot.pId,grupo:g.n,matNombre:mat?mat.n:'',tipo:'clase'};
        }
      });
      if(enGrupo)return enGrupo;
      // Slot propio del maestro (despacho, coord, reduccion)
      var kMae='mae_'+mid;
      if(!DB.hHor[kMae])return{mId:null,pId:null,tipo:'libre',txt:''};
      var hM=DB.hHor[kMae];
      if(hM[d]&&hM[d][ti])return hM[d][ti];
      return{mId:null,pId:null,tipo:'libre',txt:''};
    });
  });
  return horMae;
}

function getHorMaePropio(mid){
  var kMae='mae_'+mid;
  if(!DB.hHor)DB.hHor={};
  if(!DB.hHor[kMae]){
    DB.hHor[kMae]={};
    ['Lunes','Martes','Miercoles','Jueves','Viernes'].forEach(function(d){
      DB.hHor[kMae][d]=DB.tramos.map(function(t){
        return{mId:null,pId:null,fij:false,r:t.r,tipo:'libre',txt:''};
      });
    });
  }
  return DB.hHor[kMae];
}

function genHorario(){
  if(!confirm('Generar horario automatico?\nSe respetan las celdas fijadas manualmente.'))return;
  var DIAS2=['Lunes','Martes','Miercoles','Jueves','Viernes'];
  DB.hGrupos.forEach(function(g){
    var hor=getHorGrupo(g.id);
    var carga=DB.hCarga[g.id]||{};
    // Construir lista de (materia, maestro, horas restantes)
    var tareas=[];
    DB.hMat.forEach(function(mat){
      var cv=carga[mat.id];
      if(!cv||!cv.m)return;
      var activa=(DB.hCarga[g.id]._activas||{})[mat.id];
      if(activa===false)return;
      var hBoja=getBojaH(g.id,mat.id);
      var horas=hBoja>0?hBoja:(cv.h||0);
      var modulos=Math.round(horas*60/(DB.tramos.filter(function(t){return !t.r;})[0]||{dur:45}).dur);
      for(var i=0;i<modulos;i++)tareas.push({mId:mat.id,pId:cv.m});
    });
    // Distribuir en huecos libres no fijados
    var huecos=[];
    DIAS2.forEach(function(d){
      DB.tramos.forEach(function(t,ti){
        if(t.r)return;
        var slot=hor[d]&&hor[d][ti]?hor[d][ti]:{};
        if(!slot.fij&&!slot.mId&&!(slot.tipo&&slot.tipo!=='clase')){
          huecos.push({d:d,ti:ti});
        }
      });
    });
    // Mezclar huecos para distribuir entre dias
    huecos.sort(function(){return Math.random()-.5;});
    var ti2=0;
    tareas.forEach(function(tarea){
      if(ti2>=huecos.length)return;
      var h2=huecos[ti2++];
      if(!hor[h2.d])hor[h2.d]=[];
      if(!hor[h2.d][h2.ti])hor[h2.d][h2.ti]={};
      hor[h2.d][h2.ti].mId=tarea.mId;
      hor[h2.d][h2.ti].pId=tarea.pId;
      hor[h2.d][h2.ti].tipo='clase';
    });
  });
  save();rHHorario();
  alert('Horario generado. Revisa y ajusta manualmente si es necesario.');
}

function limpiarHorario(){
  if(!confirm('Limpiar horario?\nSe respetan las celdas fijadas.'))return;
  DB.hGrupos.forEach(function(g){
    var hor=DB.hHor[g.id];
    if(!hor)return;
    ['Lunes','Martes','Miercoles','Jueves','Viernes'].forEach(function(d){
      if(!hor[d])return;
      hor[d].forEach(function(slot){
        if(!slot.fij){slot.mId=null;slot.pId=null;slot.tipo='clase';slot.txt='';}
      });
    });
  });
  save();rHHorario();
}

function getSustKey(dia){return 'sust_'+dia;}

function priSust(m,gid,cicloD){
  if((m.asig||[]).some(function(a){return a.gid===gid;}))return 0;
  var cM=getCiclo((m.gRef||m.g||'').replace(/[A-Fa-f]/g,''));
  if(cM===cicloD)return 1;
  var adj={Primero:['Segundo','Infantil'],Segundo:['Primero','Tercero'],Tercero:['Segundo'],Infantil:['Primero']};
  if(cM&&cicloD&&(adj[cicloD]||[]).indexOf(cM)>=0)return 2;
  return 3;
}

function genTabla(){
  var tbl=loadSust(SUST_DIA);
  SUST_FALTAN.forEach(function(mFId){
    var mF=DB.maestros.find(function(m){return m.id===mFId;});if(!mF)return;
    var grupos=[];(mF.asig||[]).forEach(function(a){if(grupos.indexOf(a.gid)<0)grupos.push(a.gid);});if(mF.t&&mF.g&&grupos.indexOf(mF.g)<0)grupos.push(mF.g);
    DB.tramos.forEach(function(t,ti){
      var key=mFId+'_'+ti;
      if(tbl[key]&&tbl[key].manual)return; // no sobreescribir cambios manuales
      if(t.r){tbl[key]={grupo:'',sust:'',txt:'X'};return;}
      if(grupos.length===0){tbl[key]={grupo:'',sust:'',txt:'X'};return;}
      var gS=grupos[ti%grupos.length];
      var cicloD=getCiclo(gS.replace(/[A-Fa-f]/g,''));
      var cands=DB.maestros.filter(function(m){return SUST_FALTAN.indexOf(m.id)<0&&['Infantil','PT','AL'].indexOf(m.e)<0;});
      // Contar carga acumulada para repartir
      var carga={};Object.values(tbl).forEach(function(c){if(c&&c.sust)carga[c.sust]=(carga[c.sust]||0)+1;});
      cands.sort(function(a,b){var pa=priSust(a,gS,cicloD),pb=priSust(b,gS,cicloD);if(pa!==pb)return pa-pb;var ca=carga[a.n]||0,cb=carga[b.n]||0;if(ca!==cb)return ca-cb;return hL(b)-hL(a);});
      var mejor=cands[0];
      tbl[key]={grupo:gS,sust:mejor?mejor.n:'',txt:''};
    });
  });
  saveSust(SUST_DIA,tbl);renderSust();
}

function togFalta(id){var i=SUST_FALTAN.indexOf(id);if(i>=0)SUST_FALTAN.splice(i,1);else SUST_FALTAN.push(id);renderSust();}

function genTabla(){
  var tbl=loadSust(SUST_DIA);
  SUST_FALTAN.forEach(function(mFId){
    var mF=DB.maestros.find(function(m){return m.id===mFId;});if(!mF)return;
    var grupos=[];(mF.asig||[]).forEach(function(a){if(grupos.indexOf(a.gid)<0)grupos.push(a.gid);});if(mF.t&&mF.g&&grupos.indexOf(mF.g)<0)grupos.push(mF.g);
    DB.tramos.forEach(function(t,ti){
      var key=mFId+'_'+ti;
      if(tbl[key]&&tbl[key].manual)return;
      if(t.r){tbl[key]={grupo:'',sust:'',txt:'X'};return;}
      if(grupos.length===0){tbl[key]={grupo:'',sust:'',txt:'X'};return;}
      var gS=grupos[ti%grupos.length];
      var cicloD=getCiclo(gS.replace(/[A-Fa-f]/g,''));
      var carga={};Object.values(tbl).forEach(function(c){if(c&&c.sust)carga[c.sust]=(carga[c.sust]||0)+1;});
      var cands=DB.maestros.filter(function(m){return SUST_FALTAN.indexOf(m.id)<0&&['Infantil','PT','AL'].indexOf(m.e)<0;});
      cands.sort(function(a,b){var pa=priSust(a,gS,cicloD),pb=priSust(b,gS,cicloD);if(pa!==pb)return pa-pb;var ca=carga[a.n]||0,cb=carga[b.n]||0;if(ca!==cb)return ca-cb;return hL(b)-hL(a);});
      var mejor=cands[0];
      tbl[key]={grupo:gS,sust:mejor?mejor.n:'',txt:''};
    });
  });
  saveSust(SUST_DIA,tbl);renderSust();
}

function limpTabla(){if(!confirm('Limpiar tabla?'))return;saveSust(SUST_DIA,{});renderSust();}

function openCell(mFId,ti,dia){
  var key=mFId+'_'+ti;
  var tbl=loadSust(dia);
  var cel=tbl[key]||{grupo:'',sust:'',txt:''};
  var mF=DB.maestros.find(function(m){return m.id===mFId;});
  var t=DB.tramos[ti];
  SUST_CELDA={mFId:mFId,ti:ti,dia:dia,key:key};
  document.getElementById('modal-t').textContent=(t?t.l:'Tramo')+' - '+(mF?mF.n:'?');
  document.getElementById('m-grupo').value=cel.grupo||'';
  var sel=document.getElementById('m-mae');
  sel.innerHTML='<option value="">Sin sustituto</option>';
  var disp=DB.maestros.filter(function(m){return SUST_FALTAN.indexOf(m.id)<0&&['Infantil','PT','AL'].indexOf(m.e)<0;});
  var gS=cel.grupo||'';var cicloD=getCiclo(gS.replace(/[A-Fa-f]/g,''));
  disp.sort(function(a,b){return priSust(a,gS,cicloD)-priSust(b,gS,cicloD)||hL(b)-hL(a);});
  disp.forEach(function(m){var o=document.createElement('option');o.value=m.n;o.textContent=m.n+' ('+hL(m).toFixed(1)+'h)';if(m.n===cel.sust)o.selected=true;sel.appendChild(o);});
  document.getElementById('m-txt').value=(cel.txt&&cel.txt!=='X')?cel.txt:'';
  document.getElementById('modal-sust').classList.add('on');
}
function closeModal(){document.getElementById('modal-sust').classList.remove('on');SUST_CELDA=null;}
function applyCell(){
  if(!SUST_CELDA)return;
  var tbl=loadSust(SUST_CELDA.dia);
  var g=(document.getElementById('m-grupo')||{}).value||'';
  var s=(document.getElementById('m-mae')||{}).value||'';
  var t=(document.getElementById('m-txt')||{}).value||'';
  tbl[SUST_CELDA.key]={grupo:g,sust:t?t:s,txt:t&&t!==s?t:'',manual:true};
  saveSust(SUST_CELDA.dia,tbl);closeModal();renderSust();
}
function emptyCell(){
  if(!SUST_CELDA)return;
  var tbl=loadSust(SUST_CELDA.dia);
  tbl[SUST_CELDA.key]={grupo:'',sust:'',txt:'X',manual:true};
  saveSust(SUST_CELDA.dia,tbl);closeModal();renderSust();
}

function updBoja(el){
  var area=el.getAttribute('data-area');
  var ci=parseInt(el.getAttribute('data-ci'));
  if(!DB.bojaHoras[area])DB.bojaHoras[area]=[0,0,0,0,0,0];
  DB.bojaHoras[area][ci]=parseFloat(el.value)||0;
  save();
}

function addCoord(){
  var n=(document.getElementById('new-co-n')||{}).value||'';
  var h=+(document.getElementById('new-co-h')||{}).value||0;
  if(!n){alert('Escribe el nombre de la coordinacion');return;}
  if(!DB.coordinaciones)DB.coordinaciones=[];
  DB.coordinaciones.push({id:'c'+Date.now(),n:n,h:h,activo:true});
  save();renderConfig();
}
function delCoord(i){
  var cid=DB.coordinaciones[i].id;
  DB.coordinaciones.splice(i,1);
  // Quitar de todos los maestros
  DB.maestros.forEach(function(m){
    if(m.coords){var ix=m.coords.indexOf(cid);if(ix>=0)m.coords.splice(ix,1);}
  });
  save();renderConfig();
}

function diagSync(){
  var url=DB.scriptUrl;
  if(!url){alert('Sin URL de script en Config.');return;}
  var cb='_diag'+Date.now();
  var src=url+'?accion=leer&callback='+cb+'&_='+Date.now();
  window[cb]=function(r){
    delete window[cb];
    var el=document.getElementById('jsonp_diag');
    if(el&&el.parentNode)el.parentNode.removeChild(el);
    if(!r){alert('El script no respondio. Comprueba que esta publicado con acceso: Cualquier persona.');return;}
    if(!r.ok){alert('Error del script: '+r.error);return;}
    var data=r.data||{};
    var msg='Respuesta del script:\n\n';
    msg+='maestros: '+(data.maestros?data.maestros.length+' filas':'NO hay')+'\n';
    msg+='carga: '+(data.carga?data.carga.length+' filas':'NO hay')+'\n';
    msg+='coords: '+(data.coords?data.coords.length+' filas':'NO hay')+'\n\n';
    if(data.maestros&&data.maestros.length>0){
      msg+='Cabecera maestros: '+JSON.stringify(data.maestros[0])+'\n';
      if(data.maestros.length>1)msg+='Fila 1: '+JSON.stringify(data.maestros[1])+'\n';
    }
    alert(msg);
  };
  var s=document.createElement('script');
  s.id='jsonp_diag';
  s.src=src;
  s.onerror=function(){
    delete window[cb];
    alert('ERROR de conexion. El script no acepta la peticion.\n\nComprueba:\n1. Acceso: Cualquier persona\n2. Nueva version al reimplementar');
  };
  document.head.appendChild(s);
  setTimeout(function(){
    if(window[cb]){
      delete window[cb];
      alert('TIMEOUT - el script no responde en 10 segundos.');
    }
  },10000);
}

function diagHoras(){
  var out='=== DIAGNOSTICO HORAS ===\n\n';
  out+='hGrupos: '+DB.hGrupos.length+'\n';
  out+='hMat: '+DB.hMat.length+'\n\n';
  out+='=== hCarga ===\n';
  var tieneAsig=false;
  DB.hGrupos.forEach(function(g){
    var carga=DB.hCarga[g.id]||{};
    DB.hMat.forEach(function(mat){
      var cv=carga[mat.id];
      if(cv&&cv.m){
        tieneAsig=true;
        var hBoja=getBojaH(g.id,mat.id);
        out+=g.n+' / '+mat.n+' -> maestro id='+cv.m+' tipo='+typeof cv.m+' hBoja='+hBoja+'\n';
      }
    });
  });
  if(!tieneAsig)out+='(vacio - no hay asignaciones guardadas)\n';
  out+='\n=== hA() por maestro ===\n';
  DB.maestros.forEach(function(m){
    var ha=hA(m);
    if(ha>0||m.cargo)out+=m.n+' (id='+m.id+' tipo='+typeof m.id+'): hA='+ha+'h hd='+hd(m).toFixed(1)+'h\n';
  });
  alert(out);
}

function testLS(){
  var res=document.getElementById('ls-res');
  try{
    localStorage.setItem('_test','ok');
    if(localStorage.getItem('_test')!=='ok')throw new Error('No persiste');
    localStorage.removeItem('_test');
    save();
    var chk=localStorage.getItem(KDAT);
    if(chk&&chk.length>100){
      var d=JSON.parse(chk);
      res.innerHTML='<span style="color:#15803d;font-weight:700">OK localStorage funciona. '+Math.round(chk.length/1024)+'KB. Primer maestro: '+d.maestros[0].n+'</span>';
    }else{
      res.innerHTML='<span style="color:#b91c1c;font-weight:700">ERROR - localStorage no guarda. Comprueba modo privado.</span>';
    }
  }catch(e){
    res.innerHTML='<span style="color:#b91c1c;font-weight:700">ERROR: '+e.message+'</span>';
  }
}

function testConex(){
  var url=(document.getElementById('inp-script')||{}).value||DB.scriptUrl;
  if(!url){alert('Introduce la URL del script.');return;}
  var cb='_test'+Date.now();
  window[cb]=function(r){delete window[cb];alert(r&&r.ok?'OK - Script responde correctamente':'Error: '+JSON.stringify(r));};
  var s=document.createElement('script');
  s.src=url+'?accion=ping&callback='+cb;
  s.onerror=function(){delete window[cb];alert('Error de conexion con el script.');};
  document.head.appendChild(s);
  setTimeout(function(){if(window[cb]){delete window[cb];alert('Timeout - Script no responde.');}},5000);
}

function saveConex(){
  DB.scriptUrl=(document.getElementById('inp-script')||{}).value||'';
  save();alert('URL guardada');
}

function savePwd(){
  var v=((document.getElementById('inp-pwd')||{}).value||'').trim();
  if(!v||v.length<4){alert('Minimo 4 caracteres');return;}
  localStorage.setItem('ceip_pwd_v7',v);
  alert('Contrasena cambiada: '+v);
  document.getElementById('inp-pwd').value='';
}

function resetData(){
  if(!confirm('RESETEAR TODOS LOS DATOS? Esta accion no se puede deshacer.'))return;
  localStorage.removeItem(KDAT);
  DB=DEF();
  save();
  renderPlantillaHome();
  alert('Datos reseteados.');
}

function checkLogin(){
  if(sessionStorage.getItem('ceip_ok')==='1'){startApp();return;}
  var pwd=localStorage.getItem('ceip_pwd_v7')||'ceip2025';
  var v=prompt('Contrasena CEIP San Sebastian:');
  if(v===null)v=''; // cancelar
  if(v===pwd||v==='ceip2025'){
    sessionStorage.setItem('ceip_ok','1');
    startApp();
  } else {
    alert('Contrasena incorrecta. La contrasena de fabrica es: ceip2025');
    // NO llamar recursivamente - dejar que el usuario recargue
  }
}
checkLogin();
