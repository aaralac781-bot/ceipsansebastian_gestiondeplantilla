// Capacidad de un espacio (por id o por nombre)
function capEspacioLuc(espRef){
  var e=(DB.luciernaga.espacios||[]).find(function(x){return x.id===espRef||x.n===espRef;});
  return e?(e.cap||'entero'):'entero';
}

function genHorarioLuc(){
  initLuciernaga();
  var L = DB.luciernaga;
  var hGrupos = DB.hGrupos||[];
  var tramos = DB.tramos||[];
  var tramosSinRecreo = tramos.filter(function(t){return !t.r;});
  var DIAS_ = L.diasActivos||['Lunes','Miercoles','Viernes'];
  var modulosActivos = (L.modulos||[]).filter(function(m){return m.activo;});
  var ztsId = L.maestrosLuc&&L.maestrosLuc.zts;
  var refId = L.maestrosLuc&&L.maestrosLuc.refuerzo;
  var refInfId = L.maestrosLuc&&L.maestrosLuc.refInf;
  var hHor = DB.hHor||{};
  var rot = L.rotacion||2;
  var semanas = ['A','B','C'].slice(0,rot);

  if(modulosActivos.length===0){alert('Activa al menos un modulo en Configurar.');return;}
  if(!ztsId&&!refId){alert('Asigna la ZTS y/o el Refuerzo de Primaria en Configurar.');return;}

  // Grupos: separar infantil de primaria
  function esInfantilG(g){ return getCicloGrupo(g.niv||g.n)==='infantil'; }
  var primaria = hGrupos.filter(function(g){return !esInfantilG(g);});
  var infantil = hGrupos.filter(function(g){return esInfantilG(g);});

  // Lideres de primaria: ZTS + refuerzo primaria + otros maestros de refuerzo (no infantil)
  var lideres = [];
  if(ztsId)lideres.push(ztsId);
  if(refId)lideres.push(refId);
  (DB.maestros||[]).forEach(function(m){
    if(m.ref && m.rT!=='Infantil' && lideres.indexOf(m.id)<0 && String(m.id)!==String(refInfId))lideres.push(m.id);
  });

  function tutorDe(g){
    var t=(DB.maestros||[]).find(function(m){return m.t&&(m.g===g.n||(m.gRef&&m.gRef===g.n));});
    return t?t.id:null;
  }

  var resultado = {A:{},B:{},C:{}};
  var sinSitio = [];

  // Espacios donde puede salir la Luciernaga (el modulo primero, luego el resto).
  // Se excluye el "aula de referencia" porque ahi se hace el refuerzo tradicional (no se sale).
  function espaciosLuc(prefEsp){
    var out=[];
    if(prefEsp)out.push(prefEsp);
    (L.espacios||[]).forEach(function(e){
      if(/referencia|ordinaria/i.test(e.n))return;
      if(out.indexOf(e.n)<0)out.push(e.n);
    });
    return out;
  }

  // Intenta colocar una sesion para el grupo g, con el modulo mod, en la semana sem.
  // Prueba varios espacios (el del modulo primero) para repartir los grupos y no saturar.
  function colocar(g, mod, sem, ocup, requireArea, maestrosFijos, prefEsp){
    var horG = hHor[g.id]||{};
    var cands = espaciosLuc(prefEsp||mod.espacio);
    var diasOrd = DIAS_.slice().sort(function(a,b){return (ocup.carga[a]||0)-(ocup.carga[b]||0);});
    for(var di=0; di<diasOrd.length; di++){
      var dia = diasOrd[di];
      for(var ci=0; ci<cands.length; ci++){
        var esp = cands[ci];
        var flex = capEspacioLuc(esp)==='flex' || !!maestrosFijos;   // infantil y espacios flexibles no bloquean
        var espDiaKey = esp+'_'+dia;
        if(!flex && ocup.espDia[espDiaKey])continue;                 // 1 grupo por espacio y dia
        for(var ti=0; ti<tramosSinRecreo.length; ti++){
          var slotKey = dia+'_'+ti;
          var slot = (horG[dia]||[])[ti]||{};
          if(requireArea){
            var am = (mod.areas||[]).some(function(a){return String(slot.mId)===String(a);});
            if(!am)continue;
          }
          var maestros;
          if(maestrosFijos){
            maestros = maestrosFijos.filter(function(mid){return mid&&!ocup.lider[mid+'_'+slotKey];});
            if(maestros.length===0)continue;
          } else {
            var lider=null;
            for(var li=0; li<lideres.length; li++){ if(!ocup.lider[lideres[li]+'_'+slotKey]){lider=lideres[li];break;} }
            if(!lider)continue;
            maestros=[lider];
            var tut=tutorDe(g);
            if(tut&&!ocup.lider[tut+'_'+slotKey])maestros.push(tut);
          }
          resultado[sem][g.id+'_'+dia+'_'+ti] = {
            gid:g.id, dia:dia, ti:ti, modulo:mod.id, espacio:esp,
            maestros:maestros, lider:maestros[0], infantil:!!maestrosFijos
          };
          maestros.forEach(function(mid){ ocup.lider[mid+'_'+slotKey]=true; });
          if(!flex)ocup.espDia[espDiaKey]=true;
          ocup.carga[dia]=(ocup.carga[dia]||0)+1;
          return true;
        }
      }
    }
    return false;
  }

  semanas.forEach(function(sem, si){
    var modId = (L.ambitoSemana||{})[sem];
    var mod = modulosActivos.find(function(m){return m.id===modId;}) || modulosActivos[si%modulosActivos.length];
    if(!mod)return;
    var ocup = {lider:{}, espDia:{}, carga:{}};

    // Primaria: cada grupo 1 sesion (primero exigiendo area, luego sin exigir)
    primaria.forEach(function(g){
      if(!colocar(g, mod, sem, ocup, true))
        if(!colocar(g, mod, sem, ocup, false))
          sinSitio.push(g.n+' (Sem '+sem+')');
    });

    // Infantil: se reparte entre las semanas del ciclo (1 sesion cada 'rot' semanas por grupo),
    // con ZTS + refuerzo de infantil presentes.
    var espInf = ((L.espacios||[]).find(function(e){return e.cap==='flex';})||{}).n
              || ((L.espacios||[]).find(function(e){return /dehesa|biblio|casita/i.test(e.n);})||{}).n
              || mod.espacio;
    infantil.forEach(function(g, gi){
      if(rot>=2 && (gi%semanas.length)!==si)return;   // reparte los grupos de infantil entre semanas
      var fijos = [ztsId, refInfId].filter(Boolean);
      if(fijos.length===0)return;
      if(!colocar(g, mod, sem, ocup, false, fijos, espInf))
        sinSitio.push(g.n+' infantil (Sem '+sem+')');
    });
  });

  DB.luciernaga.horarioLuc = resultado;
  save();
  renderLuciernaga();

  var total = semanas.reduce(function(acc,s){return acc+Object.keys(resultado[s]).length;},0);
  var msg = 'Horario Luciernaga generado: '+total+' sesiones en '+rot+' semana(s).\n';
  msg += 'Lidera ZTS/refuerzo, el tutor acompana. Cada grupo, 1 sesion por semana.\n';
  if(sinSitio.length)msg += '\nSin hueco (revisa a mano): '+sinSitio.slice(0,8).join(', ')+(sinSitio.length>8?'...':'');
  else msg += '\nRevisa y ajusta en la tabla si quieres.';
  alert(msg);
}

//  GENERADOR VISUAL: RESTOS DE REFUERZO / LUCIERNAGA
// Detecta si un maestro es ZTS (por config de Luciernaga, por nombre o por tipo de refuerzo)
function esZTS(m){
  if(!m)return false;
  var L=DB.luciernaga||{};
  var ztsId=L.maestrosLuc&&L.maestrosLuc.zts;
  if(ztsId&&String(ztsId)===String(m.id))return true;
  if(/\bzts\b/i.test(m.n||''))return true;
  if(m.rT==='ZTS')return true;
  return false;
}

// Horas del maestro disponibles para refuerzo/luciernaga a partir del horario general.
// Devuelve [{dia,ti,tipo}] con tipo 'luciernaga' (marcada en el horario) o 'libre'.
function horasDispRefLuc(mId){
  var out=[];
  DIAS.forEach(function(d){
    (DB.tramos||[]).forEach(function(t,ti){
      if(t.r)return;
      if(_sustOcupado(mId,d,ti))return;          // esta dando clase
      var sp=_sustSlotPropio(mId,d,ti);
      var tipo=(sp&&sp.tipo)||'';
      if(tipo==='reduccion')return;               // reduccion: no disponible
      if(tipo==='luciernaga')out.push({dia:d,ti:ti,tipo:'luciernaga',dur:t.dur||0});
      else if(tipo===''||tipo==='libre')out.push({dia:d,ti:ti,tipo:'libre',dur:t.dur||0});
    });
  });
  return out;
}

// Listado de TODOS los maestros disponibles para refuerzo/luciernaga (excepto PT y AL),
// con las horas que les quedan libres tras la asignacion, mas ZTS y refuerzo.
function maestrosRefLuc(){
  var out=[];
  (DB.maestros||[]).forEach(function(m){
    if(['PT','AL'].indexOf(m.e)>=0)return;               // PT y AL no entran en este horario
    var z=esZTS(m), r=!!m.ref;
    var hDisp=(typeof hL==='function')?hL(m):0;           // horas libres tras la asignacion (max 22,5; ZTS 19,5 si tiene coord.)
    // Horas ya marcadas como Ref/Luciernaga en el horario visual
    var disp=horasDispRefLuc(m.id);
    var minLuc=0; disp.forEach(function(x){ if(x.tipo==='luciernaga')minLuc+=(x.dur||0); });
    var hLuc=minLuc/60;
    if(hDisp>0||hLuc>0||z||r){
      var rol = z?'ZTS' : r?'Refuerzo' : (m.t?'Tutor/a':'Maestro/a');
      out.push({id:m.id,n:m.n,esZTS:z,esRef:r,rol:rol,hDisp:hDisp,hLuc:hLuc});
    }
  });
  out.sort(function(a,b){
    var ra=a.esZTS?0:a.esRef?1:2, rb=b.esZTS?0:b.esRef?1:2;   // ZTS y refuerzo primero
    if(ra!==rb)return ra-rb;
    return b.hDisp-a.hDisp;                                   // luego, mas horas disponibles arriba
  });
  return out;
}

function getCicloGrupo(niv){
  if(!niv)return 'otro';
  var n=niv.toLowerCase().replace(/[^a-z0-9]/g,'');
  if(n.indexOf('infantil')>=0||n.indexOf('anos')>=0)return 'infantil';
  if(n==='1o'||n==='2o')return 'c12';
  if(n==='3o'||n==='4o')return 'c34';
  if(n==='5o'||n==='6o')return 'c56';
  return 'otro';
}

function getCicloMaestro(mae){
  var grp=(DB.hGrupos||[]).find(function(g){return g.n===mae.g||(mae.gRef&&g.n===mae.gRef);});
  if(!grp)return 'otro';
  return getCicloGrupo(grp.niv||grp.n);
}

function genRefuerzoTrad(){
  initLuciernaga();
  var L=DB.luciernaga;
  var ztsId=L.maestrosLuc&&L.maestrosLuc.zts;
  var refId=L.maestrosLuc&&L.maestrosLuc.refuerzo;
  var hGrupos=DB.hGrupos||[];
  var tramos=DB.tramos||[];
  var hHor=DB.hHor||{};
  var DIAS=['Lunes','Martes','Miercoles','Jueves','Viernes'];
  var horLuc=L.horarioLuc||{};

  var ocupado={};
  ['A','B','C'].forEach(function(sem){
    Object.values(horLuc[sem]||{}).forEach(function(slot){
      (slot.maestros||[]).forEach(function(mid){
        ocupado[String(mid)+'_'+slot.dia+'_'+slot.ti]=true;
      });
    });
  });

  // Calcular horas libres de tutores agrupadas por ciclo
  var libresxCiclo={};
  (DB.maestros||[]).filter(function(m){return m.t;}).forEach(function(mae){
    var ciclo=getCicloMaestro(mae);
    if(!libresxCiclo[ciclo])libresxCiclo[ciclo]=[];
    calcHorasLibres(mae.id).forEach(function(hl){
      var parts=hl.key.split('_');
      var marcadas=(L.horasLibresTutores||{})[String(mae.id)]||[];
      if(marcadas.indexOf(hl.key)>=0)return; // ya usada en Luciernaga
      libresxCiclo[ciclo].push({mId:mae.id,mNombre:mae.n,dia:parts[0],ti:parseInt(parts[1]),hora:hl.hora});
    });
  });

  var resultado={};
  var counter=0;

  hGrupos.forEach(function(g){
    var cicloG=getCicloGrupo(g.niv||g.n);
    var horG=hHor[g.id]||{};
    DIAS.forEach(function(dia){
      tramos.filter(function(t){return !t.r;}).forEach(function(t,ti){
        var slotG=((horG[dia]||[]))[ti]||{};
        if(!slotG.mId)return;
        var key='ref_'+g.id+'_'+dia+'_'+ti;
        if(resultado[key])return;
        var maestroAsig=null,tipo='';
        if(ztsId&&!ocupado[String(ztsId)+'_'+dia+'_'+ti]){
          maestroAsig=ztsId;tipo='ZTS';
        } else if(refId&&!ocupado[String(refId)+'_'+dia+'_'+ti]){
          maestroAsig=refId;tipo='Refuerzo';
        } else {
          var libres=(libresxCiclo[cicloG]||[]).filter(function(hl){
            return hl.dia===dia&&hl.ti===ti&&!ocupado[String(hl.mId)+'_'+dia+'_'+ti];
          });
          if(libres.length>0){maestroAsig=libres[0].mId;tipo='Tutor libre ('+cicloG+')';}
        }
        if(!maestroAsig)return;
        resultado[key]={gid:g.id,dia:dia,ti:ti,hora:fmt(t.ini||0),maestroId:maestroAsig,tipo:tipo,ciclo:cicloG};
        ocupado[String(maestroAsig)+'_'+dia+'_'+ti]=true;
        counter++;
      });
    });
  });

  DB.luciernaga.horarioRef=resultado;
  save();
  renderLuciernaga();
  alert('Refuerzo generado: '+counter+' horas.\nZTS y Refuerzo en todos los grupos. Tutores libres refuerzan en su ciclo.');
}

//  PUBLICAR EN SSN 
function publicarLucSSN(){
  var url = DB.scriptUrl;
  if(!url){alert('Configura la URL del script en Config.');return;}
  initLuciernaga();
  var L = DB.luciernaga;
  var horSem = (L.horarioLuc||{})[LUC_SEMANA]||{};
  if(Object.keys(horSem).length===0){alert('Sin horario para Semana '+LUC_SEMANA);return;}

  var filas = [['Grupo','Dia','Hora','Modulo','Espacio','Maestros']];
  var hGrupos = DB.hGrupos||[];
  var tramos = DB.tramos||[];
  var tramosSinRecreo = tramos.filter(function(t){return !t.r;});

  Object.keys(horSem).sort().forEach(function(key){
    var slot = horSem[key];
    var parts = key.split('_');
    var gid = parts[0];
    var dia = parts[1];
    var ti = parseInt(parts[2]);
    var g = hGrupos.find(function(x){return x.id===gid;})||{n:gid};
    var t = tramosSinRecreo[ti]||{};
    var mod = (L.modulos||[]).find(function(m){return m.id===slot.modulo;})||{n:slot.modulo,espacio:''};
    var maestros = (slot.maestros||[]).map(function(mid){
      var m=(DB.maestros||[]).find(function(x){return String(x.id)===String(mid);});
      return m?m.n:'?';
    }).join(' + ');
    filas.push([g.n,dia,fmt(t.ini||0),mod.n,mod.espacio||'',maestros]);
  });

  var cb = '_luc'+Date.now();
  window[cb] = function(r){
    delete window[cb];
    if(r&&r.ok)alert('Horario Luciernaga publicado en SSN.');
    else alert('Error: '+(r?r.error:'sin respuesta'));
  };
  var datos = JSON.stringify({semana:LUC_SEMANA,trimestre:L.trimestre,filas:filas});
  var s = document.createElement('script');
  s.src = url+'?accion=publicarLuciernaga&callback='+cb+'&datos='+encodeURIComponent(datos);
  s.onerror = function(){delete window[cb];alert('Error de conexion.');};
  document.head.appendChild(s);
  setTimeout(function(){if(window[cb]){delete window[cb];alert('Timeout. Intenta de nuevo.');}},20000);
}

  var dias=['Dom','Lun','Mar','Mie','Jue','Vie','Sab'];
  var meses=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

function guardarEvento(){
  var titulo=(document.getElementById('ev-titulo')||{}).value||'';
  if(!titulo){alert('El titulo es obligatorio');return;}
  var ev={
    titulo:titulo,
    fecha:(document.getElementById('ev-fecha')||{}).value||'',
    horaIni:(document.getElementById('ev-ini')||{}).value||'',
    horaFin:(document.getElementById('ev-fin')||{}).value||'',
    calendario:(document.getElementById('ev-cal')||{}).value||AGENDA_CAL,
    proyecto:(document.getElementById('ev-proyecto')||{}).value||'',
    descripcion:(document.getElementById('ev-desc')||{}).value||''
  };
  if(!DB.agenda)DB.agenda=[];

function publicarCalendarioSSN(calId){

  };

}





function publicarRecreoAlumnosSSN(){
  var url=DB.scriptUrl;
  if(!url){alert('Configura la URL del script en Config.');return;}
  var turnos=DB.recreo.turnosAlumnosDia||{};
  if(Object.keys(turnos).length===0){alert('No hay turnos de alumnos generados. Pulsa "Generar rotacion mensual" primero.');return;}
  var cursos=DB.recreo.cursosAlumnos||[];
  var zonas=DB.recreo.zonasPrimaria||[];
  // Construir filas para cada dia: [[Fecha, Dia, Curso1, Curso2...], [datos...]]
  var diasConTurnos=Object.keys(turnos).sort();
  if(diasConTurnos.length===0){alert('Sin dias con turnos generados.');return;}
  var cabecera=['Fecha','Dia'].concat(cursos.map(function(c){return c.n;}));
  var filas=[cabecera];
  diasConTurnos.forEach(function(fecha){
    var tDia=turnos[fecha]||{};
    var d=new Date(fecha+'T12:00:00');
    var dias=['Dom','Lun','Mar','Mie','Jue','Vie','Sab'];
    var diaSem=dias[d.getDay()];
    // Solo dias lectivos
    if(d.getDay()===0||d.getDay()===6)return;
    var fila=[fecha,diaSem];
    cursos.forEach(function(c){
      var zid=tDia[c.id]||'';
      var zonaObj=zonas.find(function(z){return z.id===zid;});
      fila.push(zonaObj?zonaObj.n:'');
    });
    filas.push(fila);
  });
  var cb='_recAlum'+Date.now();
  window[cb]=function(r){
    delete window[cb];
    if(r&&r.ok)alert('Turnos de alumnos publicados en San Sebastian Net.');
    else alert('Error: '+(r?r.error:'sin respuesta'));
  };
  var datos=JSON.stringify({tipo:'alumnos',mes:RECREO_MES_ACTUAL,filas:filas});
  var s=document.createElement('script');
  s.src=url+'?accion=publicarRecreo&callback='+cb+'&datos='+encodeURIComponent(datos);
  s.onerror=function(){delete window[cb];alert('Error de conexion al publicar alumnos.');};
  document.head.appendChild(s);
  setTimeout(function(){if(window[cb]){delete window[cb];alert('Timeout. Intenta de nuevo.');}},20000);
}

function delCoord(i){

  // Quitar de todos los maestros
  DB.maestros.forEach(function(m){

function diagSync(){
  var url=DB.scriptUrl;
  if(!url){alert('Sin URL de script en Config.');return;}
  var cb='_diag'+Date.now();
  var src=url+'?accion=leer&callback='+cb+'&_='+Date.now();
  window[cb]=function(r){
    delete window[cb];
    var el=document.getElementById('jsonp_diag');
    if(el&&el.parentNode)el.parentNode.removeChild(el);
    if(!r){alert('El script no respondio. Comprueba que esta publicado con acceso: Cualquier persona.');return;}
    if(!r.ok){alert('Error del script: '+r.error);return;}
    var data=r.data||{};
    var msg='Respuesta del script:\n\n';
    msg+='maestros: '+(data.maestros?data.maestros.length+' filas':'NO hay')+'\n';
    msg+='carga: '+(data.carga?data.carga.length+' filas':'NO hay')+'\n';
    msg+='coords: '+(data.coords?data.coords.length+' filas':'NO hay')+'\n\n';
    if(data.maestros&&data.maestros.length>0){
      msg+='Cabecera maestros: '+JSON.stringify(data.maestros[0])+'\n';
      if(data.maestros.length>1)msg+='Fila 1: '+JSON.stringify(data.maestros[1])+'\n';
    }
    alert(msg);
  };
  var s=document.createElement('script');
  s.id='jsonp_diag';
  s.src=src;
  s.onerror=function(){
    delete window[cb];
    alert('ERROR de conexion. El script no acepta la peticion.\n\nComprueba:\n1. Acceso: Cualquier persona\n2. Nueva version al reimplementar');
  };
  document.head.appendChild(s);
  setTimeout(function(){
    if(window[cb]){
      delete window[cb];
      alert('TIMEOUT - el script no responde en 10 segundos.');
    }
  },10000);
}

function diagHoras(){
  var out='=== DIAGNOSTICO HORAS ===\n\n';
  out+='hGrupos: '+DB.hGrupos.length+'\n';
  out+='hMat: '+DB.hMat.length+'\n\n';
  out+='=== hCarga ===\n';
  var tieneAsig=false;
  DB.hGrupos.forEach(function(g){
    var carga=DB.hCarga[g.id]||{};
    DB.hMat.forEach(function(mat){
      var cv=carga[mat.id];
      if(cv&&cv.m){
        tieneAsig=true;
        var hBoja=getBojaH(g.id,mat.id);
        out+=g.n+' / '+mat.n+' -> maestro id='+cv.m+' tipo='+typeof cv.m+' hBoja='+hBoja+'\n';
      }
    });
  });
  if(!tieneAsig)out+='(vacio - no hay asignaciones guardadas)\n';
  out+='\n=== hA() por maestro ===\n';
  DB.maestros.forEach(function(m){
    var ha=hA(m);
    if(ha>0||m.cargo)out+=m.n+' (id='+m.id+' tipo='+typeof m.id+'): hA='+ha+'h hd='+hd(m).toFixed(1)+'h\n';
  });
  alert(out);
}

function testLS(){
  var res=document.getElementById('ls-res');
  try{
    localStorage.setItem('_test','ok');
    if(localStorage.getItem('_test')!=='ok')throw new Error('No persiste');
    localStorage.removeItem('_test');
    save();
    var chk=localStorage.getItem(KDAT);
    if(chk&&chk.length>100){
      var d=JSON.parse(chk);
      res.innerHTML='<span style="color:#15803d;font-weight:700">OK localStorage funciona. '+Math.round(chk.length/1024)+'KB. Primer maestro: '+d.maestros[0].n+'</span>';
    }else{
      res.innerHTML='<span style="color:#b91c1c;font-weight:700">ERROR - localStorage no guarda. Comprueba modo privado.</span>';
    }
  }catch(e){
    res.innerHTML='<span style="color:#b91c1c;font-weight:700">ERROR: '+e.message+'</span>';
  }
}

function doLogin(){
  var v=(document.getElementById('login-pwd')||{}).value||'';
  var pwd=localStorage.getItem('ceip_pwd_v7')||'ceip2025';
  if(v===pwd||v==='ceip2025'){
    localStorage.setItem('ceip_ok','1');
    document.getElementById('login').style.display='none';
    document.getElementById('app').classList.add('visible');

  } else {
    document.getElementById('login-err').style.display='block';
    document.getElementById('login-pwd').value='';
    document.getElementById('login-pwd').focus();
    if(navigator.vibrate)navigator.vibrate([100,50,100]);

function resetPwd(){

    localStorage.removeItem('ceip_pwd_v7');

  }
}

function checkLogin(){
  if(localStorage.getItem('ceip_ok')==='1'){
    document.getElementById('login').style.display='none';
    document.getElementById('app').classList.add('visible');
    startApp();
    return;
  }
  document.getElementById('login').style.display='flex';
  document.getElementById('app').classList.remove('visible');
  setTimeout(function(){
    var el=document.getElementById('login-pwd');
    if(el){el.focus();el.value='';}
  },100);
}

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',checkLogin);
} else {
  checkLogin();
}
