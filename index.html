function fmt(mn){
  mn=parseInt(mn)||0;
  var h=Math.floor(mn/60),m=mn%60;
  return(h<10?'0':'')+h+':'+(m<10?'0':'')+m;
}
function hhmm(){var d=new Date();return(d.getHours()<10?'0':'')+d.getHours()+':'+(d.getMinutes()<10?'0':'')+d.getMinutes();}
function hCoordTotal(m){
  var total=0;
  (m.coords||[]).forEach(function(cid){
    var co=(DB.coordinaciones||[]).find(function(x){return x.id===cid;});
    if(co)total+=co.h||0;
  });
  return total;
}
function hd(m){
  return Math.max(0,J-(m.rC||0)-(m.rE||0)-(m.rJ||0)-hCoordTotal(m));
}
function hA(m){
  if(!DB||!DB.hCarga||!DB.hGrupos||!DB.hMat)return 0;
  var total=0;
  var mid=String(m.id); // comparar como string siempre
  DB.hGrupos.forEach(function(g){
    var carga=DB.hCarga[g.id]||{};
    DB.hMat.forEach(function(mat){
      var cv=carga[mat.id];
      if(cv&&String(cv.m)===mid){
        var hBoja=getBojaH(g.id,mat.id);
        total+=hBoja>0?hBoja:(hBoja===-1?(cv.h||0):0);
      }
    });
  });
  return total;
}
function hL(m){return Math.max(0,hd(m)-hA(m));}
function hdC(h){return h>=18?'#15803d':h>=12?'#92400e':'#b91c1c';}
function tg(){var s=0;Object.keys(DB.grupos).forEach(function(k){s+=DB.grupos[k]||0;});return s;}
function todosG(){
  var l=[],lt=['A','B','C','D','E','F'];

}

function barra(m){var d=hd(m),a=hA(m),exc=a>d,pct=d>0?Math.min(100,a/d*100):0;var col=exc?'#b91c1c':pct>90?'#d97706':'#15803d';return '<div class="hbar"><div class="ht"><div class="hf" style="width:'+pct.toFixed(0)+'%;background:'+col+'"></div></div><span style="font-size:11px;font-weight:700;color:'+col+'">'+a.toFixed(1)+'h/'+d.toFixed(1)+'h</span>'+(exc?bdg('EXCESO','rd'):Math.abs(d-a)<.3?bdg('OK','gn'):bdg(hL(m).toFixed(1)+'h libres','gy'))+'</div>';}

function setSync(t,txt){
  var d=document.getElementById('sdot'),l=document.getElementById('stxt');
  d.className='sdot'+(t==='ok'?' ok':t==='err'?' err':t==='spin'?' spin':'');
  l.textContent=txt||'Local';
}

function doSync(){
  var ok=save();
  if(!ok)return;
  var url=DB.scriptUrl;
  if(!url){setSync('ok','Guardado '+hhmm());return;}
  // CANDADO: comprobar si hay cambios de otro miembro del equipo sin recibir
  setSync('spin','Comprobando nube...');
  var cb='_chk'+Date.now();
  var hecho=false;
  window[cb]=function(r){
    if(hecho)return; hecho=true; delete window[cb];
    var el=document.getElementById('jp_chk'); if(el&&el.parentNode)el.parentNode.removeChild(el);
    var meta=(r&&r.ok&&r.data&&r.data._sync)?r.data._sync:null;
    var ultimo=localStorage.getItem('sync_ultimo_recibido')||'';
    if(meta&&meta.autor&&meta.autor!==_getAutor()&&meta.fecha&&meta.fecha>ultimo){
      var cuando=meta.fecha.replace('T',' ').substr(0,16);
      if(!confirm('\u26A0\uFE0F ATENCION: '+meta.autor+' subio cambios el '+cuando+' que tu NO has recibido.\nSi envias ahora, sus cambios se PERDERAN.\n\nRecomendado: Cancelar y pulsar Recibir primero.\n\nEnviar y sobrescribir igualmente?')){
        setSync('ok','Envio cancelado');
        return;
      }
    }
    _doEnviar(url);
  };
  var s2=document.createElement('script');
  s2.id='jp_chk';
  s2.src=url+'?accion=leer&callback='+cb+'&_='+Date.now();
  s2.onerror=function(){if(!hecho){hecho=true;delete window[cb];_doEnviar(url);}};
  document.head.appendChild(s2);
  setTimeout(function(){if(window[cb]&&!hecho){hecho=true;delete window[cb];_doEnviar(url);}},6000);
}

function _getAutor(){
  var a=localStorage.getItem('sync_autor');
  if(!a){
    a=(prompt('Tu nombre para el registro de sincronizacion (Angel, Paula, Antonio...):')||'').trim()||'Sin nombre';
    localStorage.setItem('sync_autor',a);
  }
  return a;
}

function _doEnviar(url){
  setSync('spin','Subiendo...');
  var sust={};
  ['Lunes','Martes','Miercoles','Jueves','Viernes'].forEach(function(d){
    var k='sust_'+d;
    try{var v=localStorage.getItem(k);if(v)sust[d]=JSON.parse(v);}catch(e){}
  });
  var firma={fecha:new Date().toISOString(),autor:_getAutor(),nMaestros:(DB.maestros||[]).length};
  var datos={
    maestros:DB.maestros,
    grupos:DB.grupos,
    coordinaciones:DB.coordinaciones||[],
    hCarga:DB.hCarga||{},
    hGrupos:DB.hGrupos||[],
    hMat:DB.hMat||[],
    materias:DB.materias||[],
    hHor:DB.hHor||{},
    tramos:DB.tramos||[],
    bojaHoras:DB.bojaHoras||{},
    recreo:DB.recreo||{},
    luciernaga:DB.luciernaga||{},
    sust:sust,
    _sync:firma
  };
  var body='accion=guardar&datos='+encodeURIComponent(JSON.stringify(datos));
  fetch(url,{
    method:'POST',
    mode:'no-cors',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body:body
  })
  .then(function(){
    localStorage.setItem('sync_ultimo_recibido',firma.fecha);
    setSync('ok','Sheets '+hhmm());
  })
  .catch(function(e){
    setSync('err','Error al subir');
    alert('No se pudo subir a Sheets. Comprueba la conexion y vuelve a pulsar Sincronizar. Tus datos siguen guardados en este dispositivo.');
  });
}

function _aplicarDatos(data){
  // FORMATO NUEVO (sincronizacion total): objetos completos con email, asignaciones, todo
  if(data.maestros&&data.maestros.length&&!Array.isArray(data.maestros[0])){
    DB.maestros=data.maestros;
  }
  else
  // FORMATO ANTIGUO (tabla con cabeceras)
  if(data.maestros&&data.maestros.length>1){
    var cab=data.maestros[0];
    function ci(n){for(var i=0;i<cab.length;i++)if(String(cab[i]).toLowerCase().replace(/[_\s]/g,'')==n.toLowerCase().replace(/[_\s]/g,''))return i;return -1;}
    var iId=ci('id'),iN=ci('nombre'),iE=ci('especialidad'),iCa=ci('cargo');
    var iRC=ci('redcargo'),iRE=ci('rededad'),iRJ=ci('redjornada');
    var iT=ci('estudor'),iG=ci('grupotutor'),iRef=ci('esrefuerzo');
    var iRT=ci('tiporefuerzo'),iPl=ci('coordplan'),iHC=ci('horascoord');
    var iAs=ci('asig'),iGR=ci('gruporef'),iCo=ci('coords');
    var mae=[];
    for(var i=1;i<data.maestros.length;i++){
      var row=data.maestros[i];
      if(!row[iN])continue;
      var asig=[];try{if(row[iAs])asig=JSON.parse(row[iAs]);}catch(e){}
      var coords=[];try{if(row[iCo])coords=JSON.parse(row[iCo]);}catch(e){}
      // Buscar datos locales existentes para este maestro
      var localM=DB.maestros?DB.maestros.find(function(m){return m.id===(parseInt(row[iId])||i);}):null;
      mae.push({
        id:parseInt(row[iId])||i,
        n:String(row[iN]),
        e:String(row[iE]||'Primaria'),
        cargo:String(row[iCa]||''),
        rC:parseFloat(row[iRC])||0,
        rE:parseFloat(row[iRE])||0,
        rJ:parseFloat(row[iRJ])||0,
        coord:0,
        hC:parseFloat(row[iHC])||0,
        // Para tutoria: usar local si existe, si no usar Sheets
        t:localM?localM.t:(String(row[iT]).toUpperCase()==='SI'),
        g:localM?localM.g:String(row[iG]||''),
        gRef:localM?localM.gRef:String(row[iGR]||''),
        ref:localM?localM.ref:(String(row[iRef]).toUpperCase()==='SI'),
        rT:localM?localM.rT:String(row[iRT]||''),
        plan:String(row[iPl]||''),
        // Asig y coords: usar local si tiene datos, si no usar Sheets
        asig:(localM&&localM.asig&&localM.asig.length>0)?localM.asig:asig,
        coords:(localM&&localM.coords&&localM.coords.length>0)?localM.coords:coords
      });
    }
    if(mae.length>0)DB.maestros=mae;
  }
  // FORMATO NUEVO: hCarga como objeto, grupos y coordinaciones directos
  if(data.hCarga&&!Array.isArray(data.hCarga)&&Object.keys(data.hCarga).length>0)DB.hCarga=data.hCarga;
  if(data.grupos){
    if(Array.isArray(data.grupos)){ if(data.grupos.length>0)DB.grupos=data.grupos; }
    else if(Object.keys(data.grupos).length>0)DB.grupos=data.grupos;
  }
  if(data.coordinaciones&&data.coordinaciones.length>0)DB.coordinaciones=data.coordinaciones;
  if(data.recreo&&Object.keys(data.recreo).length>0)DB.recreo=data.recreo;
  if(data.luciernaga&&Object.keys(data.luciernaga).length>0)DB.luciernaga=data.luciernaga;
  // Procesar hCarga (formato antiguo tabla)
  if(data.carga&&data.carga.length>1){
    DB.hCarga={};
    for(var i=1;i<data.carga.length;i++){
      var row=data.carga[i];
      var gid=String(row[0]),mid=String(row[1]),datos=row[2];
      if(!gid||!mid)continue;
      if(!DB.hCarga[gid])DB.hCarga[gid]={};
      try{DB.hCarga[gid][mid]=JSON.parse(datos);}catch(e){}
    }
  }
  // Procesar coordinaciones
  if(data.coords&&data.coords.length>1){
    DB.coordinaciones=[];
    for(var i=1;i<data.coords.length;i++){
      var row=data.coords[i];
      if(!row[0]||!row[1])continue;
      DB.coordinaciones.push({
        id:String(row[0]),n:String(row[1]),
        h:parseFloat(row[2])||0,
        activo:String(row[3]).toUpperCase()==='SI'
      });
    }
  }
  // Procesar extras (hGrupos, hMat, tramos, bojaHoras, hHor, sust)
  if(data.hGrupos&&data.hGrupos.length>0)DB.hGrupos=data.hGrupos;
  if(data.hMat&&data.hMat.length>0)DB.hMat=data.hMat;
  if(data.materias&&data.materias.length>0)DB.materias=data.materias;
  if(data.tramos&&data.tramos.length>=2)DB.tramos=data.tramos;
  if(data.bojaHoras&&Object.keys(data.bojaHoras).length>0)DB.bojaHoras=data.bojaHoras;
  if(data.hHor&&Object.keys(data.hHor).length>0)DB.hHor=data.hHor;

function parseCSV(csv){
  var lin=csv.split('\n').filter(function(l){return l.trim();});
  if(lin.length<2)return null;
  var cab=parseLine(lin[0]).map(function(h){return h.toLowerCase().replace(/[_\s]/g,'');});
  
  var IX={id:ci('id')||0,n:ci('nombre')||1,e:ci('especialidad')||2,cargo:ci('cargo')||3,
    rC:ci('redcargo')||4,rE:ci('rededad')||5,rJ:ci('redjornada')||6,
    coord:ci('coordinacion')||7,hC:ci('horascoord')||13,t:ci('estudor')||8,g:ci('grupotutor')||9,
    ref:ci('esrefuerzo')||10,rT:ci('tiporefuerzo')||11,plan:ci('coordplan')||12,
    asig:ci('asig'),gRef:ci('gruporef')};
  var res=[];
  for(var i=1;i<lin.length;i++){
    var r=parseLine(lin[i]);
    var n=trimq(r[IX.n]);if(!n)continue;
    var asig=[];
    if(IX.asig>=0){try{var raw=trimq(r[IX.asig]);if(raw&&raw.length>2)asig=JSON.parse(raw);}catch(e){}}
    var gRef=IX.gRef>=0?trimq(r[IX.gRef]):'';
    if(!gRef)gRef=trimq(r[IX.g])||'';
    res.push({id:parseInt(r[IX.id])||i,n:n,e:trimq(r[IX.e])||'Primaria',
      cargo:trimq(r[IX.cargo]),rC:parseFloat(r[IX.rC])||0,rE:parseFloat(r[IX.rE])||0,
      rJ:parseFloat(r[IX.rJ])||0,coord:parseFloat(r[IX.coord])||0,
      hC:parseFloat(r[IX.hC])||0,t:(trimq(r[IX.t])||'').toUpperCase()==='SI',
      g:trimq(r[IX.g]),ref:(trimq(r[IX.ref])||'').toUpperCase()==='SI',
      rT:trimq(r[IX.rT]),plan:trimq(r[IX.plan]),gRef:gRef,asig:asig});
  }
  return res.length?res:null;
}
function parseLine(l){var r=[],c='',q=false;for(var i=0;i<l.length;i++){var ch=l[i];if(ch==='"'){if(q&&l[i+1]==='"'){c+='"';i++;}else q=!q;}else if(ch===','&&!q){r.push(c);c='';}else c+=ch;}r.push(c);return r;}
function trimq(s){return(s||'').replace(/^"|"$/g,'').replace(/""/g,'"').trim();}

function calcNecesidades(){
  // Horas totales necesarias por area segun BOJA y numero de grupos
  var CURSOS2=['1o','2o','3o','4o','5o','6o'];
  var areas=['len','mat','cono','ing','ef','art','fra','rel','val','aut'];
  var nec={};
  areas.forEach(function(a){nec[a]=0;});
  CURSOS2.forEach(function(cv,ci){
    var ng=DB.grupos['_'+cv]||0;
    areas.forEach(function(a){
      var bh=(DB.bojaHoras&&DB.bojaHoras[a])?DB.bojaHoras[a][ci]:0;

  });

}

function importarClaustroCSV(){
  var inp=document.createElement('input');
  inp.type='file';
  inp.accept='.xls,.xlsx,.csv,text/csv';
  inp.onchange=function(){
    var f=inp.files[0]; if(!f)return;
    var ext=(f.name.split('.').pop()||'').toLowerCase();
    if(ext==='xls'||ext==='xlsx'){
      _cargarSheetJS(function(){
        var rd=new FileReader();
        rd.onload=function(){
          try{
            var wb=XLSX.read(new Uint8Array(rd.result),{type:'array'});
            var hoja=wb.Sheets[wb.SheetNames[0]];
            var filas=XLSX.utils.sheet_to_json(hoja,{header:1,defval:''});
            _procesarClaustroFilas(filas);
          }catch(e){alert('No pude leer el Excel: '+e.message+'\nPrueba guardandolo como CSV.');}
        };
        rd.readAsArrayBuffer(f);
      });
    } else {
      var rd=new FileReader();
      rd.onload=function(){
        var txt=rd.result;
        var lineas=txt.split(/\r?\n/).filter(function(l){return l.trim();});
        var sep=(lineas[0]&&lineas[0].indexOf(';')>=0)?';':',';
        var filas=lineas.map(function(l){return l.split(sep).map(function(c){return c.replace(/^"|"$/g,'').trim();});});
        _procesarClaustroFilas(filas);
      };
      rd.readAsText(f,'utf-8');
    }
  };
  inp.click();
}
function _cargarSheetJS(cb){
  if(window.XLSX){cb();return;}
  var sc=document.createElement('script');
  sc.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  sc.onload=cb;
  sc.onerror=function(){alert('Para leer .xls directamente hace falta conexion a internet.\nAlternativa: guarda el archivo como CSV e importalo.');};
  document.head.appendChild(sc);
}
function _procesarClaustroFilas(filas){
  function norm(x){return String(x||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[_\s\/"]/g,'');}
  // Localizar la fila de cabecera (Seneca trae 4 filas de titulo antes)
  var hIdx=-1;
  for(var i=0;i<Math.min(filas.length,15);i++){
    var c=(filas[i]||[]).map(norm);
    if(c.indexOf('empleadoa')>=0||c.indexOf('empleado')>=0||(c.indexOf('nombre')>=0)||(c.indexOf('apellidos')>=0)){hIdx=i;break;}
  }
  if(hIdx<0){alert('No encuentro la cabecera. El archivo debe tener una fila con "Empleado/a" (Seneca) o "nombre"/"apellidos".');return;}
  var cab=(filas[hIdx]||[]).map(norm);
  function ci(){for(var a=0;a<arguments.length;a++){var i=cab.indexOf(norm(arguments[a]));if(i>=0)return i;}return -1;}
  var iEmp=ci('empleadoa','empleado');
  var iUsu=ci('usuarioidea','usuario','idea');
  var iTel=ci('telefono');
  var iN=ci('nombre'),iA=ci('apellidos','apellido'),iEm=ci('email','correo','correoelectronico','educaand');
  var iT=ci('tutor','estutor'),iG=ci('curso','grupo','grupotutor'),iE=ci('especialidad','puesto');
  var nuevos=0,actualizados=0;
  for(var i=hIdx+1;i<filas.length;i++){
    var c=filas[i]||[];
    // Nombre: formato Seneca "Apellidos, Nombre" -> "Nombre Apellidos"
    var nombre='';
    if(iEmp>=0&&c[iEmp]){
      var bruto=String(c[iEmp]).trim();
      var coma=bruto.indexOf(',');
      nombre=coma>=0?(bruto.slice(coma+1).trim()+' '+bruto.slice(0,coma).trim()):bruto;
    } else {
      nombre=((iN>=0?String(c[iN]||''):'')+' '+(iA>=0?String(c[iA]||''):'')).trim();
    }
    if(!nombre)continue;
    // Email: usuario IdEA + dominio, o columna email directa
    var email='';
    if(iUsu>=0&&c[iUsu]){
      var u=String(c[iUsu]).trim();
      if(u)email=(u.indexOf('@')>=0)?u:(u+'@g.educaand.es');
    }
    if(!email&&iEm>=0&&c[iEm])email=String(c[iEm]).trim();
    var tel=iTel>=0?String(c[iTel]||'').trim():'';
    var esTutor=iT>=0?/^(si|s|x|1|true)$/i.test(String(c[iT]||'').trim()):false;
    var grupo=iG>=0?String(c[iG]||'').trim():'';
    var esp=iE>=0?String(c[iE]||'').trim():'';
    var m=DB.maestros.find(function(x){
      return (email&&x.email&&x.email.toLowerCase()===email.toLowerCase())||(norm(x.n)===norm(nombre));
    });
    if(m){
      if(email)m.email=email;
      if(tel)m.tel=tel;
      if(esp)m.e=esp;
      if(esTutor){m.t=true;if(grupo)m.g=grupo;}
      actualizados++;
    } else {
      var id=DB.maestros.length?Math.max.apply(null,DB.maestros.map(function(x){return x.id;}))+1:1;
      DB.maestros.push({id:id,n:nombre,email:email,tel:tel,e:esp||'Primaria',cargo:'',rC:0,rE:0,rJ:0,coord:0,hC:0,t:esTutor,g:esTutor?grupo:'',ref:false,rT:'',plan:'',gRef:'',asig:[]});
      nuevos++;
    }
  }
  save();rClaustro();
  alert('Importacion completada:\n- '+nuevos+' maestros nuevos\n- '+actualizados+' actualizados\n\nEmails construidos como usuario@g.educaand.es y nombres en formato Nombre Apellidos.\n\nRevisa el claustro y pulsa Sincronizar.');
}

function cursoLabel(cv){
  var map={'3anos':'3 Anos','4anos':'4 Anos','5anos':'5 Anos',
    '1o':'1o Primaria','2o':'2o Primaria','3o':'3o Primaria',
    '4o':'4o Primaria','5o':'5o Primaria','6o':'6o Primaria'};
  return map[cv]||cv;
}

function getCursoSiguiente(curso,letra){
  var map={'3anos':'4anos','4anos':'5anos','5anos':'1o',
    '1o':'2o','2o':'3o','3o':'4o','4o':'5o','5o':'6o','6o':'INSTITUTO'};
  var sig=map[curso]||'';
  if(sig==='INSTITUTO')return null;
  if(curso==='2o'||curso==='4o')return{curso:sig,letra:'',pendiente:true};
  return{curso:sig,letra:letra,pendiente:false};
}

function getGrupoAlumnos(curso,letra){
  return DB.alumnos.filter(function(a){
    return a.curso===curso&&(letra?a.letra===letra:true);

}

function getCursosActivos(){
  if(!DB.alumnos)DB.alumnos=[];
  var cl={};
  DB.alumnos.forEach(function(a){
    var k=a.curso+'_'+a.letra;
    if(!cl[k])cl[k]={curso:a.curso,letra:a.letra,n:0};
    cl[k].n++;
  });
  return Object.values(cl).sort(function(a,b){
    var oa=ORDEN_CURSOS.indexOf(a.curso),ob=ORDEN_CURSOS.indexOf(b.curso);
    if(oa!==ob)return oa-ob;
    return a.letra.localeCompare(b.letra);
  });
}

function importarExcel(input){
  var file=input.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=new Uint8Array(e.target.result);
      var wb=XLSX.read(data,{type:'array'});
      var nuevos=[];
      wb.SheetNames.forEach(function(sheetName){
        var detected=detectarCurso(sheetName);
        if(!detected)return;
        var sheet=wb.Sheets[sheetName];
        var rows=XLSX.utils.sheet_to_json(sheet,{header:1,defval:''});
        rows.forEach(function(row){
          var nombreCompleto='';
          row.forEach(function(cell){
            var val=String(cell).trim();
            if(val.indexOf(',')>0&&val.length>3&&isNaN(val))nombreCompleto=val;
          });
          if(!nombreCompleto)return;
          var partes=nombreCompleto.split(',',2);
          var apellidos=partes[0].trim();
          var nombre=partes[1]?partes[1].trim():'';
          if(!apellidos||apellidos.length<2)return;
          nuevos.push({nombre:nombre,apellidos:apellidos,curso:detected.curso,letra:detected.letra,fnac:'',atencion:false,repetidor:false});
        });
      });
      if(nuevos.length===0){alert('No se encontraron alumnos.');return;}
      var reemplazar=confirm('Se encontraron '+nuevos.length+' alumnos.\n\nAceptar = Reemplazar todo\nCancelar = Anadir a los existentes');
      if(reemplazar)DB.alumnos=nuevos;
      else DB.alumnos=DB.alumnos.concat(nuevos);
      save();ALUMNOS_FILTRO={curso:'',letra:''};renderAlumnos();
      alert('Importacion completada: '+nuevos.length+' alumnos.');
      // Sincronizar alumnos con Sheet SSNet automáticamente
      sincronizarAlumnosSSNet(nuevos, true);
    }catch(ex){alert('Error al leer el archivo: '+ex.message);}
  };
  reader.readAsArrayBuffer(file);
  input.value='';
}

function detectarCurso(nombreHoja){
  var n = nombreHoja;
  var esInf = /infantil|a\xf1os|anos/i.test(n);
  var mNum = n.match(/(\d+)/);
  if (!mNum) return null;
  var num = mNum[1];
  // Detectar letra A o B — tanto pegada (4ºA) como separada (4º A)
  var mLetra = n.match(/\d[\xba\xb0oa]?\s*([AB])\b/i);
  if (!mLetra) mLetra = n.match(/\s([AB])\s*(?:[Pp]rimaria|$)/);
  var let2 = mLetra ? mLetra[1].toUpperCase() : '';
  if (esInf) {
    var ci = {'3':'3anos','4':'4anos','5':'5anos'};
    return {curso: ci[num]||num+'anos', letra: let2};
  }
  var cp = {'1':'1o','2':'2o','3':'3o','4':'4o','5':'5o','6':'6o'};
  return {curso: cp[num]||num+'o', letra: let2};
}

function priSust(m,gid,cicloD){
  if((m.asig||[]).some(function(a){return a.gid===gid;}))return 0;
  var cM=getCiclo((m.gRef||m.g||'').replace(/[A-Fa-f]/g,''));
  if(cM===cicloD)return 1;
  var adj={Primero:['Segundo','Infantil'],Segundo:['Primero','Tercero'],Tercero:['Segundo'],Infantil:['Primero']};
  if(cM&&cicloD&&(adj[cicloD]||[]).indexOf(cM)>=0)return 2;
  return 3;
}



function getFechaDeSust(){
  var hoy=new Date();
  if(window.SUST_FECHA==='hoy')return hoy.toISOString().split('T')[0];
  if(window.SUST_FECHA==='pasado'){var d=new Date(hoy);d.setDate(d.getDate()+2);while(d.getDay()===0||d.getDay()===6)d.setDate(d.getDate()+1);return d.toISOString().split('T')[0];}
  if(window.SUST_FECHA_CUSTOM)return window.SUST_FECHA_CUSTOM;
  var d=new Date(hoy);d.setDate(d.getDate()+1);while(d.getDay()===0||d.getDay()===6)d.setDate(d.getDate()+1);
  return d.toISOString().split('T')[0];
}

function publicarSustSSN(){
  var url=DB.scriptUrl;
  if(!url){alert('Configura la URL del script en Config.');return;}
  var tbl=loadSust(SUST_DIA);
  if(!tbl||Object.keys(tbl).length===0){alert('Genera primero la tabla.');return;}
  var cab=['Hora'];
  var mAus=[];
  SUST_FALTAN.forEach(function(id){
    var m=DB.maestros.find(function(x){return x.id===id;});
    if(m){cab.push(m.n+' (ausente)');mAus.push({id:id,n:m.n});}
  });
  var filas=[cab];
  (DB.tramos||[]).forEach(function(t,ti){
    if(t.r){var fr=['RECREO'];mAus.forEach(function(){fr.push('');});filas.push(fr);return;}
    var fila=[fmt(t.ini||0)];
    mAus.forEach(function(ma){
      var cel=tbl[String(ma.id)+'_'+ti]||{};
      var s2=cel.sust||cel.txt||'';
      var g2=cel.grupo||'';
      fila.push(s2?(s2+(g2?' ('+g2+')'  :'')):'');
    });
    filas.push(fila);
  });
  if(filas.length<=1){alert('No hay sustituciones asignadas.');return;}
  var cb='_ssn'+Date.now();
  window[cb]=function(r){delete window[cb];if(r&&r.ok)alert('Publicado en SSN.');else alert('Error: '+(r?r.error:''));};
  var datos=JSON.stringify({sustDia:SUST_DIA,fecha:getFechaDeSust(),filas:filas,limpiarAnterior:true});
  var s=document.createElement('script');
  s.src=url+'?accion=publicarSust&callback='+cb+'&datos='+encodeURIComponent(datos);
  s.onerror=function(){delete window[cb];alert('Error de conexion.');};
  document.head.appendChild(s);
  setTimeout(function(){if(window[cb]){delete window[cb];alert('Timeout.');}},30000);
}

var SUST_DIA='Lunes';
var SUST_FALTAN=[];

function renderSust(){
  var hoy=new Date();
  if(!window.SUST_FECHA)window.SUST_FECHA='manana';
  var fechaSust=new Date(hoy);
  if(window.SUST_FECHA==='hoy'){}
  else if(window.SUST_FECHA==='pasado'){fechaSust.setDate(hoy.getDate()+2);}
  else if(window.SUST_FECHA_CUSTOM){fechaSust=new Date(window.SUST_FECHA_CUSTOM+'T12:00:00');}
  else{fechaSust.setDate(hoy.getDate()+1);}
  while(fechaSust.getDay()===0||fechaSust.getDay()===6)fechaSust.setDate(fechaSust.getDate()+1);
  var diasMap={1:'Lunes',2:'Martes',3:'Miercoles',4:'Jueves',5:'Viernes'};
  if(diasMap[fechaSust.getDay()])SUST_DIA=diasMap[fechaSust.getDay()];

// ── SUSTITUCIONES: quien esta ocupado y quien puede cubrir ────────────────
function _sustOcupado(mid,dia,ti){
  var ocup=false;
  Object.keys(DB.hHor||{}).forEach(function(gid){
    var sx=DB.hHor[gid]&&DB.hHor[gid][dia]&&DB.hHor[gid][dia][ti];
    if(!sx)return;
    if(sx.pId&&String(sx.pId)===String(mid))ocup=true;
    if(sx.pIdAten&&String(sx.pIdAten)===String(mid))ocup=true;
  });
  return ocup;
}
function _sustSlotPropio(mid,dia,ti){
  try{
    if(typeof getHorMaePropio==='function'){
      var hp=getHorMaePropio(mid);
      if(hp&&hp[dia]&&hp[dia][ti])return hp[dia][ti];
    }
  }catch(e){}
  return null;
}
function _sustGrupoDe(mid,dia,ti){
  var r='';
  (DB.hGrupos||[]).forEach(function(g){
    var sx=DB.hHor[g.id]&&DB.hHor[g.id][dia]&&DB.hHor[g.id][dia][ti];
    if(sx&&sx.pId&&String(sx.pId)===String(mid))r=g.n;
  });
  return r;
}
// Si falta el maestro de Religion, el paralelo (ATEDU, normalmente el tutor)
// se queda con TODO el grupo
function _sustParaleloRelig(faltaId,dia,ti){
  var r=null;
  Object.keys(DB.hHor||{}).forEach(function(gid){
    var sx=DB.hHor[gid]&&DB.hHor[gid][dia]&&DB.hHor[gid][dia][ti];
    if(!sx||!sx.paralelo)return;
    if(String(sx.pId)!==String(faltaId))return;
    if(!sx.pIdAten)return;
    var mAten=DB.maestros.find(function(m){return String(m.id)===String(sx.pIdAten);});
    if(mAten&&SUST_FALTAN.indexOf(mAten.id)<0)r=mAten;
  });
  return r;
}
// Orden de preferencia: 1 Luciernaga · 2 Maestro de refuerzo · 3 Hora libre
// · 4 Coordinacion · 5 ZTS · 6 Jefatura/Secretaria · 7 Director (ultimo)
function _sustMejor(dia,ti,carga){
  var cands=[];
  DB.maestros.forEach(function(m){
    if(SUST_FALTAN.indexOf(m.id)>=0)return;
    if(_sustOcupado(m.id,dia,ti))return;
    var sp=_sustSlotPropio(m.id,dia,ti);
    var tipo=(sp&&sp.tipo)||'';
    if(tipo==='reduccion')return; // reduccion: no se toca
    var p;
    if(tipo==='luciernaga')p=1;         // 1. horas de refuerzo/luciernaga del horario
    else if(esZTS(m))p=5;                // 5. ZTS (ultimo recurso antes del equipo directivo)
    else if(m.ref)p=2;                   // 2. maestros de refuerzo
    else if(tipo==='coord')p=4;          // 4. coordinacion
    else if(tipo==='direccion'||tipo==='jefatura'||tipo==='secretaria')p=6;
    else p=3;                            // 3. hora libre
    if(m.cargo==='Jefe de Estudios'||m.cargo==='Secretario')p=Math.max(p,6); // 6. equipo directivo
    if(m.cargo==='Director')p=7;         // 7. director (la ultima opcion)
    cands.push({m:m,p:p,c:carga[m.id]||0});
  });
  cands.sort(function(a,b){return a.p-b.p||a.c-b.c;});
  return cands.length?cands[0].m:null;
}
function genTabla(){
  var tbl=loadSust(SUST_DIA);
  var dia=SUST_DIA;
  var carga={};
  var sinCubrir=0;
  SUST_FALTAN.forEach(function(mFId){
    var mF=DB.maestros.find(function(m){return m.id===mFId;});
    if(!mF)return;
    (DB.tramos||[]).forEach(function(t,ti){
      if(t.r)return;
      var key=String(mFId)+'_'+ti;
      if(tbl[key]&&tbl[key].sust)return;
      // Solo hace falta sustituto si el maestro TENIA clase en ese tramo
      var grupo=_sustGrupoDe(mFId,dia,ti);
      if(!grupo){delete tbl[key];return;}
      var nota='';
      var elegido=_sustParaleloRelig(mFId,dia,ti);
      if(elegido)nota='Se queda con todo el grupo';
      else elegido=_sustMejor(dia,ti,carga);
      if(!elegido)sinCubrir++;
      tbl[key]={tipo:'sust',sust:elegido?elegido.n:'',grupo:grupo,txt:nota};
      if(elegido)carga[elegido.id]=(carga[elegido.id]||0)+1;
    });
  });
  saveSust(SUST_DIA,tbl);renderSust();
  if(sinCubrir)alert('\u26A0\uFE0F '+sinCubrir+' tramos sin nadie disponible.\nRevisa la tabla y asigna a mano.');
}

// Sincronizar alumnos con Sheet SSNet
function sincronizarAlumnosSSNet(alumnos, silencioso){
  var url = DB.scriptUrl || '';
  if(!url){ return; }
  if(!alumnos || !alumnos.length) alumnos = DB.alumnos || [];
  if(!alumnos.length) return;

  // Convertir a formato que SSNet entiende
  var datos = {alumnos: alumnos};
  var cb = '_syncA'+Date.now();
  window[cb] = function(r){
    delete window[cb];
    if(!silencioso){
      if(r && r.success) alert('Alumnos sincronizados con SSNet: '+alumnos.length);
      else alert('Error al sincronizar alumnos: '+(r?r.error:'sin respuesta'));
    }
  };
  var s = document.createElement('script');
  s.src = url+'?accion=sincronizarAlumnos&callback='+cb+'&datos='+encodeURIComponent(JSON.stringify(datos));
  s.onerror = function(){ delete window[cb]; };
  document.head.appendChild(s);
  setTimeout(function(){ if(window[cb]){ delete window[cb]; }}, 10000);
}

function syncMaestrosSSNet(silencioso){
  var url = DB.scriptUrl || '';
  if(!url){ if(!silencioso) alert('Configura la URL de SSNet en Config primero.'); return; }
  
  // Primero verificar que el Codigo.gs tiene sincronizarMaestros (v6)
  var cbTest = '_testV6'+Date.now();
  window[cbTest] = function(r){
    delete window[cbTest];
    if(r && r.ok){
      // Script responde — intentar sync
      _doSyncMaestros(url, silencioso);
    }
  };
  // Probar con ping primero
  var sTest = document.createElement('script');
  sTest.src = url+'?accion=ping&callback='+cbTest;
  sTest.onerror = function(){ delete window[cbTest]; if(!silencioso) alert('Error de conexión con SSNet. Verifica la URL.'); };
  document.head.appendChild(sTest);
  setTimeout(function(){ if(window[cbTest]){ delete window[cbTest]; if(!silencioso) alert('SSNet no responde. Verifica que el script esté activo.'); } }, 5000);
}

function _doSyncMaestros(url, silencioso){

  // Construir array de maestros para SSNet Control_Acceso
  var maestros = [];
  (DB.maestros||[]).forEach(function(m){
    if(!m.email && !m.n) return;
    var cursos = [];
    if(m.g) cursos.push(m.g);  // grupo de tutoría
    maestros.push({
      email:   (m.email||'').trim(),
      nombre:  (m.n||'').trim(),
      grupo:   (m.g||'').trim(),
      rol:     (m.cargo||m.e||'').trim(),
      cursos:  cursos.join(','),
      activo:  m.activo !== false ? 'ACTIVO' : 'INACTIVO'
    });
  });

  if(!maestros.length){ if(!silencioso) alert('No hay maestros en la base de datos.'); return; }

  var cb = '_syncM'+Date.now();
  window[cb] = function(r){
    delete window[cb];
    var resp = (r && r.result) ? r.result : (r || {});
    if(!silencioso){
      if(resp.success){
        alert('Maestros sincronizados con SSNet: '+maestros.length+' docentes.');
      } else {
        var errMsg = resp.error || 'sin respuesta';
      if(errMsg === 'sin respuesta' || errMsg === 'accion desconocida: sincronizarMaestros'){
        alert('⚠️ Para sincronizar necesitas actualizar el Codigo.gs de SSNet a la versión 6.\nConsulta al director.');
      } else {
        alert('Error al sincronizar: ' + errMsg);
      }
      }
    }
  };
  var datos = JSON.stringify({maestros: maestros});
  var s = document.createElement('script');
  s.src = url+'?accion=sincronizarMaestros&callback='+cb+'&datos='+encodeURIComponent(datos);
  s.onerror = function(){ delete window[cb]; if(!silencioso) alert('Error de conexión con SSNet.'); };
  document.head.appendChild(s);
}

// Sync automático al guardar cambios en maestros
var _origSave = typeof saveDB === 'function' ? saveDB : null;

function exportarHorariosSSNet(){
  var res = document.getElementById('export-horario-res');
  if(res){res.style.display='block';res.style.background='#dbeafe';res.style.color='#1e40af';res.textContent='Preparando datos de horarios...';}

  var SSNET_URL = DB.scriptUrl || '';
  if(!SSNET_URL){
    if(res){res.style.background='#fee2e2';res.style.color='#b91c1c';res.textContent='Error: configura la URL de SSNet en Config primero.';}
    return;
  }

  var DIAS2=['Lunes','Martes','Miercoles','Jueves','Viernes'];
  var gruposData=[];
  var maestrosData=[];
  var refuerzoData=[];

  function tramoLabel(t){
    try{ return fmt(t.ini)+(t.fin?'-'+fmt(t.fin):''); }catch(e){ return (t.ini||'')+''; }
  }
  function slotTexto(slot, conGrupo, g){
    var txt='';
    var tipo=slot.tipo||'clase';
    if(tipo!=='clase'&&typeof SLOT_TIPOS!=='undefined'&&SLOT_TIPOS[tipo]){ txt=slot.txt||SLOT_TIPOS[tipo].label; }
    else if(slot.mId){
      var mat=DB.hMat.find(function(m){return m.id===slot.mId;});
      txt=(mat?mat.n:'');
    }
    if(txt&&conGrupo&&g) txt+=' '+(g.n||'');
    return txt;
  }

  // 1) HORARIOS POR GRUPO: [Grupo, Dia, Tramo, Maestro, Materia]
  (DB.hGrupos||[]).forEach(function(g){
    var hor=(DB.hHor||{})[g.id]; if(!hor) return;
    DIAS2.forEach(function(d){
      (hor[d]||[]).forEach(function(slot,ti){
        var t=(DB.tramos||[])[ti]; if(!t||t.r||slot.r) return;
        if(!slot.mId&&!(slot.tipo&&slot.tipo!=='clase')) return;
        var mat=slot.mId?DB.hMat.find(function(m){return m.id===slot.mId;}):null;
        var prof=slot.pId?DB.maestros.find(function(m){return m.id===slot.pId;}):null;
        var materia=mat?mat.n:(slot.txt||'');
        gruposData.push([g.n||'', d, tramoLabel(t), prof?prof.n:'', materia]);
      });
    });
  });

  // 2) HORARIOS POR MAESTRO: [Maestro, Tramo, L, M, X, J, V]
  (DB.maestros||[]).forEach(function(p){
    if(!p.n) return;
    (DB.tramos||[]).forEach(function(t,ti){
      if(t.r) return;
      var row=[p.n, tramoLabel(t)]; var tiene=false;
      DIAS2.forEach(function(d){
        var celda='';
        (DB.hGrupos||[]).some(function(g){
          var hor=(DB.hHor||{})[g.id];
          var slot=hor&&hor[d]&&hor[d][ti];
          if(slot&&slot.pId===p.id&&slot.mId){ celda=slotTexto(slot,true,g); return true; }
          return false;
        });
        if(celda) tiene=true;
        row.push(celda);
      });
      if(tiene) maestrosData.push(row);
    });
  });

  var totalFilas=gruposData.length+maestrosData.length;
  if(!totalFilas){
    if(res){res.style.background='#fee2e2';res.style.color='#b91c1c';res.textContent='No hay horarios construidos que exportar.';}
    return;
  }

  if(res)res.textContent='Enviando '+totalFilas+' filas a SSNet...';
  var datos={maestros:maestrosData, grupos:gruposData, refuerzo:refuerzoData};
  var body='accion=publicarHorarios&datos='+encodeURIComponent(JSON.stringify(datos));
  fetch(SSNET_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:body})
  .then(function(){
    if(res){res.style.background='#d1fae5';res.style.color='#065f46';
      res.textContent='✅ Enviados '+maestrosData.length+' tramos de maestros y '+gruposData.length+' de grupos. Comprueba las pestañas Horarios_ del Sheet.';}
  })
  .catch(function(e){
    if(res){res.style.background='#fee2e2';res.style.color='#b91c1c';res.textContent='Error de conexión: '+e;}
  });
}

  var m=String(n).match(/^(3anos|4anos|5anos|1o|2o|3o|4o|5o|6o)/);

  if(String(n).toUpperCase().indexOf('ESTRELLA')>=0)return 'estrellas';

}
function crearGruposFaltantes(){
  // Candidatos: los del catalogo (Claustro) + los que ya tengan tutoria asignada
  var cands=todosG().slice();
  (DB.maestros||[]).forEach(function(m){
    if(m.g&&cands.indexOf(m.g)<0)cands.push(m.g);
    if(m.gRef&&cands.indexOf(m.gRef)<0)cands.push(m.gRef);
  });
  var creados=0,sinNivel=[];
  cands.forEach(function(n){
    if(!n)return;
    if(DB.hGrupos.some(function(g){return g.n===n;}))return;
    var niv=nivDeNombre(n);
    if(!niv){sinNivel.push(n);return;}
    DB.hGrupos.push({id:'g'+Date.now()+Math.floor(Math.random()*9999),n:n,niv:niv,c:'#f8fafc'});
    creados++;
  });
  save();rHGrupos();

  var infCat=(DB.grupos['_3anos']||0)+(DB.grupos['_4anos']||0)+(DB.grupos['_5anos']||0);
  var infCreados=DB.hGrupos.filter(function(g){return ['3anos','4anos','5anos'].indexOf(g.niv)>=0;}).length;
  var msg='';
  if(creados)msg+='Creados '+creados+' grupos. Ya aparecen en Asignacion y en el Horario Visual.\n\n';
  else msg+='No se ha creado ninguno (ya estaban todos).\n\n';
  msg+='Grupos de INFANTIL disponibles ahora: '+infCreados+'\n';
  if(infCreados===0&&infCat===0){
    msg+='\n\u26A0\uFE0F No hay grupos de infantil configurados.\nVe a Claustro > Grupos por nivel y pon cuantos grupos hay de 3, 4 y 5 anos. Luego vuelve y pulsa este boton otra vez.';
  }
  if(sinNivel.length)msg+='\n\nNo pude deducir el nivel de: '+sinNivel.join(', ')+' (crealos a mano abajo).';
  alert(msg);
}

function getBojaH(gid,mid){
  var g=DB.hGrupos.find(function(x){return x.id===gid;});
  if(!g)return -1;
  var CURSOS2=['1o','2o','3o','4o','5o','6o'];
  var ci=CURSOS2.indexOf(g.niv);
  // Si el nivel no es de Primaria (Infantil u otro) -> horas editables
  if(ci<0)return -1;
  var mat=DB.hMat.find(function(m){return m.id===mid;});
  if(!mat)return -1;
  var keyMap={
    'E.F.':'ef','Ingles':'ing','Frances':'fra','Musica':'mus',
    'Plastica':'plas','Artistica':'plas','Lengua':'len','Matematicas':'mat',
    'Cono.Medio':'cono','Religion':'rel','Religion/AE':'rel',
    'Aten.Educativa':'aten','AtencionEducativa':'aten','Atencion':'aten',
    'Libre Disp.':'aut','Autonomia':'aut',
    'Ed.Valores':'val','Valores':'val','Ed. Valores':'val'
  };
  var key=null;
  Object.keys(keyMap).forEach(function(k){
    if(mat.n.toLowerCase().indexOf(k.toLowerCase())>=0)key=keyMap[k];
  });
  if(!key)return -1; // materia sin clave BOJA -> editable
  var h=(DB.bojaHoras&&DB.bojaHoras[key])?DB.bojaHoras[key][ci]||0:0;
  return h; // puede ser 0 (materia no impartida en ese curso) o >0
}

function getHorasAsignadas(mId){
  var total=0;
  DB.hGrupos.forEach(function(g){
    var carga=DB.hCarga[g.id]||{};
    DB.hMat.forEach(function(mat){
      var cv=carga[mat.id];
      if(cv&&cv.m===mId){
        var hBoja=getBojaH(g.id,mat.id);
        // Si BOJA tiene horas definidas, usar esas; si es editable usar las guardadas
        total+=hBoja>0?hBoja:(hBoja===-1?(cv.h||0):0);
      }
    });
  });
  return total;
}

function setMaestroEl(el){
  var gid=el.getAttribute('data-gid');
  var mid=el.getAttribute('data-mid');
  var mId=el.value;
  if(!DB.hCarga[gid])DB.hCarga[gid]={};
  if(!DB.hCarga[gid][mid])DB.hCarga[gid][mid]={h:0,m:''};
  // Guardar primero para calcular correctamente
  var prevM=DB.hCarga[gid][mid].m;
  DB.hCarga[gid][mid].m=mId;
  // Comprobar si el maestro tiene exceso tras la asignacion
  if(mId){
    var m=DB.maestros.find(function(x){return String(x.id)===String(mId);});
    if(m){
      var hAsig=hA(m);
      var hDisp=hd(m);
      if(hAsig>hDisp){
        // Mostrar alerta pero no revertir - el usuario decide
        el.style.background='#fee2e2';
        el.style.borderColor='#b91c1c';
        el.title='EXCESO: '+hAsig.toFixed(1)+'h asignadas / '+hDisp.toFixed(1)+'h disponibles';
      } else {
        el.style.background='';
        el.style.borderColor='';
        el.title='';
      }
    }
  }
  var hBoja=getBojaH(gid,mid);
  var horas=hBoja>0?hBoja:(DB.hCarga[gid][mid].h||0);
  // Quitar del maestro anterior
  DB.maestros.forEach(function(m){
    if(String(m.id)!==String(mId)&&m.asig){
      m.asig=m.asig.filter(function(a){return!(a.gid===gid&&a.mid===mid);});
    }
  });
  // Asignar al nuevo
  if(mId){
    var m=DB.maestros.find(function(x){return String(x.id)===String(mId);});
    if(m){
      if(!m.asig)m.asig=[];
      var ex=m.asig.find(function(a){return a.gid===gid&&a.mid===mid;});
      if(ex)ex.h=horas;
      else m.asig.push({gid:gid,mid:mid,h:horas});
    }
  }
  save();
  rHCarga();
}

function sincHorConTramos(){
  var n=HFRANJAS.length;
  if(!n||!DB.hHor)return;
  Object.keys(DB.hHor).forEach(function(gid){
    if(!DB.hHor[gid])return;
    DIAS.forEach(function(d){
      var arr=DB.hHor[gid][d]||[];
      while(arr.length<n)arr.push({mId:null,pId:null,fij:false,dur:HFRANJAS[arr.length].dur,r:HFRANJAS[arr.length].r});
      if(arr.length>n)arr.length=n;
      for(var i=0;i<n;i++){
        if(!arr[i])arr[i]={mId:null,pId:null,fij:false};
        arr[i].dur=HFRANJAS[i].dur;
        arr[i].r=HFRANJAS[i].r;
        if(HFRANJAS[i].r){arr[i].mId=null;arr[i].pId=null;arr[i].tipo='';}
        if(arr[i].tipo==='despacho')arr[i].tipo='direccion';
      }
      DB.hHor[gid][d]=arr;
    });
  });
}

function getMaestroHor(mid){
  // Horario del maestro: combina grupos + slots propios (despacho, coord, reduccion)
  var DIAS2=['Lunes','Martes','Miercoles','Jueves','Viernes'];
  var horMae={};
  DIAS2.forEach(function(d){
    horMae[d]=DB.tramos.map(function(t,ti){
      if(t.r)return{r:true};
      // Buscar en grupos
      var enGrupo=null;
      DB.hGrupos.forEach(function(g){
        var hG=DB.hHor&&DB.hHor[g.id];
        if(!hG||!hG[d]||!hG[d][ti])return;
        var slot=hG[d][ti];
        if(slot&&String(slot.pId)===String(mid)){
          var mat=slot.mId?DB.hMat.find(function(m){return m.id===slot.mId;}):null;
          enGrupo={mId:slot.mId,pId:slot.pId,grupo:g.n,matNombre:mat?mat.n:'',tipo:'clase'};
        }
      });
      if(enGrupo)return enGrupo;
      // Slot propio del maestro (despacho, coord, reduccion)
      var kMae='mae_'+mid;
      if(!DB.hHor[kMae])return{mId:null,pId:null,tipo:'libre',txt:''};
      var hM=DB.hHor[kMae];
      if(hM[d]&&hM[d][ti])return hM[d][ti];
      return{mId:null,pId:null,tipo:'libre',txt:''};
    });
  });
  return horMae;
}

    });
  }
  return DB.hHor[kMae];
}

function getMaestroSlot(mid,dia,ti){
  // Buscar slot del maestro: primero en grupos, luego en su horario propio
  var enGrupo=null;
  DB.hGrupos.forEach(function(g){
    var hG=DB.hHor&&DB.hHor[g.id];
    if(!hG||!hG[dia]||!hG[dia][ti])return;
    var s=hG[dia][ti];
    if(s&&String(s.pId)===String(mid)){
      var mat=s.mId?DB.hMat.find(function(m){return m.id===s.mId;}):null;
      enGrupo={mId:s.mId,pId:s.pId,grupo:g.n,matNombre:mat?mat.n:'',tipo:'clase',fij:s.fij};
    }
  });
  if(enGrupo)return enGrupo;
  var hP=getHorMaePropio(mid);
  if(hP[dia]&&hP[dia][ti])return hP[dia][ti];

function celdaClick(el){
  var eid=el.getAttribute('data-eid');
  var dia=el.getAttribute('data-dia');
  var ti=parseInt(el.getAttribute('data-ti'));
  var esGrupo=el.getAttribute('data-esgrupo')==='1';
  // Convertir eid al tipo correcto
  var g=DB.hGrupos.find(function(g){return g.id===eid;});
  if(!g&&!esGrupo){
    var m=DB.maestros.find(function(m){return String(m.id)===eid;});
    if(m)eid=m.id;
  }
  SLOT_ACTIVO={eid:eid,dia:dia,ti:ti,esGrupo:esGrupo};
  rHHorario();
}

function setSlotTipo(btn){
  if(!SLOT_ACTIVO)return;
  var tipo=btn.getAttribute('data-tipo');
  var sa=SLOT_ACTIVO;
  var hor=sa.esGrupo?getHorGrupo(sa.eid):getHorMaePropio(sa.eid);
  if(!hor[sa.dia]||!hor[sa.dia][sa.ti])return;
  hor[sa.dia][sa.ti].tipo=tipo;
  if(tipo!=='clase'){hor[sa.dia][sa.ti].mId=null;hor[sa.dia][sa.ti].pId=null;}
  save();rHHorario();
}

function guardarSlot(){
  if(!SLOT_ACTIVO)return;
  var sa=SLOT_ACTIVO;
  var hor=sa.esGrupo?getHorGrupo(sa.eid):getHorMaePropio(sa.eid);
  if(!hor[sa.dia]||!hor[sa.dia][sa.ti])return;
  var slot=hor[sa.dia][sa.ti];
  var matEl=document.getElementById('slot-mat');
  var profEl=document.getElementById('slot-prof');
  var txtEl=document.getElementById('slot-txt');
  var fijEl=document.getElementById('slot-fij');
  if(matEl)slot.mId=matEl.value||null;
  if(profEl)slot.pId=profEl.value?parseInt(profEl.value):null;
  if(txtEl)slot.txt=txtEl.value||'';
  if(fijEl)slot.fij=fijEl.checked;
  save();rHHorario();
}

function vaciarSlot(){
  if(!SLOT_ACTIVO)return;
  var sa=SLOT_ACTIVO;
  var hor=sa.esGrupo?getHorGrupo(sa.eid):getHorMaePropio(sa.eid);
  if(hor[sa.dia]&&hor[sa.dia][sa.ti]){
    hor[sa.dia][sa.ti]={mId:null,pId:null,fij:false,tipo:'clase',txt:''};
  }
  SLOT_ACTIVO=null;
  save();rHHorario();
}

function genHorario(){
  if(!confirm('Generar horario automatico?\nSe respetan las celdas fijadas manualmente.'))return;
  // Verificar que hay asignaciones
  var totalAsig=0;
  DB.hGrupos.forEach(function(g){
    var carga=DB.hCarga[g.id]||{};
    DB.hMat.forEach(function(mat){
      var cv=carga[mat.id];
      if(cv&&cv.m)totalAsig++;
    });
  });
  if(totalAsig===0){
    alert('No hay materias asignadas.\n\nVe a Horarios -> Asignacion y asigna un maestro/a a cada materia de cada grupo primero.');
    return;
  }
  var DIAS2=['Lunes','Martes','Miercoles','Jueves','Viernes'];
  var GEN_AVISOS=[];
  var durMod=(DB.tramos.filter(function(t){return !t.r;})[0]||{dur:45}).dur;
  DB.hGrupos.forEach(function(g){
    var hor=getHorGrupo(g.id);
    var carga=DB.hCarga[g.id]||{};
    // Lista de tareas (modulos a asignar)
    var tareas=[];
    DB.hMat.forEach(function(mat){
      var cv=carga[mat.id];
      if(!cv||!cv.m)return;
      var activas=DB.hCarga[g.id]&&DB.hCarga[g.id]._activas;
      if(activas&&activas[mat.id]===false)return;
      // Aten.Educativa NO genera modulos propios: va SIEMPRE en paralelo con Religion
      // (el alumnado se reparte en la misma hora segun lo que haya elegido)
      if(mat.n==='Aten.Educativa')return;
      var hBoja=getBojaH(g.id,mat.id);
      var horas=hBoja>0?hBoja:(cv&&cv.h?cv.h:0);
      var mods=Math.round(horas*60/durMod);
      for(var i=0;i<mods;i++)tareas.push({mId:mat.id,pId:parseInt(cv.m)});
    });
    // Huecos disponibles (no fijados, no recreo, no otro tipo)
    var huecos=[];
    DIAS2.forEach(function(d){
      DB.tramos.forEach(function(t,ti){
        if(t.r)return;
        var slot=hor[d]&&hor[d][ti]?hor[d][ti]:{};
        if(!slot.fij&&!slot.mId&&!(slot.tipo&&slot.tipo!=='clase')){
          huecos.push({d:d,ti:ti});
        }
      });
    });
    // Funcion para comprobar si un maestro ya esta ocupado en otro grupo
    function maestroOcupado(pId,dia,ti){
      if(!pId)return false;
      for(var gi=0;gi<DB.hGrupos.length;gi++){
        var og=DB.hGrupos[gi];
        if(og.id===g.id)continue; // no contar el mismo grupo
        var horO=DB.hHor&&DB.hHor[og.id];
        if(!horO||!horO[dia]||!horO[dia][ti])continue;
        var sO=horO[dia][ti];
        if(sO&&String(sO.pId)===String(pId))return true;
        if(sO&&sO.pIdAten&&String(sO.pIdAten)===String(pId))return true;
      }
      return false;
    }
    // ── Colocacion por BLOQUES segun los parametros de cada materia ──
    function _matDe(mid){for(var i=0;i<DB.hMat.length;i++)if(String(DB.hMat[i].id)===String(mid))return DB.hMat[i];return {};}
    function _libre(d,ti){
      if(DB.tramos[ti]&&DB.tramos[ti].r)return false;
      var sx=hor[d]&&hor[d][ti]?hor[d][ti]:null;
      if(!sx)return true;
      if(sx.fij||sx.mId)return false;
      if(sx.tipo&&sx.tipo!=='clase')return false;
      return true;
    }
    function _modsDia(mId,d){
      var c=0;
      (DB.tramos||[]).forEach(function(t,ti){
        var sx=hor[d]&&hor[d][ti];
        if(sx&&String(sx.mId)===String(mId))c++;
      });
      return c;
    }
    function _paralelo(d,ti,mId){
      var matAsig=_matDe(mId);
      if(matAsig&&matAsig.n==='Religion'){
        hor[d][ti].paralelo=true;
        var cargaG=DB.hCarga[g.id]||{};
        var atenMat=DB.hMat.find(function(m){return m.n==='Aten.Educativa';});
        if(atenMat){
            var cvAten=cargaG[atenMat.id];
          if(cvAten&&cvAten.m){
            hor[d][ti].pIdAten=cvAten.m;
            hor[d][ti].mIdAten=atenMat.id;
          }
        }
      }
    }
    // Agrupar los modulos de cada materia en bloques
    var porMat={};
    tareas.forEach(function(t){(porMat[t.mId]=porMat[t.mId]||[]).push(t);});
    var bloques=[];
    Object.keys(porMat).forEach(function(mid){
      var lista=porMat[mid];
      var mat=_matDe(mid);
      var tam=Math.max(1,parseInt(mat.blq)||1);
      var k=0;
      while(k<lista.length){
        var n=Math.min(tam,lista.length-k);
        bloques.push({mId:lista[k].mId,pId:lista[k].pId,n:n,maxD:parseInt(mat.maxD)||0});
        k+=n;
      }
    });
    bloques.sort(function(a,b){return b.n-a.n;});
    var idxT=[];
    (DB.tramos||[]).forEach(function(t,ti){if(!t.r)idxT.push(ti);});
    var sinSitio=0;
    bloques.forEach(function(b){
      var puesto=false;
      var dias=DIAS2.slice().sort(function(x,y){return _modsDia(b.mId,x)-_modsDia(b.mId,y);});
      for(var di=0;di<dias.length&&!puesto;di++){
        var d=dias[di];
        if(b.maxD>0&&_modsDia(b.mId,d)+b.n>b.maxD)continue;
        for(var k2=0;k2+b.n<=idxT.length&&!puesto;k2++){
          var vale=true;
          for(var j=0;j<b.n;j++){
            var ti=idxT[k2+j];
            if(!_libre(d,ti)||maestroOcupado(b.pId,d,ti)){vale=false;break;}
          }
          if(!vale)continue;
          for(var j2=0;j2<b.n;j2++){
            var ti2=idxT[k2+j2];
            if(!hor[d])hor[d]=[];
            if(!hor[d][ti2])hor[d][ti2]={};
            hor[d][ti2].mId=b.mId;hor[d][ti2].pId=b.pId;hor[d][ti2].tipo='clase';hor[d][ti2].txt='';
            _paralelo(d,ti2,b.mId);
          }
          puesto=true;
        }
      }
      if(!puesto)sinSitio+=b.n;
    });
    if(sinSitio)GEN_AVISOS.push(g.n+': '+sinSitio+' modulos sin hueco');

  });
  save();rHHorario();
  alert('Horario generado. Revisa y ajusta manualmente si necesitas cambios.');
}

function imprimirHorario(){
  var DIAS2=['Lunes','Martes','Miercoles','Jueves','Viernes'];
  var numTramos=DB.tramos.length;

  function tablaHTML(titulo,slots,colorHdr){
    var t='<table><thead><tr>';
    t+='<th style="background:'+colorHdr+';color:#fff;padding:2pt 3pt;font-size:6pt;width:20pt">Hora</th>';
    DIAS2.forEach(function(d){t+='<th style="background:'+colorHdr+';color:#fff;padding:2pt;font-size:6pt">'+d.charAt(0)+'</th>';});
    t+='</tr></thead><tbody>';
    DB.tramos.forEach(function(tr,ti){
      t+='<tr>';
      t+='<td style="background:#f5f5f5;font-size:5pt;padding:1pt 2pt;text-align:right;color:#666;white-space:nowrap">'+fmt(tr.ini)+'</td>';
      DIAS2.forEach(function(d){
        var slot=slots[d]&&slots[d][ti]?slots[d][ti]:{r:tr.r};
        if(tr.r||slot.r){t+='<td style="background:#fef9c3;font-size:5pt;text-align:center;color:#92400e">R</td>';return;}
        var bg='#fff',txt='',sub='';
        var tipo=slot.tipo||'clase';
        if(tipo!=='clase'&&SLOT_TIPOS[tipo]){bg=SLOT_TIPOS[tipo].bg;txt=(slot.txt||SLOT_TIPOS[tipo].label).substring(0,6);}
        else if(slot.mId||slot.matNombre){
          var mat=slot.mId?DB.hMat.find(function(m){return m.id===slot.mId;}):null;
          bg=mat?mat.c:'#f0fdf4';
          txt=slot.matNombre||(mat?mat.n.substring(0,7):'');
          sub=slot.grupo||(slot.pId?((DB.maestros.find(function(m){return m.id===slot.pId;})||{}).n||'').split(' ')[0]:'');
        }
        t+='<td style="background:'+bg+';padding:1pt 2pt;vertical-align:top">';
        if(txt)t+='<div style="font-size:5pt;font-weight:bold;line-height:1.1">'+txt+'</div>';
        if(sub)t+='<div style="font-size:4pt;color:#555;line-height:1.1">'+sub+'</div>';
        t+='</td>';
      });
      t+='</tr>';
    });
    t+='</tbody></table>';
    return '<div class="hor-box"><div class="hor-titulo" style="background:'+colorHdr+'">'+titulo+'</div>'+t+'</div>';
  }

  var html='<!DOCTYPE html><html><head><meta charset="UTF-8">';
  html+='<title>Horarios CEIP San Sebastian</title>';
  html+='<style>';
  html+='*{box-sizing:border-box;margin:0;padding:0}';
  html+='body{font-family:Arial,sans-serif;font-size:7pt;background:#fff}';
  html+='.pagina{width:277mm;min-height:190mm;padding:6mm;page-break-after:always}';
  html+='.titulo-sec{font-size:9pt;font-weight:bold;color:#1e3a8a;border-bottom:1.5pt solid #1e3a8a;margin-bottom:4pt;padding-bottom:1pt}';
  html+='.titulo-sec2{font-size:9pt;font-weight:bold;color:#14532d;border-bottom:1.5pt solid #14532d;margin-bottom:4pt;padding-bottom:1pt}';
  html+='.titulo-sec3{font-size:9pt;font-weight:bold;color:#7c3aed;border-bottom:1.5pt solid #7c3aed;margin-bottom:4pt;padding-bottom:1pt}';
  html+='.fila{display:flex;gap:3mm;margin-bottom:4mm;flex-wrap:nowrap}';
  html+='.hor-box{flex:1;min-width:0}';
  html+='.hor-titulo{font-size:7pt;font-weight:bold;color:#fff;padding:2pt 4pt;border-radius:2pt 2pt 0 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}';
  html+='table{width:100%;border-collapse:collapse;table-layout:fixed}';
  html+='td,th{border:0.3pt solid #ccc;vertical-align:top}';
  html+='@page{size:A4 landscape;margin:5mm}';
  html+='@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}';
  html+='</style></head><body>';

  // PAGINA 1 a N: Grupos (3 pares grupo+tutor por pagina = 6 horarios)
  html+='<div class="pagina">';
  html+='<div class="titulo-sec">CEIP San Sebastian - Horarios de Grupos y Tutores</div>';
  var col=0;
  var filaAbierta=false;

  DB.hGrupos.forEach(function(g,gi){

      if(!m.t)return false;
      var mg=(m.g||'').trim().toLowerCase().replace(/[^a-z0-9]/g,'');
      var mgr=(m.gRef||'').trim().toLowerCase().replace(/[^a-z0-9]/g,'');

      return mg===gn||mgr===gn;
    });
    // Cada par grupo+tutor son 2 columnas
    // Caben 3 pares por pagina (6 columnas en A4 landscape)

      if(filaAbierta)html+='</div>';
      if(gi>0&&gi%6===0){html+='</div><div class="pagina"><div class="titulo-sec">CEIP San Sebastian - Horarios de Grupos y Tutores (cont.)</div>';}
      html+='<div class="fila">';
      filaAbierta=true;
    }
    var horG=getHorGrupo(g.id);
    html+=tablaHTML(g.n,horG,'#1e3a8a');

  var directivo=DB.maestros.filter(function(m){
    return['Director','Jefe de Estudios','Secretario'].indexOf(m.cargo)>=0;
  });
  if(directivo.length>0){
    html+='<div class="pagina"><div class="titulo-sec3">Equipo Directivo</div><div class="fila">';
    directivo.forEach(function(m){
      var horM={};
      DIAS2.forEach(function(d){horM[d]=DB.tramos.map(function(t,ti){return getMaestroSlot(m.id,d,ti);});});
      html+=tablaHTML(m.n+(m.cargo?' ('+m.cargo.split(' ')[0]+')':''),horM,'#7c3aed');
    });
    html+='</div></div>';
  }

  // PAGINA(S): Especialistas (4 por pagina)
  var especialistas=DB.maestros.filter(function(m){
    return['EF','Ingles','Frances','Musica','Religion'].indexOf(m.e)>=0&&
           ['Director','Jefe de Estudios','Secretario'].indexOf(m.cargo)<0;
  });
  if(especialistas.length>0){
    html+='<div class="pagina"><div class="titulo-sec2">Especialistas</div><div class="fila">';
    especialistas.forEach(function(m,mi){
      if(mi>0&&mi%4===0)html+='</div><div class="pagina"><div class="titulo-sec2">Especialistas (cont.)</div><div class="fila">';
      var horM={};
      DIAS2.forEach(function(d){horM[d]=DB.tramos.map(function(t,ti){return getMaestroSlot(m.id,d,ti);});});
      html+=tablaHTML(m.n,horM,'#14532d');
    });
    html+='</div></div>';
  }

  html+='</body></html>';
  var w=window.open('','_blank','width=1100,height=800');
  w.document.write(html);
  w.document.close();
  setTimeout(function(){w.print();},800);
}

function exportarSheets(){

  // Construir datos para Sheets: una hoja por grupo
  var hojas=[];
  DB.hGrupos.forEach(function(g){
    var hor=getHorGrupo(g.id);
    var filas=[['',].concat(DIAS2)];
    DB.tramos.forEach(function(t,ti){
      var fila=[fmt(t.ini)];
      DIAS2.forEach(function(d){
        var slot=hor[d]&&hor[d][ti]?hor[d][ti]:{r:t.r};
        if(t.r||slot.r){fila.push('RECREO');return;}
        var txt='';
        var tipo=slot.tipo||'clase';
        if(tipo!=='clase'&&SLOT_TIPOS[tipo]){txt=slot.txt||SLOT_TIPOS[tipo].label;}
        else if(slot.mId){
          var mat=DB.hMat.find(function(m){return m.id===slot.mId;});
          var prof=slot.pId?DB.maestros.find(function(m){return m.id===slot.pId;}):null;
          txt=(mat?mat.n:'')+(prof?' - '+prof.n:'');
        }
        fila.push(txt);
      });
      filas.push(fila);
    });
    hojas.push({nombre:g.n,filas:filas});
  });
  // Subir via script
  var cb='_exp'+Date.now();
  window[cb]=function(r){
    delete window[cb];
    if(r&&r.ok)alert('Horarios exportados a Google Sheets correctamente.');
    else alert('Error al exportar: '+(r?r.error:'sin respuesta'));
  };
  var datos=JSON.stringify({hojas:hojas});
  var s=document.createElement('script');
  s.src=url+'?accion=exportarHorarios&callback='+cb+'&datos='+encodeURIComponent(datos);
  s.onerror=function(){delete window[cb];alert('Error de conexion.');};
  document.head.appendChild(s);
  setTimeout(function(){if(window[cb]){delete window[cb];alert('Timeout.');}},10000);
}

function limpiarHorario(){
  if(!confirm('Limpiar celdas no fijadas de todos los grupos?'))return;
  DB.hGrupos.forEach(function(g){
    var hor=DB.hHor&&DB.hHor[g.id];
    if(!hor)return;
    ['Lunes','Martes','Miercoles','Jueves','Viernes'].forEach(function(d){
      (hor[d]||[]).forEach(function(slot){
        if(!slot.fij){slot.mId=null;slot.pId=null;slot.tipo='clase';slot.txt='';}
      });
    });
  });
  SLOT_ACTIVO=null;
  save();rHHorario();
}

function getMesLabel2(m){
  var p = m.split('-');
  var meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
               'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  return meses[parseInt(p[1])-1]+' '+p[0];
}

function getDiasLaborables(mesStr){
  var p = mesStr.split('-');
  var anio = parseInt(p[0]), mes = parseInt(p[1])-1;
  var dias = [], d = new Date(anio,mes,1);
  var diasNom = ['Domingo','Lunes','Martes','Miercoles','Jueves','Viernes','Sabado'];
  while(d.getMonth()===mes){
    var dow = d.getDay();
    if(dow>=1&&dow<=5){
      dias.push({
        fecha: d.getFullYear()+'-'+(d.getMonth()<9?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate(),
        diaSem: diasNom[dow],
        num: d.getDate(),
        sem: Math.ceil(d.getDate()/7)
      });
    }
    d.setDate(d.getDate()+1);
  }
  return dias;
}

function getMaestrosRecreables(){

           exentos.indexOf(m.id)<0;
  });
}

function genTurnosMes(mesStr){
  initRecreo();
  var dias = getDiasLaborables(mesStr);
  var todos = getMaestrosRecreables();
  var numInf = DB.recreo.numInfantil||4;
  var maxDias = DB.recreo.maxDias||2;
  var zonas = DB.recreo.zonasPrimaria||[];

  // Listas de disponibilidad
  var dispInf = DB.recreo.dispInfantil||[];
  var dispPrim = DB.recreo.dispPrimaria||[];

  // Si no hay listas, usar por defecto
  var maestrosInf = dispInf.length>0
    ? todos.filter(function(m){return dispInf.indexOf(m.id)>=0;})
    : todos.filter(function(m){return m.e==='Infantil';});
  var tutoresInf = maestrosInf.filter(function(m){return m.t;});

  var maestrosPrim = dispPrim.length>0
    ? todos.filter(function(m){return dispPrim.indexOf(m.id)>=0;})
    : todos.filter(function(m){return m.e!=='Infantil';});

  // Ampliar si hay pocos
  if(maestrosInf.length<numInf){
    todos.forEach(function(m){if(maestrosInf.indexOf(m)<0)maestrosInf.push(m);});
  }
  if(maestrosPrim.length<zonas.filter(function(z){return !z.fija;}).length+1){
    todos.forEach(function(m){if(maestrosPrim.indexOf(m)<0)maestrosPrim.push(m);});
  }

  // Contadores semanales {sem: {mId: dias}}
  var contSem = {};
  function getDias(mId,sem){return(contSem[sem]&&contSem[sem][mId])||0;}
  function addDia(mId,sem){
    if(!contSem[sem])contSem[sem]={};
    contSem[sem][mId]=(contSem[sem][mId]||0)+1;
  }

  var turnos = {};

  dias.forEach(function(d){
    var sem = d.sem;
    var t = {fecha:d.fecha, diaSem:d.diaSem, infantil:[], primaria:{}};

    // === INFANTIL ===
    // Ordenar por menos dias esta semana
    var candInf = maestrosInf.slice().sort(function(a,b){
      var da=getDias(a.id,sem), db=getDias(b.id,sem);
      if(da!==db)return da-db;
      return Math.random()-0.5;
    });
    var selInf = [];

    // Min 1 tutora de infantil
    var tutDisp = tutoresInf.filter(function(m){return getDias(m.id,sem)<maxDias;});
    if(tutDisp.length>0){selInf.push(tutDisp[0].id);}

    // Min 2 de infantil total
    candInf.filter(function(m){return m.e==='Infantil'&&getDias(m.id,sem)<maxDias&&selInf.indexOf(m.id)<0;}).forEach(function(m){
      if(selInf.length<2)selInf.push(m.id);
    });

    // Completar hasta numInf
    candInf.filter(function(m){return getDias(m.id,sem)<maxDias&&selInf.indexOf(m.id)<0;}).forEach(function(m){
      if(selInf.length<numInf)selInf.push(m.id);
    });
    // Si aun faltan, sin limite de dias
    candInf.filter(function(m){return selInf.indexOf(m.id)<0;}).forEach(function(m){
      if(selInf.length<numInf)selInf.push(m.id);
    });

    selInf.forEach(function(id){addDia(id,sem);});
    t.infantil = selInf;

    // === PRIMARIA ===
    var numPrim = DB.recreo.numPrimaria||7;
    var dispAcomp = DB.recreo.dispAcompanamiento||[]; // maestros que pueden hacer acompaamiento
    var yaAsig = selInf.slice();
    t.primaria = {};

    var candPrim = maestrosPrim.slice().sort(function(a,b){
      var da=getDias(a.id,sem), db=getDias(b.id,sem);
      if(da!==db)return da-db;
      return Math.random()-0.5;
    });

    function siguienteCand(){
      var c1=candPrim.filter(function(m){return yaAsig.indexOf(m.id)<0&&getDias(m.id,sem)<maxDias;});
      var c2=candPrim.filter(function(m){return yaAsig.indexOf(m.id)<0&&getDias(m.id,sem)>=maxDias;});
      var todos2=c1.concat(c2);
      if(todos2.length===0)return null;
      return todos2[0];
    }

    // 1. Zona de acompaamiento primero (maestro especfico si hay)
    var zonasAcomp = zonas.filter(function(z){return z.esAcomp;});
    var zonasNormales = zonas.filter(function(z){return !z.esAcomp&&!z.fija;});

    zonasAcomp.forEach(function(z){
      var candAcomp = dispAcomp.length>0
        ? candPrim.filter(function(m){return dispAcomp.indexOf(m.id)>=0&&yaAsig.indexOf(m.id)<0;})
        : [];
      var m = candAcomp.length>0 ? candAcomp[0] : siguienteCand();
      if(m){
        t.primaria[z.id]={zona:z.n,maestroId:m.id,maestroN:m.n,fija:false,sust:false,esAcomp:true};
        yaAsig.push(m.id);
        addDia(m.id,sem);
      }
    });

    // 2. Una ronda por todas las zonas normales (1 maestro por zona)
    zonasNormales.forEach(function(z){
      var m = siguienteCand();
      if(m){
        t.primaria[z.id]={zona:z.n,maestroId:m.id,maestroN:m.n,fija:false,sust:false,esAcomp:false};
        yaAsig.push(m.id);
        addDia(m.id,sem);
      }
    });

    // 3. Si quedan plazas (numPrim - asignados), repartir en zonas normales (2o maestro)
    var asignadosAhora = yaAsig.length - selInf.length;
    var plazasExtra = numPrim - asignadosAhora;
    var zi = 0;
    while(plazasExtra>0 && zi<zonasNormales.length){
      var z2 = zonasNormales[zi];
      var m2 = siguienteCand();
      if(m2){
        t.primaria[z2.id+'_2']={zona:z2.n,maestroId:m2.id,maestroN:m2.n,fija:false,sust:false,esAcomp:false};
        yaAsig.push(m2.id);
        addDia(m2.id,sem);
        plazasExtra--;
      }
      zi++;
    }

    turnos[d.fecha] = t;
  });

  DB.recreo.turnosMes[mesStr] = turnos;
  save();
  return turnos;
}

function cambiarMesRecreo(delta){

}

function updInfantilEl(el){
  var fecha = el.getAttribute('data-fecha');
  var idx = parseInt(el.getAttribute('data-idx'));
  var mId = el.value?parseInt(el.value):null;
  if(!DB.recreo.turnosMes[RECREO_MES_ACTUAL]||!DB.recreo.turnosMes[RECREO_MES_ACTUAL][fecha])return;
  if(!DB.recreo.turnosMes[RECREO_MES_ACTUAL][fecha].infantil)
    DB.recreo.turnosMes[RECREO_MES_ACTUAL][fecha].infantil=[];
  DB.recreo.turnosMes[RECREO_MES_ACTUAL][fecha].infantil[idx] = mId;
  save();
}

function updZonaRecreoEl(el){
  var fecha = el.getAttribute('data-fecha');
  var zid = el.getAttribute('data-zid');
  var mId = el.value?parseInt(el.value):null;
  if(!DB.recreo.turnosMes[RECREO_MES_ACTUAL]||!DB.recreo.turnosMes[RECREO_MES_ACTUAL][fecha])return;
  var m = mId?DB.maestros.find(function(x){return x.id===mId;}):null;
  if(!DB.recreo.turnosMes[RECREO_MES_ACTUAL][fecha].primaria)
    DB.recreo.turnosMes[RECREO_MES_ACTUAL][fecha].primaria={};
  var slot = DB.recreo.turnosMes[RECREO_MES_ACTUAL][fecha].primaria[zid]||{};
  slot.maestroId = mId;
  slot.maestroN = m?m.n:'';
  DB.recreo.turnosMes[RECREO_MES_ACTUAL][fecha].primaria[zid] = slot;
  save();
}

function toggleDispRecreo(el){
  initRecreo();
  var mid = parseInt(el.getAttribute('data-mid'));
  var zona = el.getAttribute('data-z');
  var arr = zona==='inf'?DB.recreo.dispInfantil:DB.recreo.dispPrimaria;
  var idx = arr.indexOf(mid);
  if(el.checked&&idx<0)arr.push(mid);
  else if(!el.checked&&idx>=0)arr.splice(idx,1);
  save();
}

  if(zona==='inf') DB.recreo.dispInfantil=ids;

function toggleExentoRecreo(el){
  initRecreo();
  var mid = parseInt(el.getAttribute('data-mid'));
  var m = DB.maestros.find(function(x){return x.id===mid;});
  if(m&&m.cargo==='Director'){el.checked=true;return;} // Director siempre exento
  if(!DB.recreo.exentos)DB.recreo.exentos=[];
  if(!Array.isArray(DB.recreo.dispAcompanamiento))DB.recreo.dispAcompanamiento=[];
  var idx = DB.recreo.exentos.indexOf(mid);
  if(el.checked&&idx<0)DB.recreo.exentos.push(mid);
  else if(!el.checked&&idx>=0)DB.recreo.exentos.splice(idx,1);
  save();
}

function publicarRecreoBttn(){
  var url = DB.scriptUrl;
  if(!url){alert('Configura la URL del script en Config.');return;}
  var turnosMes = DB.recreo.turnosMes[RECREO_MES_ACTUAL]||{};
  if(Object.keys(turnosMes).length===0){alert('Sin turnos para este mes.');return;}
  var zonas = DB.recreo.zonasPrimaria||[];
  var cursos = DB.recreo.cursosAlumnos||[];
  // Cabecera: Fecha, Dia, Infantil (maestros), zonas maestros, ALUMNOS: zonas alumnos
  var cabMaestros = ['Fecha','Dia','Infantil'].concat(zonas.map(function(z){return z.n;}));
  var cabAlumnos = zonas.map(function(z){return 'Alumnos: '+z.n;});
  var cabecera = cabMaestros.concat(cabAlumnos);
  var filas = [cabecera];
  Object.keys(turnosMes).sort().forEach(function(fecha){
    var t = turnosMes[fecha];
    var infStr = (t.infantil||[]).map(function(id){
      var m = DB.maestros.find(function(x){return String(x.id)===String(id);});
      return m?m.n:'?';
    }).join(', ');
    var fila = [fecha,t.diaSem,infStr];
    // Maestros por zona
    zonas.forEach(function(z){
      var slot = t.primaria&&t.primaria[z.id];
      fila.push(slot&&slot.maestroN?slot.maestroN:'');
    });
    // Alumnos por zona ese dia
    var tAlumnos2 = getTurnoAlumnosDia(fecha);
    var porZonaAlumnos={};
    Object.keys(tAlumnos2).forEach(function(cid){
      var zid=tAlumnos2[cid];
      if(!porZonaAlumnos[zid])porZonaAlumnos[zid]=[];
      var cu2=cursos.find(function(x){return x.id===cid;});
      if(cu2)porZonaAlumnos[zid].push(cu2.n);
    });
    zonas.forEach(function(z){
      fila.push((porZonaAlumnos[z.id]||[]).join(', '));
    });
    filas.push(fila);
  });
  var cb = '_rec'+Date.now();
  window[cb] = function(r){
    delete window[cb];
    if(r&&r.ok){
      // Tambien aoadir eventos semanales a Agenda - Calendario RECREO
      agregarEventosRecreoAgenda();
      alert('Turnos publicados en San Sebastian Net y en Agenda correctamente.');
    } else {
      alert('Error al publicar: '+(r?r.error:'sin respuesta'));
    }
  };
  var datos = JSON.stringify({mes:RECREO_MES_ACTUAL,mesLabel:getMesLabel2(RECREO_MES_ACTUAL),filas:filas});
  var fullUrl = url+'?accion=publicarRecreo&callback='+cb+'&datos='+encodeURIComponent(datos);
  // Verificar longitud
  if(fullUrl.length > 7500){
    delete window[cb];
    // Datos demasiado grandes — enviar solo maestros sin alumnos
    var filasCortas = filas.map(function(fila,idx){
      if(idx===0) return fila.filter(function(col){return col.indexOf('Alumnos')<0;});
      return fila.slice(0, filas[0].filter(function(col){return col.indexOf('Alumnos')<0;}).length);
    });
    var datosCortos = JSON.stringify({mes:RECREO_MES_ACTUAL,mesLabel:getMesLabel2(RECREO_MES_ACTUAL),filas:filasCortas});
    var cb2='_rec2'+Date.now();
    window[cb2]=function(r){delete window[cb2];if(r&&r.ok)alert('Recreo publicado (solo maestros).');else alert('Error: '+(r?r.error:'sin respuesta'));};
    var s2=document.createElement('script');
    s2.src=url+'?accion=publicarRecreo&callback='+cb2+'&datos='+encodeURIComponent(datosCortos);
    s2.onerror=function(){delete window[cb2];alert('Error de conexion al publicar recreo.');};
    document.head.appendChild(s2);
    setTimeout(function(){if(window[cb2]){delete window[cb2];alert('Timeout.');}},20000);
    return;
  }
  var s = document.createElement('script');
  s.src = fullUrl;
  s.onerror = function(){
    delete window[cb];
    // Intentar con datos reducidos
    var datosMin=JSON.stringify({mes:RECREO_MES_ACTUAL,mesLabel:getMesLabel2(RECREO_MES_ACTUAL),filas:filas.slice(0,2)});
    alert('Error de conexion. URL: '+fullUrl.length+' chars. Datos: '+datos.length+' chars');
  };
  document.head.appendChild(s);
  setTimeout(function(){if(window[cb]){delete window[cb];alert('Timeout.');}},20000);
}

function agregarEventosRecreoAgenda(){
  if(!DB.agenda)DB.agenda=[];
  var turnosMes = DB.recreo.turnosMes[RECREO_MES_ACTUAL]||{};
  var zonas = DB.recreo.zonasPrimaria||[];
  var cursos = DB.recreo.cursosAlumnos||[];
  var p = RECREO_MES_ACTUAL.split('-');
  var mesKey = p[0]+'-'+p[1];

  // Eliminar eventos de recreo del mes actual en agenda
  DB.agenda = DB.agenda.filter(function(e){
    return !(e.calendario==='RECREO' && e.fecha && e.fecha.startsWith(mesKey));
  });

  // Agrupar dias por semana para crear 1 evento por semana
  var semanas = {};
  Object.keys(turnosMes).sort().forEach(function(fecha){
    var d = new Date(fecha+'T12:00:00');
    var sem = Math.ceil(d.getDate()/7);
    if(!semanas[sem])semanas[sem]=[];
    semanas[sem].push(fecha);
  });

  Object.keys(semanas).forEach(function(sem){
    var diasSem = semanas[sem].sort();
    var fechaIni = diasSem[0];
    var fechaFin = diasSem[diasSem.length-1];
    var d = new Date(fechaIni+'T12:00:00');
    var meses = ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    var titulo = 'Recreo Semana '+sem+' - '+parseInt(fechaIni.split('-')[2])+' al '+parseInt(fechaFin.split('-')[2])+' '+meses[d.getMonth()+1];

    // Construir descripcion con turno maestros + alumnos
    var desc = 'MAESTROS: ';
    // Usar el turno del primer dia de la semana como referencia
    var t = turnosMes[fechaIni]||{};
    var infNombres = (t.infantil||[]).map(function(id){
      var m = DB.maestros.find(function(x){return String(x.id)===String(id);});
      return m?m.n:'?';
    }).join(', ');
    desc += 'Infantil: '+infNombres+' + ';
    zonas.forEach(function(z){
      var slot = t.primaria&&t.primaria[z.id];
      if(slot&&slot.maestroN)desc += z.n+': '+slot.maestroN+' | ';
    });

    // Alumnos del dia
    var tA = getTurnoAlumnosDia(fechaIni);
    if(Object.keys(tA).length>0){
      desc += ' | ALUMNOS: ';
      var porZonaA={};
      Object.keys(tA).forEach(function(cid){
        var zid=tA[cid];
        if(!porZonaA[zid])porZonaA[zid]=[];
        var cu=cursos.find(function(x){return x.id===cid;});
        if(cu)porZonaA[zid].push(cu.n);
      });
      zonas.forEach(function(z){

function reasignarRecreoAuto(fecha, faltanIds){
  var t = getRecreoDelDia(fecha);
  if(!t)return;
  var p = fecha.split('-');
  var mes = p[0]+'-'+p[1];
  var zonas = DB.recreo.zonasPrimaria||[];
  var faltanSet = faltanIds.map(function(id){return String(id);});
  var yaEnRecreo = [];
  (t.infantil||[]).forEach(function(id){if(!faltanSet.includes(String(id)))yaEnRecreo.push(String(id));});
  zonas.forEach(function(z){
    var slot = t.primaria&&t.primaria[z.id];
    if(slot&&slot.maestroId&&!faltanSet.includes(String(slot.maestroId)))yaEnRecreo.push(String(slot.maestroId));
  });
  var disponibles = DB.maestros.filter(function(m){
    return!faltanSet.includes(String(m.id))&&!yaEnRecreo.includes(String(m.id))&&['PT','AL'].indexOf(m.e)<0;
  });
  // Reasignar infantil
  t.infantil = (t.infantil||[]).map(function(id){
    if(!faltanSet.includes(String(id)))return id;
    var s = disponibles.shift();
    return s?s.id:null;
  }).filter(function(id){return id!==null;});
  // Reasignar primaria
  zonas.forEach(function(z){
    var slot = t.primaria&&t.primaria[z.id];
    if(slot&&slot.maestroId&&faltanSet.includes(String(slot.maestroId))){
      var s = disponibles.shift();
      slot.maestroId = s?s.id:null;
      slot.maestroN = s?s.n:'';
      slot.sust = true;
    }
  });
  if(DB.recreo.turnosMes[mes])DB.recreo.turnosMes[mes][fecha]=t;
  save();
}

function genTurnosAlumnosDia(){
  initRecreo();
  var cursos = DB.recreo.cursosAlumnos||[];
  var zonas  = DB.recreo.zonasPrimaria||[];
  var aforo  = DB.recreo.zonaAforo||{};
  var dias   = getDiasLaborables(RECREO_MES_ACTUAL);

  if(cursos.length===0||zonas.length===0){
    alert('Anade cursos y zonas primero.');return;
  }

  // Construir lista de slots expandida respetando aforo
  // Ejemplo: ZonaA aforo 2, ZonaB aforo 1 → [ZA,ZA,ZB]
  function buildSlots(){
    var slots=[];
    zonas.forEach(function(z){
      var af=Math.max(1,aforo[z.id]||1);
      for(var i=0;i<af;i++)slots.push(z.id);
    });
    return slots;
  }

  var slots = buildSlots();
  var numSlots = slots.length;
  var numCursos = cursos.length;
  var turnos = {};

  dias.forEach(function(d,di){
    // Rotacion: cada dia el offset cambia 1 posicion
    // Cada curso ocupa UN slot, respetando el aforo
    var asignado = {};   // cursoId → zonaId
    var contZona = {};   // zonaId → cuantos cursos asignados hoy

    // Inicializar contador de zonas a 0
    zonas.forEach(function(z){ contZona[z.id]=0; });

    // Asignar cada curso al siguiente slot disponible con espacio
    cursos.forEach(function(cu,ci){
      // Calcular slot de inicio rotado
      var startSlot = (ci + di) % numSlots;
      // Buscar el primer slot (a partir de startSlot) cuya zona tenga espacio
      var asignada = null;
      for(var tries=0; tries<numSlots; tries++){
        var slotIdx = (startSlot + tries) % numSlots;
        var zid = slots[slotIdx];
        var af = Math.max(1, aforo[zid]||1);
        if((contZona[zid]||0) < af){
          asignada = zid;
          break;
        }
      }
      // Si no hay zona con espacio, asignar la primera zona (desbordamiento)
      if(!asignada) asignada = zonas[0].id;
      asignado[cu.id] = asignada;
      contZona[asignada] = (contZona[asignada]||0) + 1;
    });

    turnos[d.fecha] = asignado;
  });

  DB.recreo.turnosAlumnosDia = turnos;
  save();
  renderRecreo();
  alert('Rotacion generada para '+getMesLabel2(RECREO_MES_ACTUAL)+'. Aforo respetado. Cada curso rota por todas las zonas.');
}

function genTurnosAlumnos(){
  initRecreo();
  var cursos = DB.recreo.cursosAlumnos||[];
  var zonas = DB.recreo.zonasPrimaria||[];
  var aforo = DB.recreo.zonaAforo||{};
  var rotacion = DB.recreo.rotacion||'semanal';
  var dias = getDiasLaborables(RECREO_MES_ACTUAL);
  if(cursos.length===0||zonas.length===0){
    alert('Anade cursos y zonas primero.');return;
  }

  // Calcular periodos segun rotacion
  var periodos = {};
  dias.forEach(function(d){
    var key;
    if(rotacion==='quincenal'){
      key = 'Q'+(d.sem<=2?1:2);
    } else if(rotacion==='libre'){
      key = 'Periodo 1';
    } else {
      key = 'S'+d.sem;
    }
    if(!periodos[key])periodos[key]=[];
    if(periodos[key].indexOf(d.fecha)<0)periodos[key].push(d.fecha);
  });

  var periodosKeys = Object.keys(periodos).sort();
  var turnos = {};

  // Para cada periodo, rotar los cursos por zonas
  // Calcular slots totales (suma de aforos)
  var totalSlots = zonas.reduce(function(acc,z){return acc+(aforo[z.id]||1);},0);

  periodosKeys.forEach(function(p,pi){
    turnos[p] = {};
    var offset = pi; // rotacion: cada periodo desplaza 1
    var cursoIdx = 0;
    var cursosRotados = cursos.slice(offset%cursos.length).concat(cursos.slice(0,offset%cursos.length));

    zonas.forEach(function(z){
      var slots = aforo[z.id]||1;
      turnos[p][z.id] = [];
      for(var s=0;s<slots;s++){
        if(cursoIdx<cursosRotados.length){
          turnos[p][z.id].push(cursosRotados[cursoIdx].id);
          cursoIdx++;
        }
      }
    });
  });

  DB.recreo.turnosAlumnos = turnos;
  save();
  renderRecreo();
}

function calcHorasLibres(maestroId){
  // Detectar horas en que un tutor NO aparece en el horario de ningn grupo
  // pero S hay clases (hay otro maestro dando en ese grupo)
  var libres = [];
  var DIAS = ['Lunes','Martes','Miercoles','Jueves','Viernes'];
  var tramos = DB.tramos||[];
  var hHor = DB.hHor||{};
  var hGrupos = DB.hGrupos||[];

  // Encontrar el grupo del tutor
  var mae = (DB.maestros||[]).find(function(m){return m.id===maestroId;});
  if(!mae||!mae.t)return libres;

  // Buscar el grupo del tutor
  var grupoTutor = hGrupos.find(function(g){
    return g.n===mae.g||(mae.gRef&&g.n===mae.gRef);
  });
  if(!grupoTutor)return libres;

  var horGrupo = hHor[grupoTutor.id];
  if(!horGrupo)return libres;

  DIAS.forEach(function(dia){
    if(!horGrupo[dia])return;
    tramos.forEach(function(t,ti){
      if(t.r)return;
      var slot = horGrupo[dia][ti];
      if(!slot)return;
      // Si hay alguien en el slot pero NO es el tutor -> tutor libre
      if(slot.pId && String(slot.pId)!==String(maestroId)){
        libres.push({
          dia:dia,
          hora:fmt(t.ini||0),
          key:dia+'_'+ti
        });
      }
    });
  });
  return libres;
}
